    var step = INTRO_STEPS[introState.i];
    var spot = document.getElementById("intro-spot");
    var callout = document.getElementById("intro-callout");
    document.getElementById("intro-title").textContent = step.title;
    document.getElementById("intro-text").innerHTML = step.html;
    document.getElementById("intro-progress").textContent = (introState.i+1) + " / " + INTRO_STEPS.length;
    introBuildDots();
    document.getElementById("intro-back").style.visibility = introState.i === 0 ? "hidden" : "visible";
    document.getElementById("intro-next").textContent =
      (introState.i === INTRO_STEPS.length-1) ? "Done" : "Next";

    var vw = window.innerWidth, vh = window.innerHeight;
    var rect = introRectOf(step.target);
    // Safety net: a target that somehow measured far off-screen must never
    // push the dimming box-shadow off the viewport -- fall back to a centered
    // callout with a full dim instead of a broken, half-lit overlay.
    if(rect && (rect.bottom < 8 || rect.top > vh - 8 || rect.right < 8 || rect.left > vw - 8)){
      rect = null;
    }
    var cw, ch;
    if(!rect){
      if(step.at === "bottom-center"){
        spot.className = "intro-spot--none light";
        callout.className = "";
        cw = callout.offsetWidth || 330; ch = callout.offsetHeight || 160;
        callout.style.left = Math.round(vw/2 - cw/2) + "px";
        callout.style.top  = Math.round(vh - ch - 26) + "px";
      } else {
        spot.className = "intro-spot--none";
        callout.className = "intro-callout--center";
        callout.style.left = ""; callout.style.top = "";
      }
      return;
    }
    spot.className = "";
    callout.className = "";
    var pad = (step.pad != null) ? step.pad : 8;
    var sx = rect.left - pad, sy = rect.top - pad;
    var sw = rect.width + pad*2, sh = rect.height + pad*2;
    spot.style.left = sx + "px"; spot.style.top = sy + "px";
    spot.style.width = sw + "px"; spot.style.height = sh + "px";

    cw = callout.offsetWidth || 330; ch = callout.offsetHeight || 160;
    var gap = 16, top, left;
    var below = sy + sh + gap + ch <= vh - 12;
    var above = sy - gap - ch >= 12;
    if(below){ top = sy + sh + gap; left = sx + sw/2 - cw/2; }
    else if(above){ top = sy - gap - ch; left = sx + sw/2 - cw/2; }
    else {
      // no vertical room: sit beside the spot on whichever side has space
      top = Math.max(12, Math.min(vh - ch - 12, sy + sh/2 - ch/2));
      if(sx + sw + gap + cw <= vw - 12) left = sx + sw + gap;
      else left = Math.max(12, sx - gap - cw);
    }
    left = Math.max(12, Math.min(vw - cw - 12, left));
    top  = Math.max(12, Math.min(vh - ch - 12, top));
    callout.style.left = left + "px"; callout.style.top = top + "px";
  }
  function goIntro(i){
    introState.i = Math.max(0, Math.min(INTRO_STEPS.length-1, i));
    var step = INTRO_STEPS[introState.i];
    if(step.enter) step.enter();
    // two frames so the render() its enter() triggered has fully laid out
    // (a single frame occasionally measured a card still at its off-screen
    // measurement position) before we spotlight it.
    requestAnimationFrame(function(){ requestAnimationFrame(positionIntro); });
  }
  function startIntro(){
    document.getElementById("menu-panel").hidden = true;
    hideRightPanels();
    // ensure the Debate demo graph is loaded, then run
    function run(){
      state.ratingMode = false;
      state.shortcutRedundant = computeRedundantShortcuts();
      introState.active = true; introState.i = 0;
      document.body.classList.add("intro-running");   // snap cards, no slide-in
      document.getElementById("intro-overlay").hidden = false;
      goIntro(0);
    }
    var q = state.graph && state.graph.meta && state.graph.meta.question;
    if(q && /solve debate/i.test(q)){ run(); return; }
    fetch("debate-graph-v2/graph.json", {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(json){ applyGraph(json, false); run(); })
      .catch(function(){
        var emb = document.getElementById("embedded-data-debate");
        if(emb){ try{ applyGraph(JSON.parse(emb.textContent), false); }catch(e){} }
        run();  // degrade gracefully: run on whatever's loaded
      });
  }
  function endIntro(){
    introState.active = false;
    document.body.classList.remove("intro-running");
    document.getElementById("intro-overlay").hidden = true;
  }
  function introAdvance(){
    if(introState.i === INTRO_STEPS.length-1) endIntro(); else goIntro(introState.i+1);
  }
  document.getElementById("intro-btn").addEventListener("click", startIntro);
  document.getElementById("intro-next").addEventListener("click", introAdvance);
  document.getElementById("intro-back").addEventListener("click", function(){ goIntro(introState.i-1); });
  document.getElementById("intro-skip").addEventListener("click", endIntro);
  document.addEventListener("keydown", function(e){
    if(!introState.active) return;
    if(e.key === "Escape"){ endIntro(); }
    else if(e.key === "ArrowRight" || e.key === "Enter"){ introAdvance(); }
    else if(e.key === "ArrowLeft"){ goIntro(introState.i-1); }
  });
  window.addEventListener("resize", function(){ if(introState.active) positionIntro(); });
  // The overlay's click-catcher blocks stray interaction, but the reader must
  // still be able to scroll a node view too tall for their screen. Forward the
  // wheel to the stage and re-position the spotlight so it tracks its target.
  document.getElementById("intro-catch").addEventListener("wheel", function(e){
    if(!introState.active || state.view !== "node") return;
    e.preventDefault();
    stage.scrollTop += e.deltaY;
    positionIntro();
  }, {passive:false});

  boot();
})();
</script>
</body>
</html>
