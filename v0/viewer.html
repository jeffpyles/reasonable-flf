      // drifting. Feature Discussions #34: the y-pull targets the node's
      // component BAND centre (not 0) and is a touch firmer for multi-component
      // graphs, so bands hold apart against wormhole attraction. A single-
      // component graph has bandCenterY 0 and NH_CENTER_K, i.e. unchanged.
      var yK = multiComp ? NH_BAND_K : NH_CENTER_K;
      for(i=0;i<n;i++){
        fx[i] += -px[i]*NH_CENTER_K;
        fy[i] += (bandCenterY[i] - py[i]) * yK;
      }
      // ITEM 9: deterministic annealing jitter, linearly decaying to 0 by the
      // final iteration (see jitterRnd comment above).
      var temp = NH_JITTER_MAX * (1 - iter/(NH_ITER-1));
      if(temp > 0){
        for(i=0;i<n;i++){
          var jang = jitterRnd[i]() * Math.PI * 2;
          var jmag = jitterRnd[i]() * temp;
          fx[i] += Math.cos(jang) * jmag;
          fy[i] += Math.sin(jang) * jmag;
        }
      }
      for(i=0;i<n;i++){
        vx[i] = (vx[i] + fx[i]) * NH_DAMPING;
        vy[i] = (vy[i] + fy[i]) * NH_DAMPING;
        px[i] += vx[i];
        py[i] += vy[i];
      }
    }

    // ITEM 8: one-shot deterministic anisotropic rescale -- widen x, tighten
    // y -- applied to the frozen sim output BEFORE the overlap-resolution
    // pass, so any new overlaps the rescale introduces still get resolved
    // below using each card's real measured footprint.
    for(var ri=0; ri<n; ri++){
      px[ri] *= NH_HORIZ_STRETCH;
      py[ri] *= NH_VERT_SQUEEZE;
    }

    // Final deterministic overlap-resolution pass: springs+repulsion alone
    // treat nodes as points, so once real (measured, title-dependent) card
    // footprints are accounted for a few residual overlaps are possible —
    // resolve them by pushing each overlapping pair apart along whichever
    // axis has the smaller overlap, repeating until stable (or capped).
    for(var pass=0; pass<60; pass++){
      var moved = false;
      for(var pi=0; pi<n; pi++){
        for(var pj=pi+1; pj<n; pj++){
          var idA = nodes[pi].id, idB = nodes[pj].id;
          var needX = (cardW[idA]+cardW[idB])/2 + NH_CARD_GAP;
          var needY = (cardH[idA]+cardH[idB])/2 + NH_CARD_GAP;
          var dx2 = px[pj]-px[pi], dy2 = py[pj]-py[pi];
          var overlapX = needX - Math.abs(dx2);
          var overlapY = needY - Math.abs(dy2);
          if(overlapX > 0 && overlapY > 0){
            moved = true;
            if(overlapX < overlapY){
              var pushX = overlapX/2 + 0.25;
              var sx = dx2 === 0 ? (pi < pj ? -1 : 1) : (dx2 > 0 ? 1 : -1);
              px[pi] -= sx*pushX; px[pj] += sx*pushX;
            } else {
              var pushY = overlapY/2 + 0.25;
              var sy = dy2 === 0 ? 1 : (dy2 > 0 ? 1 : -1);
              py[pi] -= sy*pushY; py[pj] += sy*pushY;
            }
          }
        }
      }
      if(!moved) break;
    }

    var pos = {};
    nodes.forEach(function(nd, i){ pos[nd.id] = {x: px[i], y: py[i]}; });
    return pos;
  }

  /* =========================================================================
   * CHANGE B — edge PORTS + obstacle-avoiding routing (neighborhood view).
   * Every ground edge attaches at the SOURCE card's RIGHT side and the
   * TARGET card's LEFT side (never top/bottom/center), so support reads
   * left->right at each node. Lines want to be straight; a straight port-to-
   * port segment is drawn whenever it's unobstructed. If it would pass
   * through any OTHER card's (margin-inflated) box, it curves around via a
   * quadratic bezier, choosing whichever perpendicular side clears the
   * obstruction with less bending (tie -> upward). Everything here is a
   * pure function of the frozen (x,y) positions from forceLayout — no
   * per-frame animation, fully deterministic.
   * ========================================================================= */
  var NH_OBST_MARGIN = 6;   // inflate every card's box by this much for the obstruction test
  var NH_CURVE_OFFSETS = [24,40,60,85,115,150,190,230,280,340,410]; // candidate perpendicular offsets, smallest-that-clears wins

  function nhObstacleBoxes(nodes, pos, cardW, cardH){
    return nodes.map(function(n){
      var p = pos[n.id], w = cardW[n.id], h = cardH[n.id];
      return {
        id: n.id,
        minX: p.x - w/2 - NH_OBST_MARGIN, maxX: p.x + w/2 + NH_OBST_MARGIN,
        minY: p.y - h/2 - NH_OBST_MARGIN, maxY: p.y + h/2 + NH_OBST_MARGIN
      };
    });
  }

  // Liang-Barsky segment/AABB intersection test — standard parametric clip,
  // returns whether the segment [x1,y1]-[x2,y2] enters the box at all.
  function segIntersectsBox(x1,y1,x2,y2, box){
    var dx = x2-x1, dy = y2-y1;
    var t0 = 0, t1 = 1;
    function clip(p, q){
      if(Math.abs(p) < 1e-9) return q >= 0;
      var r = q/p;
      if(p < 0){ if(r > t1) return false; if(r > t0) t0 = r; }
      else      { if(r < t0) return false; if(r < t1) t1 = r; }
      return true;
    }
    if(!clip(-dx, x1-box.minX)) return false;
    if(!clip( dx, box.maxX-x1)) return false;
    if(!clip(-dy, y1-box.minY)) return false;
    if(!clip( dy, box.maxY-y1)) return false;
    return t0 <= t1;
  }
  function polylineViolations(points, boxes){
    var c = 0;
    for(var i=0;i<points.length-1;i++){
      for(var j=0;j<boxes.length;j++){
        if(segIntersectsBox(points[i].x,points[i].y,points[i+1].x,points[i+1].y, boxes[j])) c++;
      }
    }
    return c;
  }
  function sampleQuadratic(sx,sy,cx,cy,tx,ty,n){
    var pts = [];
    for(var i=0;i<=n;i++){
      var t = i/n, mt = 1-t;
      pts.push({ x: mt*mt*sx + 2*mt*t*cx + t*t*tx, y: mt*mt*sy + 2*mt*t*cy + t*t*ty });
    }
    return pts;
  }

  // Decide how (or whether) to curve a port-to-port edge around `boxes`
  // (every OTHER card's inflated box; source/target already excluded by the
  // caller). Returns null for a straight line, or {cx,cy} — a quadratic
  // bezier control point — for a curve.
  function routeAroundObstacles(sx,sy,tx,ty,boxes){
    if(!boxes.length || polylineViolations([{x:sx,y:sy},{x:tx,y:ty}], boxes) === 0) return null;

    var dx = tx-sx, dy = ty-sy;
    var len = Math.max(1, Math.hypot(dx,dy));
    var ux = dx/len, uy = dy/len;
    var mx = (sx+tx)/2, my = (sy+ty)/2;

    // Feature Discussions #35: the control point is anchored at a fraction
    // `base` ALONG the edge (not only the midpoint) before it's pushed out
    // perpendicular -- so an obstacle bunched near one end can be cleared by
    // pulling the curve toward that end instead of forcing a wider bend. The
    // midpoint (0.5) is tried first at every offset, so any edge that already
    // routes cleanly is byte-unchanged; the off-centre anchors only ever add
    // options for edges the midpoint search can't clear. Max offset is
    // untouched, so no new giant swoops -- just smarter use of the same reach.
    var NH_CURVE_BASES = [0.5, 0.35, 0.65];
    function bestForSign(sign){
      var nx = -uy*sign, ny = ux*sign; // unit perpendicular, flipped by sign
      var best = null;
      for(var oi=0; oi<NH_CURVE_OFFSETS.length; oi++){
        var off = NH_CURVE_OFFSETS[oi];
        for(var bi=0; bi<NH_CURVE_BASES.length; bi++){
          var bf = NH_CURVE_BASES[bi];
          var bx = sx + dx*bf, by = sy + dy*bf;
          var cx = bx + nx*off, cy = by + ny*off;
          var viol = polylineViolations(sampleQuadratic(sx,sy,cx,cy,tx,ty,20), boxes);
          // prefer the smallest offset (least bending) among equal-violation
          // options; the midpoint base leads each offset, so it wins ties.
          if(!best || viol < best.viol){ best = {sign:sign, off:off, ny:ny, cx:cx, cy:cy, viol:viol}; }
          if(viol === 0) return best;
        }
      }
      return best; // cap reached: best-effort curve, report remaining violations
    }

    var a = bestForSign(1), b = bestForSign(-1);
    // "more clearance wins": fewest remaining violations first, then the
    // smaller offset (less bending needed = more room on that side); an
    // exact tie breaks upward (more negative ny = visually "up").
    var best;
    if(a.viol !== b.viol) best = a.viol < b.viol ? a : b;
    else if(a.off !== b.off) best = a.off < b.off ? a : b;
    else best = (a.ny <= b.ny) ? a : b;
    return {cx:best.cx, cy:best.cy};
  }

  function edgePath(sx,sy,tx,ty,curve){
    return curve ? ("M"+sx+","+sy+" Q"+curve.cx+","+curve.cy+" "+tx+","+ty)
                  : ("M"+sx+","+sy+" L"+tx+","+ty);
  }
  // Small direction cue at the target's LEFT port: a subtle fixed-orientation
  // arrowhead pointing into the card (consistent with the port convention —
  // every edge enters horizontally from the left regardless of how it
  // curved to get there). Sized off the same strength->thickness scale as
  // the line itself; kept small so it reads as a taper, not clutter.
  // opacity optional (HANDOFF-TO-UI §2.2): omitted, the original fixed 0.85.
  function drawArrow(tx,ty,strength,color,opacity){
    var w = strokeFor(strength);
    var len = 5 + w*1.1, half = 2.4 + w*0.5;
    var d = "M"+tx+","+ty+" L"+(tx-len)+","+(ty-half)+" L"+(tx-len)+","+(ty+half)+" Z";
    svg.appendChild(svgEl("path", {d:d, fill:color || "var(--line)", opacity: (opacity != null ? opacity : 0.85)}));
  }
  // strokeColor optional (user notes, edge Agreement colour cue): omitted,
  // this is exactly the original neutral --line path. ghostOpacity (HANDOFF-
  // TO-UI §2.2) optional too: a demoted edge, or one hanging off a demoted
  // node, fades to near-invisible instead of reading as a live connection.
  function drawNhEdge(sx,sy,tx,ty,boxes,strength,fromId,toId,edgeId,strokeColor,ghostOpacity){
    var curve = routeAroundObstacles(sx,sy,tx,ty,boxes);
    var d = edgePath(sx,sy,tx,ty,curve);
    // data-from/data-to are inert (no visual/behavioral effect) — kept only
    // so tooling/tests can identify which edge a rendered path belongs to.
    svg.appendChild(svgEl("path", {
      d: d, fill:"none",
      stroke: strokeColor || "var(--line)", "stroke-width": strokeFor(strength),
      "stroke-linecap":"round", opacity: (ghostOpacity != null ? ghostOpacity : 0.85),
      "data-from": fromId, "data-to": toId
    }));
    drawArrow(tx,ty,strength,strokeColor,ghostOpacity);
    // ITEM 3: same invisible wide hit-path trick as groundEdgeLine() (node
    // view), sized off the same curve so it clicks anywhere the visible edge
    // is drawn, straight or curved around an obstacle alike.
    if(edgeId){
      var hit = svgEl("path", {
        d: d, fill:"none", stroke:"transparent",
        "stroke-width": Math.max(16, strokeFor(strength) + 12),
        "class": "edge-hit"
      });
      hit.addEventListener("click", function(ev){
        ev.stopPropagation();
        switchToEdgeDetail(edgeId);
      });
      svg.appendChild(hit);
    }
  }

  function applyNhTransform(){
    var t = "translate(" + state.nh.panX + "px," + state.nh.panY + "px) scale(" + state.nh.scale + ")";
    cardsLayer.style.transform = t;
    svg.style.transform = t;
  }
  function resetNhTransform(){
    cardsLayer.style.transform = "";
    svg.style.transform = "";
  }

  function switchToNodeView(id){
    state.view = "node";
    state.zoomOut.accum = 0; state.zoomOut.lastTs = 0;
    setFocusNode(id);   // setFocusNode() calls render()
  }
  // ITEM 3: edge counterpart of switchToNodeView() -- used when an edge's
  // line/typing-label is clicked from EITHER view, so an edge click reached
  // from neighborhood view also lands in detail view (forcing view="node").
  function switchToEdgeDetail(id){
    state.view = "node";
    state.zoomOut.accum = 0; state.zoomOut.lastTs = 0;
    setFocusEdge(id);   // setFocusEdge() calls render()
  }

  // Reverse of switchToNodeView: triggered by a sustained zoom-out gesture
  // while in node view (see handleNodeViewWheel). Requests that the very
  // next neighborhood render center-and-zoom-in on the current focus instead
  // of doing its usual fit-the-whole-graph framing, so the transition reads
  // as continuous ("still looking at roughly the same spot, just pulling
  // back") rather than jumping straight to a fully zoomed-out overview.
  // ITEM 3: `kind` is "node" or "edge" (whatever was focused when the
  // zoom-out gesture fired) -- renderNeighborhoodView() resolves an edge's
  // landing point as the midpoint of its two endpoints.
  function transitionToNeighborhoodFrom(kind, id){
    state.view = "neighborhood";
    state.nh.pendingCenter = {kind:kind, id:id};
    render();
  }

  function renderNeighborhoodView(){
    var nodes = nodesOf(state.graph);
    var edges = edgesOf(state.graph);
    if(!nodes.length) return;

    // Pass 1: create every card (off to the side) and MEASURE its real size —
    // the force layout's final overlap-resolution pass needs real (title-
    // dependent) footprints, not guessed constants.
    var cardEl = {}, cardW = {}, cardH = {};
    nodes.forEach(function(n){
      var el = makeCard({
        node:n, x:-9999, y:-9999, cls:"card--nh",
        onClick: (function(id){ return function(){ switchToNodeView(id); }; })(n.id)
      });
      cardEl[n.id] = el;
      cardW[n.id] = el.offsetWidth  || 126;
      cardH[n.id] = el.offsetHeight || 50;
    });

    // Pass 2: force-directed self-assembly (Feature Discussions #33). The
    // neighborhood is permanently force-directed -- organic clustering,
    // strength-proximity, and lowest-energy settling are the point. The
    // layered insight survives only as energy rules inside forceLayout
    // (depth-seeded starts, strength-proportional straightening); #34 adds
    // component banding and wormhole springs so disconnected sub-graphs stay
    // legible and antithesis rivals attract across the void.
    var pos = forceLayout(nodes, edges, cardW, cardH);

    // Pass 3: commit final positions, draw every ground edge (thickness only
    // encodes strength here — position is governed by the force layout, not
    // by the 1/strength proximity rule used in node-view). Edges attach at
    // source-right / target-left PORTS (CHANGE B) and route around any
    // other card that a straight port-to-port segment would pass through.
    nodes.forEach(function(n){
      var p = pos[n.id], el = cardEl[n.id];
      el.style.left = p.x + "px";
      el.style.top  = p.y + "px";
    });
    var obstacleBoxes = nhObstacleBoxes(nodes, pos, cardW, cardH);
    edges.forEach(function(e){
      var a = pos[e.from], b = pos[e.to];
      if(!a || !b) return;
      var sx = a.x + cardW[e.from]/2, sy = a.y;  // source RIGHT port
      var tx = b.x - cardW[e.to]/2,   ty = b.y;  // target LEFT port
      var others = obstacleBoxes.filter(function(bx){ return bx.id !== e.from && bx.id !== e.to; });
      // §2.3: a redundant shortcut draws very faint in the map too; ghost
      // faintness wins when an edge is both a ghost and a shortcut.
      var op = edgeGhostOpacity(e);
      if(op == null && isRedundantShortcut(e)) op = 0.18;
      drawNhEdge(sx, sy, tx, ty, others, edgeVisualStrength(e), e.from, e.to, e.id, edgeStrokeColor(e), op);
    });

    // Full content bounding box of the laid-out graph (every card's actual
    // extent). Used to auto-frame the view the first time this graph is
    // shown. (#edges-svg itself needs no per-render resizing to cover this:
    // it has no viewBox, so 1 local unit = 1 CSS px matching #cards-layer's
    // plain left/top positions exactly, and overflow:visible — see CHANGE 1
    // in the CSS above — disables its default viewport clip entirely, so
    // lines draw fully no matter how far positive or negative they extend.
    // Explicitly resizing/offsetting the SVG box here was tried and reverted:
    // since #cards-layer and #edges-svg share one CSS transform with
    // transform-origin:0 0, giving the SVG a non-zero left/top would shift
    // its content relative to the cards by (1-scale)*offset as soon as the
    // user zooms — overflow:visible avoids that mismatch entirely.)
    var minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
    nodes.forEach(function(n){
      var p = pos[n.id], w = cardW[n.id], h = cardH[n.id];
      minX = Math.min(minX, p.x - w/2); maxX = Math.max(maxX, p.x + w/2);
      minY = Math.min(minY, p.y - h/2); maxY = Math.max(maxY, p.y + h/2);
    });

    // First time this graph is shown in neighborhood view (with no pending
    // zoom-out transition), auto-frame the whole layout in the viewport
    // (fit-to-screen); afterwards leave the user's own pan/zoom alone across
    // re-renders (resize, switching views).
    var W = stage.clientWidth, H = stage.clientHeight;
    var contentW = Math.max(1, maxX-minX), contentH = Math.max(1, maxY-minY);
    // extra margin so the fit doesn't tuck cards in right at the viewport edge
    var fitScale = Math.max(NH_ZOOM_MIN, Math.min(1, (W-100)/contentW, (H-150)/contentH));
    var midX = (minX+maxX)/2, midY = (minY+maxY)/2;

    // ITEM 3: resolve the pending-center descriptor to an actual (x,y) --
    // a node's own position, or (for an edge) the midpoint of its two
    // endpoints, since there's no single "edge position" in the force layout.
    var pendingXY = null;
    if(state.nh.pendingCenter){
      var pc = state.nh.pendingCenter;
      if(pc.kind === "edge"){
        var pe = findEdge(pc.id);
        if(pe && pos[pe.from] && pos[pe.to]){
          pendingXY = {x:(pos[pe.from].x + pos[pe.to].x)/2, y:(pos[pe.from].y + pos[pe.to].y)/2};
        }
      } else if(pos[pc.id]){
        pendingXY = pos[pc.id];
      }
    }

    if(pendingXY){
      // CHANGE A: arriving here via a zoom-out gesture from node view. Land
      // already zoomed in relative to the eventual full-map fit (rather than
      // snapping straight to the overview), centered on the node (or edge
      // midpoint) the user was just focused on, so the transition reads as
      // continuous; further wheel-out then smoothly approaches the plain
      // fitScale framing.
      // Zoom so roughly NH_LANDING_NEIGHBORS nodes are on screen: for each
      // node, k_i is the LARGEST scale at which it still fits the viewport
      // centered on the landing point (per-axis, with a margin); at the
      // 10th-largest k_i exactly ~10 nodes fit. A radius-only rule
      // overshot badly -- the anisotropic layout packs a wide horizontal
      // band into view long before the vertical bound binds.
      var ks = nodes.map(function(n){
        var q = pos[n.id];
        var adx = Math.abs(q.x - pendingXY.x), ady = Math.abs(q.y - pendingXY.y);
        var kx = adx > 1 ? (W - 140) / (2 * adx) : Infinity;
        var ky = ady > 1 ? (H - 140) / (2 * ady) : Infinity;
        return Math.min(kx, ky);
      }).sort(function(a, b){ return b - a; });
      var nIdx = Math.min(NH_LANDING_NEIGHBORS, ks.length) - 1;
      var landingScale = Math.min(NH_ZOOM_MAX, Math.max(fitScale, ks[nIdx]));
      state.nh.scale = landingScale;
      state.nh.panX = W/2 - pendingXY.x*landingScale;
      state.nh.panY = H/2 - pendingXY.y*landingScale;
      state.nh.needsFit = false;
    } else if(state.nh.needsFit){
      state.nh.scale = fitScale;
      state.nh.panX = W/2 - midX*fitScale;
      state.nh.panY = H/2 - midY*fitScale;
      state.nh.needsFit = false;
    }
    state.nh.pendingCenter = null; // one-shot regardless of whether it was usable
    applyNhTransform();
  }

  /* =========================================================================
   * Render dispatch + friction panel + chrome
   * ========================================================================= */
  function render(){
    if(!state.graph) return;
    clearStage();
    if(state.view === "node"){
      stage.classList.remove("stage--pan");
      resetNhTransform();
      // ITEM 3: detail view now has two focus kinds -- a node (the original,
      // still-default renderNodeView()) or a ground edge (renderEdgeDetailView()).
      if(state.focusKind === "edge") renderEdgeDetailView();
      else renderNodeView();
    } else {
      stage.classList.add("stage--pan");
      renderNeighborhoodView();
      // FORUMS-SPEC.md §4: "Neighborhood view: NO typing labels, NO comment
      // chips" -- every right-edge panel's openers (comment chips, spread
      // glyphs, body zones) are node-view-only, so close them all on
      // entering neighborhood view rather than leaving one stranded open
      // over a map with no such affordances of its own.
      hideRightPanels();
    }
    updateChrome();
  }

  // Iteration (user request): the flagship questions are long -- the topbar
  // shows a short graph NAME plus a simplified one-liner (matched against
  // meta.question so pasted/derived snapshots of the same graph resolve
  // too); the full original question stays in the hover tooltip. Unmatched
  // graphs fall back to their raw question.
  var GRAPH_DISPLAY = [
    {match:/solve debate/i,      label:"Debate",      short:"can mapping arguments improve contested reasoning?"},
    {match:/SARS-CoV-2/i,        label:"Covid origins", short:"natural spillover or research-related incident?"},
    {match:/eggs bad for your health/i, label:"Eggs",  short:"are they bad for your health?"},
    {match:/collider|black hole/i, label:"Black holes", short:"could the LHC make one that destroys Earth?"}
  ];
  function updateChrome(){
    var g = state.graph;
    var q = (g.meta && g.meta.question) || "";
    var qline = document.getElementById("question-line");
    qline.textContent = "";
    var disp = null;
    for(var di = 0; di < GRAPH_DISPLAY.length; di++){
      if(GRAPH_DISPLAY[di].match.test(q)){ disp = GRAPH_DISPLAY[di]; break; }
    }
    if(disp){
      var lb = document.createElement("b");
      lb.textContent = disp.label;
      qline.appendChild(lb);
      qline.appendChild(document.createTextNode(" — " + disp.short));
    } else {
      qline.textContent = q;
    }
    qline.title = q;
    // §2.5: keep the topbar's blind-mode reminder in sync with state.
    document.getElementById("rating-pill").hidden = !blind();
    // §2.5: the persistent legend's worked spread-glyph sample is static
    // (built once at boot) but is still the glyph itself -- rebuild it
    // (or leave it empty) every render, and hide its row, so no example of
    // the withheld cue lingers on screen while Rating mode is on.
    var legendSpreadRow = document.getElementById("legend-spread-row");
    if(legendSpreadRow) legendSpreadRow.hidden = blind();
    var legendSpreadWrap = document.getElementById("legend-spread-wrap");
    if(legendSpreadWrap){
      legendSpreadWrap.innerHTML = "";
      var freshSample = distStripEl(LEGEND_SAMPLE_AGG, 62, 16);
      if(freshSample) legendSpreadWrap.appendChild(freshSample);
    }
  }

  // ITEM 5: frictions used to be their own always-on-screen pill + panel;
  // now it's just one section inside the single dot menu (renderMenuPanel()
  // calls this to (re)populate #menu-frictions every time the menu opens).
  // Iteration (user request): frictions no longer render inline in the
  // menu -- the menu carries one compact button and the items live in a
  // right-edge Frictions panel (the same family as forum/analytics).
  function renderFrictionsSection(){
    var panel = document.getElementById("menu-frictions");
    var items = frictionsOf(state.graph);
    panel.innerHTML = "";
    var b = document.createElement("button");
    b.className = "btn";
    b.textContent = "Frictions (" + items.length + ")\u2026";
    b.addEventListener("click", function(ev){
      ev.stopPropagation();
      document.getElementById("menu-panel").hidden = true;  // panels share the right edge
      openFrictionsPanel();
    });
    panel.appendChild(b);
  }

  function openFrictionsPanel(){
    var panel = document.getElementById("frictions-panel");
    panel.innerHTML = "";
    rightPanelHeader(panel, "Frictions");
    var items = frictionsOf(state.graph);
    var sub = document.createElement("div");
    sub.className = "forum-subtitle";
    sub.textContent = items.length + " flagged friction" + (items.length === 1 ? "" : "s")
      + " on this graph";
    panel.appendChild(sub);
    if(!items.length){
      var e = document.createElement("div");
      e.className = "forum-empty";
      e.textContent = "No frictions flagged yet.";
      panel.appendChild(e);
    }
    items.forEach(function(f){
      var row = document.createElement("div");
      row.className = "friction-item";
      var meta = document.createElement("div");
      meta.className = "fmeta";
      var who = document.createElement("span"); who.textContent = f.agent;
      var ts = document.createElement("span"); ts.textContent = f.ts || "";
      meta.appendChild(who); meta.appendChild(ts);
      row.appendChild(meta);
      var txt = document.createElement("div");
      txt.className = "ftext";
      txt.textContent = f.text;
      row.appendChild(txt);
      (f.refs||[]).forEach(function(ref){
        var chip = document.createElement("span");
        chip.className = "refchip";
        chip.textContent = ref;
        chip.addEventListener("click", function(ev){
          ev.stopPropagation();
          if(getNode(ref)){
            hideRightPanels();
            switchToNodeView(ref);
          }
        });
        row.appendChild(chip);
      });
      panel.appendChild(row);
    });
    showRightPanel("frictions-panel");
  }

    /* =========================================================================
   * FORUMS-SPEC.md §4: read-only right-side forum panel. Same visual family
   * as the friction panel above, opened by a comment chip (focus card / an
   * edge label) or an edge label's label-only typing text. For an edge
   * target, typings are listed first (agrees desc, primary starred); then
   * every target's comments, threaded by "parent" with siblings ranked by
   * (agrees desc, seq asc) -- same ranking rule as `list-comments`' default
   * text mode (BUILD-SPEC's CLI is the source of truth; this just mirrors it
   * client-side over the same graph.json data already loaded).
   * ========================================================================= */
  function commentSeq(c){
    var m = /^c0*(\d+)$/.exec(c.id || "");
    return m ? parseInt(m[1], 10) : 0;
  }
  // User notes: Reddit-style nested threads (built via `parent` below), with
  // top-level comments ordered by cumulative Agreement + R&C. DATA GAP:
  // comments in the bundled snapshots carry only the structural `agrees`
  // count -- no graded A/R/C aggregates -- so `agrees` IS the cumulative
  // rating available, and the rank() below already realizes the intended
  // ordering; revisit when the engine exports graded comment ratings.
  function threadComments(comments){
    var byParent = {};
    comments.forEach(function(c){
      var key = c.parent || "";
      (byParent[key] = byParent[key] || []).push(c);
    });
    function rank(list){
      return list.slice().sort(function(a, b){
        if(b.agrees !== a.agrees) return b.agrees - a.agrees;
        return commentSeq(a) - commentSeq(b);
      });
    }
    function build(parentKey){
      return rank(byParent[parentKey] || []).map(function(c){
        return {c: c, children: build(c.id)};
      });
    }
    return build("");
  }
  function renderCommentNode(node, depth){
    var div = document.createElement("div");
    div.className = "forum-comment";
    div.style.marginLeft = (depth * 14) + "px";
    var meta = document.createElement("div");
    meta.className = "fc-meta";
    var who = document.createElement("span"); who.textContent = node.c.agent;
    var agrees = document.createElement("span"); agrees.textContent = "agrees " + node.c.agrees;
    meta.appendChild(who); meta.appendChild(agrees);
    div.appendChild(meta);
    var txt = document.createElement("div");
    txt.className = "fc-text";
    txt.textContent = node.c.text;
    div.appendChild(txt);
    node.children.forEach(function(child){ div.appendChild(renderCommentNode(child, depth + 1)); });
    return div;
  }

  function openForumPanel(kind, id){
    var panel = document.getElementById("forum-panel");
    panel.innerHTML = "";

    var header = document.createElement("div");
    header.className = "forum-header";
    var h = document.createElement("h4");
    h.textContent = "Forum";
    var closeBtn = document.createElement("button");
    closeBtn.className = "forum-close ui";
    closeBtn.textContent = "✕";
    closeBtn.addEventListener("click", function(){ panel.hidden = true; });
    header.appendChild(h); header.appendChild(closeBtn);
    panel.appendChild(header);

    var comments, subtitle;
    if(kind === "edge"){
      var e = findEdge(id);
      if(!e){ panel.hidden = true; return; }
      comments = commentsOf(e);
      var fromN = getNode(e.from), toN = getNode(e.to);
      subtitle = e.id + ": " + (fromN ? titleOf(fromN) : e.from) + " → " + (toN ? titleOf(toN) : e.to);
      var sub = document.createElement("div");
      sub.className = "forum-subtitle";
      sub.textContent = subtitle;
      panel.appendChild(sub);

      var typings = typingsOf(e);
      if(typings.length){
        var tyH = document.createElement("div");
        tyH.className = "forum-subhead";
        tyH.textContent = "Typings — what inference is this edge making?";
        panel.appendChild(tyH);
        typings.slice().sort(function(a, b){ return b.agrees - a.agrees; }).forEach(function(t){
          var row = document.createElement("div");
          var isPrimary = e.primary_typing === t.id;
          row.className = "forum-typing-item" + (isPrimary ? " is-primary" : "");
          var label = document.createElement("span");
          if(isPrimary){
            var star = document.createElement("span");
            star.className = "ty-star"; star.textContent = "★";
            label.appendChild(star);
          }
          var txtNode = document.createElement("span");
          if(t.node){
            var n = getNode(t.node);
            txtNode.textContent = n ? titleOf(n) : t.node;
          } else {
            txtNode.textContent = t.label;
          }
          label.appendChild(txtNode);
          var agr = document.createElement("span");
          agr.className = "ty-agrees";
          agr.textContent = "agrees " + t.agrees;
          row.appendChild(label);
          row.appendChild(agr);
          panel.appendChild(row);
        });
      }
    } else {
      var n2 = getNode(id);
      if(!n2){ panel.hidden = true; return; }
      comments = commentsOf(n2);
      var sub2 = document.createElement("div");
      sub2.className = "forum-subtitle";
      sub2.textContent = n2.id + ": " + titleOf(n2);
      panel.appendChild(sub2);
    }

    // §2.5: the comment thread (text + per-comment agrees) is a consensus
    // cue -- blind in Rating mode, counts only. Typings above (structural /
    // governance-of-inference) stay visible in both modes.
    if(blind()){
      var bEmpty = document.createElement("div");
      bEmpty.className = "forum-empty";
      bEmpty.textContent = "Rating mode: thread withheld — " + comments.length
        + " comment" + (comments.length === 1 ? "" : "s") + " (counts only).";
      panel.appendChild(bEmpty);
    } else {
      var cH = document.createElement("div");
      cH.className = "forum-subhead";
      cH.textContent = "Comments (" + comments.length + ")";
      panel.appendChild(cH);
      if(!comments.length){
        var empty = document.createElement("div");
        empty.className = "forum-empty";
        empty.textContent = "No comments yet.";
        panel.appendChild(empty);
      } else {
        threadComments(comments).forEach(function(node){
          panel.appendChild(renderCommentNode(node, 0));
        });
      }
    }

    showRightPanel("forum-panel");
  }

  /* =========================================================================
   * The three right-edge panels (forum / analytics / phrasings) share one
   * slot; showing any one hides the others.
   * ========================================================================= */
  var RIGHT_PANEL_IDS = ["forum-panel", "assessment-panel", "phrasings-panel", "frictions-panel"];
  function showRightPanel(id){
    RIGHT_PANEL_IDS.forEach(function(pid){
      var p = document.getElementById(pid);
      if(p) p.hidden = (pid !== id);
    });
  }
  function hideRightPanels(){
    RIGHT_PANEL_IDS.forEach(function(pid){
      var p = document.getElementById(pid);
      if(p) p.hidden = true;
    });
  }
  // Shared header builder for the analytics/phrasings panels (same visual
  // family as the forum panel's hand-built header).
  function rightPanelHeader(panel, titleText){
    var header = document.createElement("div");
    header.className = "forum-header";
    var h = document.createElement("h4");
    h.textContent = titleText;
    var closeBtn = document.createElement("button");
    closeBtn.className = "forum-close ui";
    closeBtn.textContent = "✕";
    closeBtn.addEventListener("click", function(){ panel.hidden = true; });
    header.appendChild(h); header.appendChild(closeBtn);
    panel.appendChild(header);
  }

  /* =========================================================================
   * User notes: clicking the focus card's BODY pops out the node's alternate
   * phrasings with their ratings, best cumulative rating first. Each row
   * shows the phrasing's own R/C means (they rate the wording) and its
   * structural belonging-agrees count ("does this wording state the same
   * claim?" -- ASSESSMENT-SPEC's belonging signal).
   * DATA GAP: phrasings carry no per-phrasing Agreement aggregate and no
   * graded belonging Agreement in the bundled snapshots, so belonging shows
   * the structural count; the ranking upgrades automatically when fuller
   * aggregates arrive (see byCumulativeThenAgrees).
   * ========================================================================= */
  function openPhrasingsPanel(nodeId){
    var node = getNode(nodeId);
    if(!node) return;
    var panel = document.getElementById("phrasings-panel");
    panel.innerHTML = "";
    rightPanelHeader(panel, "Phrasings");

    var sub = document.createElement("div");
    sub.className = "forum-subtitle";
    sub.textContent = node.id + ": " + titleOf(node);
    panel.appendChild(sub);

    var subhead = document.createElement("div");
    subhead.className = "forum-subhead";
    subhead.textContent = "Alternate phrasings — best cumulative rating first";
    panel.appendChild(subhead);

    var phrasings = (node.phrasings || []).slice().sort(byCumulativeThenAgrees(["R","C"]));
    if(!phrasings.length){
      var none = document.createElement("div");
      none.className = "forum-empty";
      none.textContent = "No phrasings yet.";
      panel.appendChild(none);
    }
    phrasings.forEach(function(p){
      var item = document.createElement("div");
      var isPrimary = node.primary_phrasing === p.id;
      item.className = "phrasing-item" + (isPrimary ? " is-primary" : "");
      var text = document.createElement("div");
      if(isPrimary){
        var star = document.createElement("span");
        star.className = "ty-star"; star.textContent = "★ ";
        text.appendChild(star);
      }
      var t = document.createElement("span");
      t.textContent = p.text;
      text.appendChild(t);
      item.appendChild(text);

      var scores = document.createElement("div");
      scores.className = "ph-scores";
      var rc = document.createElement("span");
      var belonging = document.createElement("span");
      // §2.5: blind Rating mode withholds both the R/C summary and the
      // belonging-agrees count -- a single combined "withheld" left span
      // keeps the two-span layout intact.
      if(blind()){
        rc.textContent = "withheld";
        belonging.textContent = "";
      } else {
        var summary = ratingSummaryText(p.scores, ["R","C"], ["Reason","Clarity"]);
        rc.textContent = summary || "not yet rated";
        belonging.textContent = "belonging: agrees " + (p.agrees || 0);
      }
      scores.appendChild(rc);
      scores.appendChild(belonging);
      item.appendChild(scores);
      panel.appendChild(item);
    });

    var note = document.createElement("div");
    note.className = "assess-note";
    note.textContent = "Reason/Clarity rate each wording; \"belonging\" is the structural count of "
      + "raters agreeing this wording states the same claim. Ranked by cumulative rating, falling "
      + "back to belonging-agrees — this snapshot carries no per-phrasing Agreement aggregate yet.";
    panel.appendChild(note);

    showRightPanel("phrasings-panel");
  }

  /* =========================================================================
   * VIEWER-SPEC.md §4 item 1, the click-through: a right-side assessment-
   * detail panel (same visual family as the forum panel, reusing its
   * header/subtitle/subhead classes) showing, per dimension, the full
   * aggregate the snapshot carries: value line, a larger spread strip,
   * per-bloc means, bloc divergence, low-n caveat, and prior-era history.
   * Nodes get all three dimensions (Agreement, Reasonableness, Clarity);
   * edges get their single (conditional-inference) Agreement aggregate.
   * ========================================================================= */
  function assessDimSection(label, agg){
    var wrap = document.createElement("div");
    wrap.className = "assess-dim";
    var h = document.createElement("div");
    h.className = "forum-subhead";
    h.textContent = label;
    wrap.appendChild(h);

    if(!agg || (!(agg.n > 0) && !agg.state)){
      var none = document.createElement("div");
      none.className = "assess-note";
      none.textContent = "no ratings yet";
      wrap.appendChild(none);
      return wrap;
    }

    var val = document.createElement("div");
    val.className = "assess-value";
    var vTxt = fmtAgg(agg);
    if(agg.state !== "sealed") vTxt += " (n=" + (agg.n || 0) + ")";
    if(agg.era && agg.era > 1) vTxt += " · era " + agg.era;
    val.textContent = vTxt;
    wrap.appendChild(val);

    var strip = distStripEl(agg, 280, 30);
    if(strip){
      var row = document.createElement("div");
      row.className = "dist-row";
      row.style.cursor = "default";
      row.appendChild(strip);
      wrap.appendChild(row);
      // axis end labels (linear 0-5 axis, padded 6px like the glyph itself)
      var axis = document.createElement("div");
      axis.className = "assess-axis-labels";
      [0, 5].forEach(function(s){
        var t = document.createElement("span");
        t.textContent = String(s);
        t.style.left = ((6 + (s / 5) * (280 - 12)) / 280 * 100) + "%";
        axis.appendChild(t);
      });
      wrap.appendChild(axis);
    }

    // ITERATION (user notes 3): stdev as an explicit labelled row, not only
    // the "±" in the value line. (Already available in today's aggregates.)
    if(agg.stdev != null){
      var sd = document.createElement("div");
      sd.className = "assess-bloc";
      var sdl = document.createElement("span"); sdl.textContent = "stdev (spread)";
      var sdv = document.createElement("span"); sdv.textContent = "±" + agg.stdev.toFixed(2);
      sd.appendChild(sdl); sd.appendChild(sdv);
      wrap.appendChild(sd);
    }
    var blocs = blocsOf(agg);
    blocs.forEach(function(b){
      var r = document.createElement("div");
      r.className = "assess-bloc";
      var l = document.createElement("span"); l.textContent = "bloc " + b.id;
      var v = document.createElement("span");
      v.textContent = b.mean.toFixed(1) + " (n=" + b.n + ")";
      r.appendChild(l); r.appendChild(v);
      wrap.appendChild(r);
    });
    if(agg.bloc_divergence != null && blocs.length > 1){
      var d = document.createElement("div");
      d.className = "assess-bloc";
      var dl = document.createElement("span"); dl.textContent = "bloc divergence";
      var dv = document.createElement("span"); dv.textContent = agg.bloc_divergence.toFixed(2);
      d.appendChild(dl); d.appendChild(dv);
      wrap.appendChild(d);
    }

    if(agg.n > 0 && agg.n < quorumN()){
      var low = document.createElement("div");
      low.className = "assess-note";
      low.textContent = "only n=" + agg.n + " rating" + (agg.n === 1 ? "" : "s")
        + " — below this dataset's quorum of " + quorumN() + " for statistical confidence "
        + "(the card's glyph sits on a red lozenge)";
      wrap.appendChild(low);
    } else if(agg.n > 0 && agg.n < confirmN()){
      var marg = document.createElement("div");
      marg.className = "assess-note";
      marg.textContent = "confidence is marginal — below this dataset's confirm threshold of "
        + confirmN() + " ratings (the card's glyph sits on an amber lozenge)";
      wrap.appendChild(marg);
    }
    if(agg.history && agg.history.length){
      wrap.appendChild(historyLinesEl(agg.history));
    }
    return wrap;
  }

  function openAssessmentPanel(kind, id){
    var panel = document.getElementById("assessment-panel");
    panel.innerHTML = "";
    rightPanelHeader(panel, "Analytics");

    var sub = document.createElement("div");
    sub.className = "forum-subtitle";
    if(kind === "edge"){
      var e = findEdge(id);
      if(!e){ panel.hidden = true; return; }
      var fromN = getNode(e.from), toN = getNode(e.to);
      sub.textContent = e.id + ": " + (fromN ? titleOf(fromN) : e.from)
        + " → " + (toN ? titleOf(toN) : e.to);
      panel.appendChild(sub);
      // structural numbers moved off the (now clean) edge card, iteration notes
      var eMeta = document.createElement("div");
      eMeta.className = "forum-subtitle";
      eMeta.textContent = "ground edge · structural agrees " + ((e.agrees != null) ? e.agrees : "—")
        + " · strength " + ((e.strength != null) ? e.strength : "—")
        + " · author " + (e.author || "—");
      panel.appendChild(eMeta);
      // HANDOFF-TO-UI §2.2: a ghost's provenance is the point -- surface who
      // demoted it, when (seq), and why, right where the rest of the record is.
      if(isGhost(e)){
        var eGhostNote = document.createElement("div");
        eGhostNote.className = "assess-note";
        eGhostNote.textContent = "GHOST — " + ghostProvenanceText(e) + ". Kept, never deleted.";
        panel.appendChild(eGhostNote);
      }
      // HANDOFF-TO-UI §2.4: a direct edge outcompeted by a stronger layered
      // path (length-normalized, geometric-mean strength -- not the raw
      // chain-rule product, which always favors flat edges) is IN COMPETITION
      // with that path for the same inference -- present both routes side by
      // side, flagged as competing, as context for comparative edge-Agreement
      // judgments (comparative judgments are more reliable than absolute
      // ones). Rating itself still happens on the write surface (the CLI);
      // this is read-only context.
      var sc = state.shortcutRedundant && state.shortcutRedundant[e.id];
      if(sc){
        var scHead = document.createElement("div");
        scHead.className = "forum-subhead";
        scHead.textContent = "In competition — direct vs layered (§2.4)";
        panel.appendChild(scHead);

        var directRow = document.createElement("div");
        directRow.className = "assess-bloc";
        var directL = document.createElement("span");
        directL.textContent = "this edge (direct)  " + e.from + " → " + e.to;
        var directV = document.createElement("span");
        directV.textContent = edgeVisualStrength(e).toFixed(2);
        directRow.appendChild(directL); directRow.appendChild(directV);
        panel.appendChild(directRow);

        for(var scI=0; scI<sc.path.length-1; scI++){
          (function(hopFrom, hopTo){
            var hop = bestEdgeBetween(hopFrom, hopTo);
            var hopRow = document.createElement("div");
            hopRow.className = "assess-bloc";
            var hopL = document.createElement("span");
            hopL.textContent = "via  " + hopFrom + " → " + hopTo;
            if(hop){
              hopL.style.cursor = "pointer";
              hopL.style.color = "var(--accent)";
              hopL.title = "focus this edge";
              hopL.addEventListener("click", function(ev){
                ev.stopPropagation();
                switchToEdgeDetail(hop.id);
              });
            }
            var hopV = document.createElement("span");
            hopV.textContent = hop ? edgeVisualStrength(hop).toFixed(2) : "—";
            hopRow.appendChild(hopL); hopRow.appendChild(hopV);
            panel.appendChild(hopRow);
          })(sc.path[scI], sc.path[scI+1]);
        }

        var layeredRow = document.createElement("div");
        layeredRow.className = "assess-bloc";
        var layeredL = document.createElement("span");
        layeredL.textContent = "layered path (geometric mean)";
        var layeredV = document.createElement("span");
        layeredV.textContent = sc.geomean.toFixed(2);
        layeredRow.appendChild(layeredL); layeredRow.appendChild(layeredV);
        panel.appendChild(layeredRow);

        var scNote = document.createElement("div");
        scNote.className = "assess-note";
        scNote.textContent = "These routes are IN COMPETITION for the same inference. Comparative "
          + "judgments are more reliable than absolute ones — rate the edges side by side (via the "
          + "CLI; the viewer is a read surface). The absolute 0–5 scale stays the anchor; the "
          + "comparison sharpens it.";
        panel.appendChild(scNote);
      }
      // §2.5: the aggregate itself (mean/spread/blocs) is the consensus cue
      // Rating mode withholds -- structural rows above (meta, ghost, the
      // §2.4 competition context) stay visible in both modes.
      if(!blind()){
        panel.appendChild(assessDimSection("Agreement — of the inference only", e.agreement));
      } else {
        var eBlindNote = document.createElement("div");
        eBlindNote.className = "assess-note";
        eBlindNote.textContent = "Rating mode — consensus aggregates withheld so your judgment stays independent. Toggle Reading mode in the ⋯ menu to reveal.";
        panel.appendChild(eBlindNote);
      }
    } else {
      var n2 = getNode(id);
      if(!n2){ panel.hidden = true; return; }
      sub.textContent = n2.id + ": " + titleOf(n2);
      panel.appendChild(sub);
      // kind/author/created moved off the (now clean) card, iteration notes
      var nMeta = document.createElement("div");
      nMeta.className = "forum-subtitle";
      nMeta.textContent = (n2.kind === "external_anchor" ? "external anchor (evidence)"
          : (n2.kind || "claim"))
        + " · author " + n2.author + " · created #" + n2.created_seq;
      panel.appendChild(nMeta);
      // HANDOFF-TO-UI §2.2: a ghost's provenance is the point -- surface who
      // demoted it, when (seq), and why, right where the rest of the record is.
      if(isGhost(n2)){
        var nGhostNote = document.createElement("div");
        nGhostNote.className = "assess-note";
        nGhostNote.textContent = "GHOST — " + ghostProvenanceText(n2) + ". Kept, never deleted.";
        panel.appendChild(nGhostNote);
      }
      // HANDOFF-TO-UI §2.6: a node carrying a top-level poll has its TYPE
      // under contest -- surface the Yes/No/decline tallies and the
      // reputation-weighted yes_share right here; `decline` is first-class
      // ("considered and rejected" != "didn't engage") and never folds into No.
      var nPoll = pollForNode(n2.id);
      if(nPoll){
        var pollHead = document.createElement("div");
        pollHead.className = "forum-subhead";
        pollHead.textContent = "Type poll — " + (nPoll.resolved ? "resolved" : "open") + (nPoll.question ? " (" + nPoll.question + ")" : "");
        panel.appendChild(pollHead);

        var pollRows = [
          ["yes", String(nPoll.yes || 0)],
          ["no", String(nPoll.no || 0)],
          ["decline (considered & abstained)", String(nPoll.decline || 0)],
          ["weighted yes-share", nPoll.yes_share != null ? nPoll.yes_share.toFixed(2) : "—"]
        ];
        pollRows.forEach(function(row){
          var pr = document.createElement("div");
          pr.className = "assess-bloc";
          var prl = document.createElement("span"); prl.textContent = row[0];
          var prv = document.createElement("span"); prv.textContent = row[1];
          pr.appendChild(prl); pr.appendChild(prv);
          panel.appendChild(pr);
        });

        var pollNote = document.createElement("div");
        pollNote.className = "assess-note";
        if(!nPoll.resolved){
          pollNote.textContent = "The node's type is under vote. It renders as its current kind (" + (n2.kind || "claim") + ") until the poll resolves — truth-rating stays the default while the type is contested.";
        } else if(nPoll.reopen_required){
          pollNote.textContent = "Re-typed by poll → " + nPoll.resolved_kind + " (" + (nPoll.yes || 0) + ":" + (nPoll.no || 0) + "). FLIP PENDING: the truth→endorsement dimension change completes only when an explicit reopen turns the era — the ratings shown are the closing truth era.";
        } else {
          pollNote.textContent = "Re-typed by poll → " + nPoll.resolved_kind + " (" + (nPoll.yes || 0) + ":" + (nPoll.no || 0) + ") — provenance kept.";
        }
        panel.appendChild(pollNote);
      }
      // HANDOFF-TO-UI §2.1: an ought's headline aggregate is democratic
      // endorsement, not truth-agreement -- say so where the number is.
      // §2.5: the three aggregates are the consensus cue Rating mode
      // withholds -- meta, ghost, and type-poll rows above stay visible.
      if(!blind()){
        panel.appendChild(assessDimSection(
          n2.kind === "ought" ? "Endorsement — democratic, not truth" : "Agreement",
          n2.agreement));
        var q = n2.quality || {};
        panel.appendChild(assessDimSection("Reasonableness", q.R));
        panel.appendChild(assessDimSection("Clarity", q.C));
      } else {
        var nBlindNote = document.createElement("div");
        nBlindNote.className = "assess-note";
        nBlindNote.textContent = "Rating mode — consensus aggregates withheld so your judgment stays independent. Toggle Reading mode in the ⋯ menu to reveal.";
        panel.appendChild(nBlindNote);
      }
      // HANDOFF-TO-UI §2.2: a demoted (ghosted) antithesis set this node
      // belongs to doesn't show up in the living column any more -- list it
      // here so its provenance stays reachable.
      setsOf(state.graph).forEach(function(s){
        if(!isGhost(s)) return;
        if(!s.members.some(function(m){ return m.node === id; })) return;
        var sGhostNote = document.createElement("div");
        sGhostNote.className = "assess-note";
        sGhostNote.textContent = "Antithesis set " + s.id + " is ghosted — " + ghostProvenanceText(s);
        panel.appendChild(sGhostNote);
      });
    }

    // Honesty note: say exactly what the strip is built from, so nobody
    // reads the band/dots as a per-rating histogram (which the snapshot
    // cannot support -- see the distStripEl block comment).
    var note = document.createElement("div");
    note.className = "assess-note";
    note.textContent = "How to read: the tick is the overall mean; the shaded band spans ±1 stdev; "
      + "each dot is one rating bloc's mean (dot size grows with that bloc's n). Two separated "
      + "dots = a bimodal split; a wide band with merged dots = broadly uncertain; a narrow "
      + "band = tight consensus. This snapshot carries aggregates only (no per-rating list), "
      + "so this is the complete spread information available — once the rating log exports "
      + "binned counts (histogram: [...]) these glyphs become true histograms automatically.";
    panel.appendChild(note);

    showRightPanel("assessment-panel");
  }

  /* =========================================================================
   * Loading: fetch (served) -> ?data= override -> embedded fallback (file://)
   * plus a manual paste/file-load modal, per §4b.
   * ========================================================================= */
  function embeddedGraph(){
    return JSON.parse(document.getElementById("embedded-data").textContent);
  }

  function applyGraph(g, keepFocus){
    if(!g || !Array.isArray(g.nodes) || !g.nodes.length){
      throw new Error("graph.json must contain a non-empty \"nodes\" array");
    }
    state.graph = g;
    // §2.3: recomputed per load, not cached across graphs -- these graphs
    // are small (<=~130 edges) and the DFS is depth-capped, so this is cheap.
    state.shortcutRedundant = computeRedundantShortcuts();
    var focusStillValid = keepFocus && (
      state.focusKind === "edge" ? !!findEdge(state.focusId) : !!getNode(state.focusId)
    );
    if(!focusStillValid){
      state.focusKind = "node";
      state.focusId = g.nodes[0].id;
    }
    // a freshly (re)loaded graph should auto-frame itself in neighborhood view
    state.nh.panX = 0; state.nh.panY = 0; state.nh.scale = 1; state.nh.needsFit = true;
    state.nh.pendingCenter = null;
    state.zoomOut.accum = 0; state.zoomOut.lastTs = 0;
    render();
  }

  // §2.5: a dataset that ENFORCES blind Rating mode (a config.json sibling
  // of its graph.json carrying rating_mode_only:true) opens blind -- the
  // menu toggle remains available regardless, since the viewer is the
  // sanctioned human read surface / analysis escape hatch. Resolves to
  // true/false/null (null = unknowable: not a graph.json path, fetch
  // failed, no config); a failure here must never block graph rendering.
  function detectRatingMode(dataUrl){
    if(!/graph\.json$/.test(dataUrl)) return Promise.resolve(null);
    return fetch(dataUrl.replace(/graph\.json$/, "config.json"), {cache:"no-store"})
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(cfg){ return cfg ? (cfg.rating_mode_only === true) : null; })
      .catch(function(){ return null; });
  }

  function boot(){
    var params = new URLSearchParams(window.location.search);
    var dataUrl = params.get("data") || "data/eggs-p4.json";
    fetch(dataUrl, {cache:"no-store"})
      .then(function(res){
        if(!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function(g){
        return detectRatingMode(dataUrl).then(function(rm){
          if(SHOW_RATING_MODE && rm === true) state.ratingMode = true;
          applyGraph(g, false);
        });
      })
      .catch(function(){
        // file:// (or any fetch failure): fall back to the embedded dataset
        // so the viewer always renders something immediately.
        try{ applyGraph(embeddedGraph(), false); }
        catch(err){ console.error("Embedded fallback failed:", err); }
      });
  }

  /* =========================================================================
   * Premier-graph picker (user request): the Load Graph modal leads with
   * the four flagship graphs. Each tile fetches the LATEST snapshot
   * (relative to the served v0 folder) and honors the dataset's enforced
   * Rating mode, exactly like a ?data= boot. Where fetch is impossible
   * (file://, the published artifact's CSP) it falls back to a bundled
   * copy when one exists -- the artifact build embeds all four as
   * embedded-data-<key> blocks with a data-rating-mode attribute -- else
   * explains itself in the modal's error line.
   * ========================================================================= */
  // v2 structural-review parallels (Review thread, comms #49): fully rated
  // to quorum on all three dimensions AND every edge, so the title/edge/
  // analytics surfaces that fall back to structural agrees on the originals
  // light up here.
  var PREMIER_GRAPHS = [
    {key:"debate",     label:"Debate",      path:"debate-graph-v2/graph.json",
     desc:"Does argument-mapping beat 'solve debate won't work'? 45 nodes; evidence + ought kinds; fully rated"},
    {key:"covid",      label:"Covid",       path:"covid-graph-v2/graph.json",
     desc:"Contested question; 133 nodes; settled/contested/provisional all live; every edge rated"},
    {key:"eggs",       label:"Eggs",        path:"eggs-graph-v2/graph.json",
     desc:"Mundane-contested; type polls, demoted set, auto-ghosts; fully rated"},
    {key:"blackholes", label:"Black Holes", path:"blackholes-graph-v2/graph.json",
     desc:"Confident-answer control; 70 nodes; fully rated"}
  ];
  function loadPremierGraph(g){
    modalErr.textContent = "loading " + g.label + "…";
    fetch(g.path, {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function(json){
        return detectRatingMode(g.path).then(function(rm){
          state.ratingMode = SHOW_RATING_MODE && (rm === true);
          applyGraph(json, false);
          backdrop.hidden = true;
          modalErr.textContent = "";
        });
      })
      .catch(function(){
        var emb = document.getElementById("embedded-data-" + g.key);
        if(emb){
          try{
            state.ratingMode = SHOW_RATING_MODE && emb.getAttribute("data-rating-mode") === "true";
            applyGraph(JSON.parse(emb.textContent), false);
            backdrop.hidden = true;
            modalErr.textContent = "";
            return;
          }catch(err){ /* fall through to the message */ }
        }
        modalErr.textContent = "Could not load " + g.path + " — serve the v0 folder over http(s) "
          + "(python3 -m http.server), or paste/choose the file below.";
      });
  }

  /* ITEM 5: everything that used to be its own always-on-screen widget --
     the bottom-left legend/explainer, the colour-key pill + 2x2 swatch panel
     (ASSESSMENT-SPEC.md §6 ship gate), the frictions pill + panel, and the

  // Builds a mini three-zone card swatch: {a, q, s} are the Agreement mean,
  // R&C mean, and Agreement stdev to render, any of which may be null for
  // "unrated -> default zone styling". Used by the menu key and the legend.
  function miniCardEl(a, q, s, bodyText){
    var card = document.createElement("div");
    card.className = "swatch-chip";
    card.style.padding = "0";
    card.style.overflow = "hidden";
    var title = document.createElement("div");
    title.style.padding = "4px 6px";
    title.textContent = "title · A";
    if(a != null){
      var tc = zoneColorFor(a);
      title.style.background = tc.bg; title.style.color = tc.text;
    }
    var body = document.createElement("div");
    body.style.padding = "6px";
    body.style.whiteSpace = "pre-line";
    body.textContent = bodyText || "body · R&C";
    if(q != null){
      var qc = zoneColorFor(q);
      body.style.background = qc.bg; body.style.color = qc.text;
    }
    var bottom = document.createElement("div");
    bottom.style.padding = "3px 6px";
    bottom.style.fontSize = "8.5px";
    bottom.textContent = "consensus";
    if(s != null){
      var sc = consensusColorFor(s);
      bottom.style.background = sc.bg; bottom.style.color = sc.text;
    }
    card.appendChild(title); card.appendChild(body); card.appendChild(bottom);
    return card;
  }

  function renderColorKeySection(){
    var el = document.getElementById("menu-colorkey");
    el.innerHTML = "";
    var h = document.createElement("h4");
    h.textContent = "Color key — one spectrum, three zones";
    el.appendChild(h);
    var note = document.createElement("div");
    note.className = "menu-note";
    note.textContent = "Every cue shares ONE dark-gray (bad) → bright-white (good) spectrum; the "
      + "trait is told by WHICH ZONE of the card carries it (thin black rules separate adjacent "
      + "zones). Top bar = Agreement with the claim. Body = the leading phrasing's combined "
      + "Reasonableness & Clarity. Bottom bar = rating consensus (bright = tight, dark = "
      + "contentious/split — this is where \"contested\" shows). Edge lines use the same ramp for "
      + "their graded Agreement. The score ramps are nonlinear: scores below 3 share the bottom "
      + "~15% of the range, 3–5 gets the rest, so small differences among good scores stay "
      + "visible. Outlines mark node type: gold = ought, medium blue = evidence/external anchor. "
      + "An OUGHT is rated on democratic endorsement, not truth: its top bar runs dark → bright "
      + "GOLD (endorsement strength) instead of the truth-coded gray ramp. "
      + "The spread glyph sits on a lozenge whose body carries SAMPLE confidence against the "
      + "dataset's own thresholds (meta.config.phase2): red = below quorum, amber = below the "
      + "confirm bar, bar-coloured with just its border = confident. Convergence lifecycle is "
      + "separate: the consensus bar and Analytics carry it.";
    el.appendChild(note);
    var strip = document.createElement("div");
    strip.id = "ramp-strip";
    // One spectrum chip per half-point through the emphasised band (plus a
    // sub-knee reference) so the nonlinearity itself is inspectable.
    [2.0, 3.0, 3.75, 4.5, 5.0].forEach(function(score){
      var chip = document.createElement("div");

      var zc = zoneColorFor(score);
      chip.style.background = zc.bg;
      chip.style.color = zc.text;

    grid.id = "swatch-grid";
    // Fixed corner values (0 and 5 / stdev 0 and 2) rather than anything
    // from the loaded graph, so this is always a clean, independent
    // reference regardless of what's actually been rated. The four corners
    // demo that adjacent zones stay distinguishable in every combination.
    grid.appendChild(miniCardEl(5, 5, 0.2, "high A · high R&C\ntight consensus"));
    grid.appendChild(miniCardEl(5, 0, 1.6, "high A · low R&C\nsplit ratings"));
    grid.appendChild(miniCardEl(0, 5, 0.2, "low A · high R&C\ntight consensus"));
    grid.appendChild(miniCardEl(0, 0, 1.6, "low A · low R&C\nsplit ratings"));
    var unrated = document.createElement("div");
    unrated.className = "swatch-chip";
    unrated.style.gridColumn = "1 / -1";
    unrated.textContent = "unrated — default zone styling (no ratings yet) · outlines: gold = ought, blue = evidence";
    grid.appendChild(unrated);
    el.appendChild(grid);
  }

  /* =========================================================================
   * VIEWER-SPEC.md §4 item 3: persistent legend. The color key living only
   * inside the dot menu meant the zone encoding had no always-visible
   * explanation; this compact, collapsible key (bottom-left, both views)
   * carries a first-time reader through it. Built ONCE at boot -- content is
   * static, computed from the same zoneColorFor()/consensusColorFor() ramps
   * the cards use, so the bar honestly shows the score ramp's nonlinearity
   * too (the sub-3.5 band visibly shares the left quarter). Collapse state
   * is per-page-load only (a UI preference, not data -- no storage).
   * ========================================================================= */
  // The bar is a "score ruler": the colour AT position s along it is exactly
  // colorAt(s), the same function the cards call, so the knee reads honestly
  // as the left stretch staying near-constant dark. Sampled every 0.25 so
  // CSS's linear interpolation between stops can't visibly smear the knee.
  function legendGradient(colorAt){
    var stops = [];
    for(var s = 0; s <= 5; s += 0.25){
      stops.push(colorAt(s) + " " + (s/5*100) + "%");
    }
    return "linear-gradient(90deg, " + stops.join(", ") + ")";
  }
  function legendRow(glyphEl, text){
    var row = document.createElement("div");
    row.className = "legend-row";
    row.appendChild(glyphEl);
    var lab = document.createElement("span");
    lab.textContent = text;
    row.appendChild(lab);
    return row;
  }
  // §2.5: the fixed worked example the persistent legend's spread row
  // renders -- pulled out to a constant so updateChrome() can rebuild the
  // same glyph (or withhold it) every render, independent of buildLegend()'s
  // once-at-boot call.
  var LEGEND_SAMPLE_AGG = {mean:3.8, stdev:0.6, n:9, blocs:{b1:{mean:3.3, n:5}, b2:{mean:4.3, n:4}}};
  function buildLegend(){
    var legend = document.getElementById("legend");

    var head = document.createElement("div");
    head.className = "legend-head";
    var toggle = document.createElement("button");
    toggle.id = "legend-toggle";
    toggle.setAttribute("aria-expanded", "true");
    toggle.textContent = "Key ▾";
    toggle.addEventListener("click", function(){
      var collapsed = legend.hasAttribute("data-collapsed");
      if(collapsed) legend.removeAttribute("data-collapsed");
      else legend.setAttribute("data-collapsed", "");
      toggle.setAttribute("aria-expanded", String(collapsed));
      toggle.textContent = collapsed ? "Key ▾" : "Key ▸";
    });
    head.appendChild(toggle);
    legend.appendChild(head);

    var body = document.createElement("div");
    body.className = "legend-body";

    // The one shared spectrum, sampled through the score ramp.
    var specBar = document.createElement("span");
    specBar.className = "legend-bar";
    specBar.style.background = legendGradient(function(s){ return zoneColorFor(s).bg; });
    body.appendChild(legendRow(specBar, "one spectrum: dark = low / split · bright = high / tight"));

    // A mini three-zone card: which zone carries which trait.
    var mini = document.createElement("span");
    mini.className = "legend-minicard";
    [
      {label:"agree", c:zoneColorFor(4.4)},
      {label:"r & c", c:zoneColorFor(3.4)},
      {label:"±", c:consensusColorFor(1.2)}
    ].forEach(function(z){
      var d = document.createElement("div");
      d.textContent = z.label;
      d.style.background = z.c.bg;
      d.style.color = z.c.text;
      mini.appendChild(d);
    });
    body.appendChild(legendRow(mini,
      "zones: top = Agreement · body = phrasing R&C · bottom = consensus (an ought's top bar runs dark → gold: endorsement, not truth)"));

    var ought = document.createElement("span");
    ought.className = "legend-swatch--ought";
    body.appendChild(legendRow(ought, "gold outline = ought node"));

    var evid = document.createElement("span");
    evid.className = "legend-swatch--evidence";
    body.appendChild(legendRow(evid, "blue outline = evidence (points outside the graph)"));

    // HANDOFF-TO-UI §2.2: ghosts (demoted/superseded, never deleted) get
    // their own legend row -- the faded/greyed/sunk look is worth learning
    // up front, same as the ought/evidence outlines above.
    var ghost = document.createElement("span");
    ghost.className = "legend-swatch--ghost";
    body.appendChild(legendRow(ghost, "faded & sunk = ghost (demoted/superseded — kept, never deleted)"));

    // Line cues: brightness = graded edge Agreement (same spectrum),
    // thickness = strength; both at real strokeFor()/ramp values.
    var thick = svgEl("svg", {width:62, height:18});
    [1.5, 3.2, 4.6].forEach(function(s, i){
      var y = 4 + i*5;
      thick.appendChild(svgEl("line", {x1:2, y1:y, x2:60, y2:y,
        stroke:edgeRampColor(s), "stroke-width":strokeFor(s)*0.6, opacity:0.9}));
    });
    thick.style.flex = "0 0 auto";
    body.appendChild(legendRow(thick, "edge: brighter = higher Agreement · thicker/closer = stronger"));

    // Spread-strip cue (VIEWER-SPEC.md §4 item 1): a worked sample -- a
    // deliberately bimodal one, since that's the state the strip exists to
    // reveal -- so the glyph is learnable before it's first met on a card.
    // §2.5: built once at boot (before any dataset's rating_mode_only can be
    // known), so it can't gate itself through distStripEl/blind() the way a
    // live card does -- kept in LEGEND_SAMPLE_AGG and (re)built by
    // updateChrome() every render instead, so it still disappears the moment
    // Rating mode is on, by toggle or by auto-detect.
    var sample = distStripEl(LEGEND_SAMPLE_AGG, 62, 16);
    // shown inside a marginal (amber) lozenge so the glyph-on-lozenge look
    // is learnable here first
    var sampleWrap = document.createElement("span");
    sampleWrap.id = "legend-spread-wrap";
    sampleWrap.className = "dist-lozenge dist-lozenge--marginal";
    sampleWrap.style.flex = "0 0 auto";
    sampleWrap.style.lineHeight = "0";
    if(sample) sampleWrap.appendChild(sample);
    var spreadRow = legendRow(sampleWrap,
      "spread: band = ±stdev, dots = bloc means; lozenge = sample confidence (red: below quorum, amber: below the dataset's confirm bar, plain: confident); click one for analytics");
    // §2.5: this is a static worked EXAMPLE (built once at boot, before any
    // dataset's rating_mode_only can be known), not live data -- but it is
    // still literally the spread glyph, so blind Rating mode hides the row
    // rather than leave a "which glyph is this again" cue on screen. See
    // updateChrome(), which toggles it every render alongside the pill.
    spreadRow.id = "legend-spread-row";
    body.appendChild(spreadRow);

    var note = document.createElement("div");
    note.className = "legend-note";
    note.textContent = "Colours run 0 (left) → 5 (right); scores below 3 share the left ~15%. "
      + "The spread glyph's axis is plain 0–5.";
    body.appendChild(note);

    legend.appendChild(body);
  }

  /* =========================================================================
   * Neighborhood-view drag-to-pan + wheel-zoom.
   * Pans/zooms a CSS transform on #cards-layer/#edges-svg (see
   * applyNhTransform) — deterministic, no inertia/easing, so it already
   * respects prefers-reduced-motion without needing extra branching.
   * Dragging only starts on empty stage background (never on a card, so
   * card clicks still navigate to node-view undisturbed).
   * ========================================================================= */
  // ITERATION (user request): clicking EMPTY SPACE in detail view pulls
  // back out to the neighborhood, landing at the ~10-nearest zoom (same
  // landing rule as wheel-out). Empty space = the click reached the stage
  // itself (cards/labels/hit-lines all intercept their own clicks; the
  // cards/edges layers are pointer-events:none). Skipped while any panel,
  // dropdown, or the menu is open -- that click means "close it" (the
  // document-level closers already handle it), not "leave the view".
  stage.addEventListener("click", function(e){
    if(state.view !== "node") return;
    if(e.target !== stage) return;
    var somethingOpen = RIGHT_PANEL_IDS.some(function(pid){
      var el = document.getElementById(pid);
      return el && !el.hidden;
    }) || document.getElementById("title-drop")
      || !document.getElementById("menu-panel").hidden;
    if(somethingOpen) return;
    transitionToNeighborhoodFrom(state.focusKind, state.focusId);
  });

  var nhDrag = null;
  stage.addEventListener("mousedown", function(e){
    if(state.view !== "neighborhood") return;
    // ITEM 3: a card OR an edge's click-to-focus hit-area both need to
    // receive their own click uninterrupted by drag-pan starting underneath
    // them (mousedown fires before click).
    if(e.target.closest(".card") || e.target.classList.contains("edge-hit")) return;
    nhDrag = {startX:e.clientX, startY:e.clientY, origX:state.nh.panX, origY:state.nh.panY};
    stage.classList.add("dragging");
    e.preventDefault();
  });
  window.addEventListener("mousemove", function(e){
    if(!nhDrag) return;
    state.nh.panX = nhDrag.origX + (e.clientX - nhDrag.startX);
    state.nh.panY = nhDrag.origY + (e.clientY - nhDrag.startY);
    applyNhTransform();
  });
  window.addEventListener("mouseup", function(){
    if(!nhDrag) return;
    nhDrag = null;
    stage.classList.remove("dragging");
  });
  /* =========================================================================
   * CHANGE A — zoom-driven view transition (node view -> neighborhood view).
   * Zooming OUT while in node view (wheel down, or trackpad pinch-out —
   * browsers report pinch as a wheel event with ctrlKey set) transitions to
   * neighborhood view. A single accidental notch must not flip the view, and
   * the boundary must not flicker, so this requires a short accumulated
   * streak of OUTWARD notches (ZOOM_OUT_NOTCHES worth of deltaY, in "notch"
   * units) within a rolling window (ZOOM_OUT_WINDOW_MS); any inward wheel,
   * or a gap longer than the window, resets the streak to zero (hysteresis).
   * Node view itself has no zoom of its own (fixed deterministic layout), so
   * inward/neutral wheel there is a no-op other than resetting the streak —
   * normal page scroll (for tall node-view content) is left alone since we
   * only preventDefault for the ctrlKey/pinch case.
   * ========================================================================= */
  // ITERATION (user notes 2/3): wheel-down NEVER counts toward zoom-out
  // while the stage still has content to scroll to below (see the
  // canScrollDown check in the handler): scrolling and zooming-out are the
  // same physical gesture, so the view only starts listening for "pull
  // back" once you've actually hit the bottom (which includes a little
  // empty spacing below the lowest card -- see the scroll-spacer in
  // renderNodeView). With that guard in place the notch threshold went
  // back down to 2 -- 3 felt heavy once accidental trips were impossible.
  var ZOOM_OUT_NOTCHES    = 2;    // outward "notches" required to trigger the transition
  var ZOOM_OUT_WINDOW_MS  = 700;  // gap longer than this resets the streak
  var ZOOM_OUT_NOTCH_UNIT = 90;   // approx |deltaY| of one physical wheel notch

  function handleNodeViewWheel(e){
    if(e.ctrlKey) e.preventDefault(); // trackpad pinch-zoom synthesized as ctrl+wheel
    var outward = e.deltaY > 0;
    if(!outward){
      // any inward/neutral wheel cancels an in-progress outward streak
      state.zoomOut.accum = 0;
      state.zoomOut.lastTs = 0;
      return;
    }
    // While the stage can still scroll down, wheel-down means "scroll", not
    // "zoom out" -- reset the streak and let the native scroll happen.
    // Pinch (ctrlKey) bypasses: it never scrolls the page.
    if(!e.ctrlKey && stage.scrollTop + stage.clientHeight < stage.scrollHeight - 1){
      state.zoomOut.accum = 0;
      state.zoomOut.lastTs = 0;
      return;
    }
    var now = (window.performance && performance.now) ? performance.now() : Date.now();
    if(now - state.zoomOut.lastTs > ZOOM_OUT_WINDOW_MS) state.zoomOut.accum = 0;
    state.zoomOut.accum += Math.max(Math.abs(e.deltaY), 1) / ZOOM_OUT_NOTCH_UNIT;
    state.zoomOut.lastTs = now;
    if(state.zoomOut.accum >= ZOOM_OUT_NOTCHES){
      state.zoomOut.accum = 0;
      state.zoomOut.lastTs = 0;
      transitionToNeighborhoodFrom(state.focusKind, state.focusId);
    }
  }

  stage.addEventListener("wheel", function(e){
    if(state.view === "node"){ handleNodeViewWheel(e); return; }
    if(state.view !== "neighborhood") return;
    e.preventDefault();
    var rect = stage.getBoundingClientRect();
    var mx = e.clientX - rect.left, my = e.clientY - rect.top;
    var factor = e.deltaY < 0 ? 1.08 : 1/1.08;
    var newScale = Math.max(NH_ZOOM_MIN, Math.min(NH_ZOOM_MAX, state.nh.scale * factor));
    // keep the point under the cursor fixed while scaling
    var contentX = (mx - state.nh.panX) / state.nh.scale;
    var contentY = (my - state.nh.panY) / state.nh.scale;
    state.nh.panX = mx - contentX * newScale;
    state.nh.panY = my - contentY * newScale;
    state.nh.scale = newScale;
    applyNhTransform();
  }, {passive:false});

  /* =========================================================================
   * VIEWER-SPEC §4.8 — Introduction: a guided, spotlight-based walkthrough.
   * We're introducing an unfamiliar way of reading information, so a first-
   * time viewer gets a short, gentle tour on a LIVE graph (Debate -- its
   * top-level split n002 "A faithful map adds value" vs. n001 "Mapping won't
   * improve debate" packs the whole vocabulary into one focus view: grounds
   * on the left, a gold OUGHT dependent on the right, a rival stacked
   * vertically). The tour forces Reading mode so the consensus colours it
   * explains are actually visible, drives the viewer through real states, and
   * spotlights the element under discussion. Pure DOM + the viewer's own
   * navigation functions; no data mutated, deterministic.
   * ========================================================================= */
  var introState = { active:false, i:0 };

  function introFocusN002(){
    state.ratingMode = false;                 // the tour explains the colours -> must be readable
    state.shortcutRedundant = computeRedundantShortcuts();

  // Scroll the stage so the focus card sits vertically centred in the viewport.
  // Cards don't animate during the tour (body.intro-running), so this measures
  // and lands on settled positions.
  function introCenterFocus(){
    var fc = document.querySelector(".card--focus");
    if(!fc) return;
    var r = fc.getBoundingClientRect();
    stage.scrollTop += (r.top + r.height/2) - window.innerHeight/2;
    stage.scrollLeft = 0;
  }
  function introShowMap(){
    state.ratingMode = false;

  }
  // Union box of every neighbour card sitting to the LEFT of the focus card =
  // "the grounds", so the spotlight frames the whole support column at once.
  function introGroundsRect(){
    var focus = document.querySelector(".card--focus");
    if(!focus) return null;
    var fr = focus.getBoundingClientRect();
    var nbrs = document.querySelectorAll(".card--nbr");
    var r = null;
    for(var i=0;i<nbrs.length;i++){
      var b = nbrs[i].getBoundingClientRect();
      if(b.right <= fr.left + 6){
        if(!r) r = {left:b.left, top:b.top, right:b.right, bottom:b.bottom};
        else { r.left=Math.min(r.left,b.left); r.top=Math.min(r.top,b.top);
               r.right=Math.max(r.right,b.right); r.bottom=Math.max(r.bottom,b.bottom); }
      }
    }
    return r ? {left:r.left, top:r.top, width:r.right-r.left, height:r.bottom-r.top} : null;
  }

  function introRectOf(t){
