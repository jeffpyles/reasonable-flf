   * snapshot actually carries. graph.json aggregates have NO per-rating
   * list (only mean/stdev/n + per-bloc mean/n + bloc_divergence), so a true
   * histogram is NOT derivable here; this strip renders exactly the spread
   * information that exists rather than fabricating bar heights. The spec's
   * full histogram needs the rating log exported into the snapshot first.
   * Below DIST_MIN_N raters the strip is grayed, not hidden (the spec's
   * "gray/suppress below ~5" -- a 3-rating spread is noise, but hiding it
   * entirely would make low-n nodes look identical to unrated ones).
   * ========================================================================= */
  // Thresholds come from the DATASET's own engine config when present
  // (meta.config.phase2.quorum/confirm) -- the v2 flagships ship
  // confirm:15, not the 10 the earlier snapshots used -- with the
  // original 5/10 as fallbacks for older graphs.
  var DIST_MIN_N = 5;
  function quorumN(){
    var p2 = state.graph && state.graph.meta && state.graph.meta.config && state.graph.meta.config.phase2;
    return (p2 && p2.quorum) || DIST_MIN_N;
  }
  function confirmN(){
    var p2 = state.graph && state.graph.meta && state.graph.meta.config && state.graph.meta.config.phase2;
    return (p2 && p2.confirm) || DIST_CONFIRM_N;
  }
  function blocsOf(agg){
    var bl = (agg && agg.blocs) || {};
    return Object.keys(bl).sort().map(function(k){
      var b = bl[k] || {};
      return {id:k, mean:b.mean, n:b.n || 0};
    }).filter(function(b){ return b.mean != null; });
  }
  // One aggregate block -> a standalone inline <svg> strip, or null when
  // there's nothing showable (no ratings, or sealed = mean withheld). Drawn
  // in currentColor so it inherits whatever text colour the card's body
  // fill picked (see .dist-row callers).
  // ITERATION (user notes 3): the glyph's axis is LINEAR again -- the
  // earlier zoomed-3-5 axis traded at-a-glance legibility for range
  // emphasis, and the glyph has enough room to show 0-5 evenly. (Only the
  // COLOUR ramps stay nonlinear.) The glyph itself always draws in the
  // standard zone ink; rating confidence is carried by the LOZENGE the
  // card wraps it in (user notes 4 -- see distConfidenceClass and the
  // .dist-lozenge CSS), red below the engine's quorum (DIST_MIN_N), amber
  // when marginal (provisional / below the confirm threshold,
  // DIST_CONFIRM_N), bottom-bar-coloured once confident. This replaces the
  // "(provisional)" text everywhere and the old gray low-n treatment.
  // Panel strips stay lozenge-less since the panel spells n out.
  var DIST_CONFIRM_N = 10;
  // Iteration fix (user report: amber at n=20): the lozenge tracks SAMPLE
  // SIZE only -- red below the engine's quorum, amber below its confirm
  // threshold, neutral from n>=10 regardless of lifecycle state. The
  // earlier rule also fired amber on state==="provisional", which conflated
  // convergence lifecycle with sampling confidence: a well-sampled n=20
  // aggregate can sit provisional (not yet settled/contested) for reasons
  // the consensus bar and Analytics already express.
  function distConfidenceClass(agg){
    if(!agg || !(agg.n > 0)) return "";
    if(agg.n < quorumN()) return " dist-lozenge--insufficient";
    if(agg.n < confirmN()) return " dist-lozenge--marginal";
    return "";
  }
  function distStripEl(agg, w, h){
    // §2.5: blind Rating mode kills every glyph/lozenge; bottom bars keep
    // only the comment icon.
    if(blind()) return null;
    if(!agg || agg.mean == null || !(agg.n > 0) || agg.state === "sealed") return null;
    var padX = 6;
    // top band carries the mean's numeric label; the axis sits below it
    var labelH = Math.min(9, h * 0.42), mid = labelH + (h - labelH) / 2;
    function X(s){ return padX + (Math.max(0, Math.min(5, s)) / 5) * (w - 2*padX); }
    var el = svgEl("svg", {width:w, height:h, "class":"dist-strip"});
    // DORMANT (user notes, per data gap): when the rating engine starts
    // exporting binned counts into snapshots (`histogram: [c0..ck]`, bins
    // spanning 0-5 left->right), render a TRUE histogram -- bars (widths
    // following the zoomed axis) + the labelled mean tick -- instead of the
    // aggregate-derived spread glyph below. No bundled snapshot carries
    // this field yet.
    var drewBars = false;
    if(Array.isArray(agg.histogram) && agg.histogram.length){
      var maxC = Math.max.apply(null, agg.histogram);
      if(maxC > 0){
        drewBars = true;
        // Assessment's bin contract (comms #36 / PR #39): histogram[i] =
        // count of ratings ROUNDING to value i, i.e. bins are CENTERED on
        // the values i*5/(k-1) (k=6 -> integers 0..5) with half-step edges,
        // clamped at the scale ends -- not an even edge-partition of 0-5.
        // Generalizes unchanged if the export ever moves to half-point
        // resolution (k=11 -> centers 0,0.5,..,5).
        var k = agg.histogram.length;
        var step = (k > 1) ? 5 / (k - 1) : 5;
        agg.histogram.forEach(function(c, i){
          var center = i * step;
          var x0 = X(Math.max(0, center - step / 2)), x1 = X(Math.min(5, center + step / 2));
          var bh = (c / maxC) * (h - labelH - 3);
          el.appendChild(svgEl("rect", {
            x: x0 + 0.5, y: h - 1 - bh,
            width: Math.max(1, x1 - x0 - 1), height: Math.max(0.5, bh),
            fill:"currentColor", opacity:0.6
          }));
        });
      }
    }
    if(!drewBars){
      // plain even 0-5 axis with end ticks
      el.appendChild(svgEl("line", {x1:X(0), y1:mid, x2:X(5), y2:mid,
        stroke:"currentColor", "stroke-width":1, opacity:0.28}));
      [0, 5].forEach(function(s){
        el.appendChild(svgEl("line", {x1:X(s), y1:mid-3, x2:X(s), y2:mid+3,
          stroke:"currentColor", "stroke-width":1, opacity:0.28}));
      });
      if(agg.stdev != null){
        var lo = X(agg.mean - agg.stdev), hi = X(agg.mean + agg.stdev);
        el.appendChild(svgEl("rect", {x:lo, y:mid - (h-labelH)*0.2, width:Math.max(1, hi-lo),
          height:(h-labelH)*0.4, rx:2, fill:"currentColor", opacity:0.16}));
      }
      blocsOf(agg).forEach(function(b){
        var r = Math.max(2, Math.min((h-labelH)*0.26, 1.6 + Math.sqrt(b.n)));
        el.appendChild(svgEl("circle", {cx:X(b.mean), cy:mid, r:r,
          fill:"currentColor", opacity:0.5}));
      });
    }
    // labelled mean tick (the number replaces the bottom bar's old score text)
    var mx = X(agg.mean);
    el.appendChild(svgEl("line", {x1:mx, y1:labelH + 1, x2:mx, y2:h - 1,
      stroke:"currentColor", "stroke-width":2, opacity:0.95}));
    var label = svgEl("text", {
      x: Math.max(9, Math.min(w - 9, mx)), y: labelH - 1,
      "text-anchor":"middle", "font-size":"8.5",
      "font-family":"Inter,sans-serif", fill:"currentColor", opacity:0.95
    });
    label.textContent = agg.mean.toFixed(1);
    el.appendChild(label);
    return el;
  }
  // Hover tooltip for a strip -- spells the same facts out in words, since
  // the strip is a new glyph a first-time reader hasn't learned yet.
  function distStripTitle(label, agg){
    var t = label + " spread: mean " + agg.mean.toFixed(1);
    if(agg.stdev != null) t += " ±" + agg.stdev.toFixed(1);
    var bl = blocsOf(agg);
    if(bl.length){
      t += " · bloc means " + bl.map(function(b){
        return b.mean.toFixed(1) + " (n=" + b.n + ")";
      }).join(" / ");
    }
    if(agg.n < quorumN()) t += " · only n=" + agg.n + " — below quorum " + quorumN() + " (red lozenge)";
    else if(agg.n < confirmN()) t += " · n=" + agg.n + " — below confirm " + confirmN() + " (amber lozenge)";
    return t + " · click for detail";
  }

  /* =========================================================================
   * Strength -> proximity (FROZEN rule, §1b / §4b / Feature Discussions #11)
   * distance is monotonically DECREASING in strength (stronger = closer).
   * A literal d = k/strength blows past the viewport for weak (strength=1)
   * edges and collides with card geometry for very strong ones, so we clamp
   * with a floor (card-overlap avoidance) and express the 1/strength falloff
   * on top of it: d(strength) = MIN + RANGE/strength. Relative ordering and
   * spacing between neighbors is still governed purely by 1/strength; the
   * floor only keeps things on-screen and non-overlapping. Line thickness
   * uses the same `strength` value directly, uncapped in spirit (clamped
   * only to a sane pixel range).
   * ========================================================================= */
  function distFor(strength, min, range){
    var s = Math.max(strength, 1);
    return min + range / s;
  }
  function strokeFor(strength){
    return Math.max(1.4, Math.min(9, 1.3 + strength * 1.15));
  }
  // ASSESSMENT-SPEC.md Amendments (graded edge Agreement): an edge's VISUAL
  // weight -- line thickness everywhere, and detail-view proximity (node
  // view's grounds/dependents, edge-detail view) -- prefers its graded
  // Agreement mean (0-5, same raw scale strokeFor/distFor already expect)
  // when the edge has at least one graded rating, falling back to the
  // original structural `strength` (agrees+1) exactly as before otherwise.
  // The structural `agrees`/`strength` FIELDS themselves are never touched
  // by this (see the edge focus card's structural meta line and every
  // "strength N" badge below, still real structural numbers) -- only which value feeds
  // strokeFor()/distFor() changes. Neighborhood view's spring-layout REST
  // LENGTH (its organic-clustering physics, not a "detail view distance")
  // deliberately keeps using structural `strength` only -- see forceLayout.
  function edgeVisualStrength(edge){
    // §2.5: blind Rating mode falls back to structural strength only --
    // this also re-blinds proximity, thickness, and shortcut computation,
    // every one of which is derived from this single function.
    if(blind()) return (edge && edge.strength != null) ? edge.strength : 1;
    var agr = edge && edge.agreement;
    if(agr && agr.n > 0) return agr.mean;
    return (edge && edge.strength != null) ? edge.strength : 1;
  }

  var GROUND_MIN = 235, GROUND_RANGE = 250;     // node-view grounds/dependents
  // Port convention (CHANGE B): node-view ground/dependent lines attach at
  // the focus card's left/right EDGES and the neighbor card's opposite
  // edge, never at centers — grounds dock on the focus's left edge,
  // dependents leave from its right edge. Half-widths below match the CSS
  // (.card--focus width:340px, .card--nbr width:150px).
  var FOCUS_HALF_W = 170, NBR_HALF_W = 75;

  /* =========================================================================
   * DOM building blocks
   * ========================================================================= */
  function clearStage(){
    cardsLayer.innerHTML = "";
    while(svg.firstChild) svg.removeChild(svg.firstChild);
  }
  function svgEl(tag, attrs){
    var el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for(var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }
  // strokeColor/dashed are optional (PHASE2-SPEC.md §7, conjunction group
  // Agreement): omitted, this is exactly the original plain --line stroke.
  // opacity (HANDOFF-TO-UI §2.2) is optional too: omitted, the original
  // fixed 0.85; a ghost edge passes a lower value to fade with its card.
  function line(x1,y1,x2,y2,strength,extraClass,strokeColor,dashed,opacity){
    var attrs = {
      x1:x1, y1:y1, x2:x2, y2:y2,
      stroke: strokeColor || "var(--line)", "stroke-width": strokeFor(strength),
      "stroke-linecap":"round", opacity: (opacity != null ? opacity : 0.85)
    };
    if(dashed) attrs["stroke-dasharray"] = "6,5";
    var el = svgEl("line", attrs);
    if(extraClass) el.setAttribute("class", extraClass);
    svg.appendChild(el);
    return el;
  }
  // ITEM 3: draws a real ground/dependent edge's visible line PLUS an
  // invisible, generously-wide "hit" line on top of it (see .edge-hit CSS --
  // pointer-events:stroke, transparent stroke) so clicking anywhere near the
  // thin visible stroke focuses that edge in detail view. Only ever called
  // for an actual ground_edges[] record -- the AND-bracket's junction->focus
  // line is a rendering artifact of the conjunction group, not a real edge,
  // and keeps using plain line() with no hit target.
  function groundEdgeLine(x1,y1,x2,y2,edge){
    var vs = edgeVisualStrength(edge);
    // User notes: edge lines carry the same dark->white Agreement colour cue
    // as card zones (brightness = graded Agreement of the inference);
    // unrated edges keep the neutral --line stroke.
    // §2.3: a redundant shortcut (still drawn when showShortcuts reveals it)
    // reads very faint too, same slot as ghost fade, ghost wins if both apply.
    var op = edgeGhostOpacity(edge);
    if(op == null && isRedundantShortcut(edge)) op = 0.35;
    line(x1,y1,x2,y2,vs,null,edgeStrokeColor(edge),null,op);
    var hitW = Math.max(14, strokeFor(vs) + 10);
    var hit = svgEl("line", {
      x1:x1, y1:y1, x2:x2, y2:y2,
      stroke:"transparent", "stroke-width": hitW, "class":"edge-hit"
    });
    hit.addEventListener("click", function(ev){
      ev.stopPropagation();
      switchToEdgeDetail(edge.id);
    });
    svg.appendChild(hit);
  }
  // color is optional (PHASE2-SPEC.md §7): omitted, this is exactly the
  // original fixed --accent dot (via the .junction CSS class).
  function junctionDot(x,y,color){
    var el = svgEl("circle", {cx:x, cy:y, r:3.2, "class":"junction"});
    if(color) el.style.fill = color;
    svg.appendChild(el);
  }
  function bracketLabel(x,y,text){
    var t = svgEl("text", {x:x, y:y, "class":"bracket-label", "text-anchor":"middle"});
    t.textContent = text;
    svg.appendChild(t);
  }
  function colLabel(x,y,text){
    var d = document.createElement("div");
    d.className = "col-label";
    d.style.left = x+"px"; d.style.top = y+"px";
    d.textContent = text;
    cardsLayer.appendChild(d);
  }
  function emptyNote(x,y,text){
    var d = document.createElement("div");
    d.className = "empty-note";
    d.style.left = x+"px"; d.style.top = y+"px";
    d.textContent = text;
    cardsLayer.appendChild(d);
  }

  // FORUMS-SPEC.md §4, node view only: a small label at a Ground/Dependent
  // edge's MIDPOINT (never a line to it -- "the reference is data, not
  // geometry"). Shows the primary typing's resolved text when the edge has
  // one (clickable: re-centers on the referenced trunk node, or -- when the
  // typing is a free-text label with no node ref -- opens the forum panel,
  // since there's nothing to navigate to). Renders nothing for an untyped
  // edge. ITERATION (user notes 2): the label's comment-count chip is GONE
  // -- comments are represented on the edge focus card instead, keeping the
  // map cleaner.
  // ITEM 3: clicking the label's own background (anywhere that isn't the
  // typing-text span, which stopPropagation()s) focuses the EDGE itself in
  // detail view.
  function edgeForumLabel(x1, y1, x2, y2, edge){
    var text = primaryTypingText(edge);
    if(!text) return;
    var wrap = document.createElement("div");
    wrap.className = "typing-label ui";
    wrap.style.left = ((x1+x2)/2) + "px";
    wrap.style.top  = ((y1+y2)/2) + "px";
    wrap.style.cursor = "pointer";
    wrap.title = "focus this edge";
    wrap.addEventListener("click", function(ev){
      ev.stopPropagation();
      switchToEdgeDetail(edge.id);
    });
    var t = primaryTyping(edge);
    var isRef = !!(t && t.node);
    var span = document.createElement("span");
    span.className = "typing-text" + (isRef ? " is-ref" : "");
    span.textContent = text;
    span.title = (isRef ? "typed as: " : "typing: ") + text;
    span.addEventListener("click", function(ev){
      ev.stopPropagation();
      if(isRef) setFocusNode(t.node);      // the wormhole: re-center on the trunk node
      else openForumPanel("edge", edge.id); // label-only typing: nothing to navigate to
    });
    wrap.appendChild(span);
    cardsLayer.appendChild(wrap);
  }

  // Iteration notes: the comment affordance is a bare icon -- no count
  // number -- grayed out (but still clickable, the forum stays reachable)
  // when there are no comments yet. The count lives in the tooltip.
  function commentChipEl(kind, id, count){
    var chip = document.createElement("span");
    chip.className = "comment-chip ui" + (count ? "" : " comment-chip--empty");
    chip.textContent = "💬";
    chip.title = count
      ? count + " comment" + (count === 1 ? "" : "s") + " — open the forum"
      : "no comments yet — open the forum";
    chip.addEventListener("click", function(ev){
      ev.stopPropagation();
      openForumPanel(kind, id);
    });
    return chip;
  }

  function makeCard(opts){
    // opts: {node, x, y, cls, focus(bool), clickable(bool), badge, onClick}
    // CARD REDESIGN (user notes, 2026-07): three stacked zones on one
    // dark->white spectrum -- title bar = Agreement, body = leading
    // phrasing's R&C, bottom bar = rating consensus. Non-focus cards
    // collapse body/bottom to slim colour-only strips; the focus card's
    // zones are also the detail-view AFFORDANCES (title -> alternate-titles
    // popdown, body -> phrasings panel, bottom -> analytics + forum).
    var node = opts.node;
    var el = document.createElement("div");
    // Kind is encoded by OUTLINE colour now, not a text label (iteration
    // notes: main view as clean as possible; the analytics panel spells the
    // kind out in text): gold = ought, medium blue = evidence (incl. the
    // current grammar's external_anchor), plain hairline = claim.
    el.className = "card " + opts.cls
      + (node.kind === "external_anchor" || node.kind === "evidence" ? " evidence" : "")
      + (node.kind === "ought" ? " ought" : "")
      + (isGhost(node) ? " ghost" : "");
    // Inert marker (like edges' data-from/data-to): lets the Introduction tour
    // spotlight a specific node's card by id without matching on title text.
    el.setAttribute("data-node-id", node.id);
    el.style.left = opts.x + "px";
    el.style.top  = opts.y + "px";

    var cc = cardColorsFor(node);

    // --- zone 1: title bar (Agreement) ---
    var titleZone = document.createElement("div");
    titleZone.className = "zone-title";
    if(cc.title){
      titleZone.style.background = cc.title.bg;
      titleZone.style.color = cc.title.text;
    }
    // HANDOFF-TO-UI §2.2: ghosts keep their record reachable -- say WHY on hover.
    if(isGhost(node)){
      titleZone.title = "ghost — " + ghostProvenanceText(node);
    }
    var titleTxt = document.createElement("div");
    titleTxt.className = "txt";
    titleTxt.textContent = titleOf(node);
    titleZone.appendChild(titleTxt);
    if(opts.badge){
      var b = document.createElement("div");
      b.className = "strength-badge";
      b.textContent = opts.badge;
      titleZone.appendChild(b);
    }
    // HANDOFF-TO-UI §2.6: a node in the polls array has its TYPE under
    // contest -- distinct from Agreement-contested. While unresolved (or
    // resolved but awaiting the era-turning reopen) the node still renders
    // as its CURRENT kind; this pill is the cue that a change is in flight.
    var poll = pollForNode(node.id);
    if(poll && (!poll.resolved || poll.reopen_required)){
      var pb = document.createElement("div");
      pb.className = "poll-badge";
      pb.textContent = poll.resolved
        ? ("re-typed → " + (poll.resolved_kind || "?") + " · flip pending")
        : "type under vote";
      if(opts.focus){
        pb.title = "type-resolution poll — click for tallies";
        pb.addEventListener("click", function(ev){
          ev.stopPropagation();
          openAssessmentPanel("node", node.id);
        });
      }
      titleZone.appendChild(pb);
    }
    el.appendChild(titleZone);

    // --- zone 2: body (leading phrasing, coloured by ITS R&C) ---
    var bodyZone = document.createElement("div");
    bodyZone.className = "zone-body" + (opts.focus ? "" : " zone-strip");
    if(cc.body){
      bodyZone.style.background = cc.body.bg;
      bodyZone.style.color = cc.body.text;
    }
    if(opts.focus){
      // Iteration notes: body carries ONLY the phrasing (plus an anchor's
      // source pointer, which is content, not metadata). R&C numbers moved
      // to the phrasings/analytics panels; author/created to analytics.
      var txt = document.createElement("div");
      txt.className = "txt";
      txt.textContent = phrasingOf(node) || titleOf(node);
      bodyZone.appendChild(txt);

      // HANDOFF-TO-UI §2.1 (Graphs export): Evidence nodes carry a resolved
      // source object {ref, title, url}. Name the study at the foot of the
      // body zone; title falls back to ref for self-describing free-text
      // sources, so it is always safe to render. Link it when url is present.
      // Legacy source_ref stays a fallback for pre-export snapshots.
      var srcObj = node.source;
      var srcTitle = srcObj ? (srcObj.title || srcObj.ref) : node.source_ref;
      if(srcTitle){
        var src = document.createElement("div");
        src.className = "src";
        src.appendChild(document.createTextNode("Source: "));
        if(srcObj && srcObj.url){
          var link = document.createElement("a");
          link.href = srcObj.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = srcTitle;
          link.addEventListener("click", function(ev){ ev.stopPropagation(); });
          src.appendChild(link);
        } else {
          src.appendChild(document.createTextNode(srcTitle));
        }
        bodyZone.appendChild(src);
      }
    }
    el.appendChild(bodyZone);

    // --- zone 3: bottom bar (consensus; the analytics zone in detail view) ---
    var bottomZone = document.createElement("div");
    bottomZone.className = "zone-bottom" + (opts.focus ? "" : " zone-strip");
    if(cc.bottom){
      bottomZone.style.background = cc.bottom.bg;
      bottomZone.style.color = cc.bottom.text;
    }
    if(opts.focus){
      // Iteration notes: no score text here any more -- the glyph itself is
      // centered and carries the mean as a label; state/n/era live in the
      // analytics panel. The glyph is a histogram once snapshots carry
      // binned counts; the honest band+bloc-dots spread strip until then.
      // The BAR itself also opens analytics -- a sealed/unrated target has
      // no glyph, and analytics (state, ghost provenance, polls) must stay
      // reachable regardless. Glyph/chip clicks stopPropagation as before.
      bottomZone.style.cursor = "pointer";
      bottomZone.title = "analytics";
      bottomZone.addEventListener("click", function(ev){
        ev.stopPropagation();
        openAssessmentPanel("node", node.id);
      });
      var a = node.agreement || {mean:null, n:0};
      var aggStrip = distStripEl(a, 150, 24);
      if(aggStrip){
        var distRow = document.createElement("span");
        distRow.className = "dist-row dist-lozenge" + distConfidenceClass(a);
        distRow.title = distStripTitle(node.kind === "ought" ? "Endorsement" : "Agreement", a);
        distRow.appendChild(aggStrip);
        distRow.addEventListener("click", function(ev){
          ev.stopPropagation();
          openAssessmentPanel("node", node.id);
        });
        bottomZone.appendChild(distRow);
      }
      bottomZone.appendChild(commentChipEl("node", node.id, commentsOf(node).length));
    }
    el.appendChild(bottomZone);

    // --- focus-card zone affordances ---
    if(opts.focus){
      titleZone.title = "click for alternate titles & their ratings";
      titleZone.addEventListener("click", function(ev){
        ev.stopPropagation();
        toggleTitleDrop(node, opts.x, opts.y, el, titleZone);
      });
      bodyZone.title = "leading phrasing — click for alternate phrasings & their ratings";
      bodyZone.addEventListener("click", function(ev){
        ev.stopPropagation();
        openPhrasingsPanel(node.id);
      });
    }

    if(opts.clickable !== false && !opts.focus){
      // opts.onClick lets a caller (e.g. neighborhood view) override the
      // default "re-center node-view on this node" behavior; when omitted,
      // existing node-view behavior is unchanged.
      el.addEventListener("click", opts.onClick || function(){ setFocusNode(node.id); });
    }
    cardsLayer.appendChild(el);
    return el;
  }

  /* =========================================================================
   * User notes: clicking the focus card's TITLE BAR pops down the node's
   * alternate titles, each with its rating on the right, best cumulative
   * rating first. The popdown is a cardsLayer sibling (the card clips its
   * own overflow) positioned just under the title zone; it closes on outside
   * click, on toggle, or on any re-render (cardsLayer is rebuilt).
   * DATA GAP: bundled snapshots have no title A/R/C aggregates, so ranking
   * falls back to the structural `agrees` count -- rating text will show
   * real A/R/C means automatically once the engine exports them.
   * ========================================================================= */
  function toggleTitleDrop(node, x, y, cardEl, titleZone){
    if(document.getElementById("title-drop")){ closeTitleDrop(); return; }
    var drop = document.createElement("div");
    drop.id = "title-drop";
    drop.className = "title-drop ui";

    var titles = (node.titles || []).slice().sort(byCumulativeThenAgrees(["A","R","C"]));
    if(!titles.length){
      var none = document.createElement("div");
      none.className = "title-drop-item";
      none.textContent = "no titles yet";
      none.style.fontStyle = "italic";
      drop.appendChild(none);
    }
    titles.forEach(function(t){
      var row = document.createElement("div");
      var isPrimary = node.primary_title === t.id;
      row.className = "title-drop-item" + (isPrimary ? " is-primary" : "");
      var label = document.createElement("span");
      if(isPrimary){
        var star = document.createElement("span");
        star.className = "ty-star"; star.textContent = "★";
        label.appendChild(star);
      }
      var textSpan = document.createElement("span");
      textSpan.textContent = t.text;
      label.appendChild(textSpan);
      var rating = document.createElement("span");
      rating.className = "td-rating";
      // §2.5: blind Rating mode withholds the rating summary/agrees text.
      if(blind()){
        rating.textContent = "withheld";
      } else {
        var summary = ratingSummaryText(t.scores, ["A","R","C"], ["A","R","C"]);
        rating.textContent = summary || ("agrees " + (t.agrees || 0));
      }
      row.appendChild(label);
      row.appendChild(rating);
      drop.appendChild(row);
    });
    var note = document.createElement("div");
    note.className = "title-drop-note";
    note.textContent = "ranked by cumulative rating (falls back to agrees — no title A/R/C in this snapshot yet)";
    drop.appendChild(note);

    // position: spanning the card's width, just below the title zone
    var cardTop = y - cardEl.offsetHeight/2;
    drop.style.left = x + "px";
    drop.style.top = (cardTop + titleZone.offsetHeight + 6) + "px";
    drop.style.width = (cardEl.offsetWidth - 14) + "px";
    drop.style.transform = "translateX(-50%)";
    cardsLayer.appendChild(drop);
  }
  function closeTitleDrop(){
    var d = document.getElementById("title-drop");
    if(d && d.parentNode) d.parentNode.removeChild(d);
  }
  document.addEventListener("click", function(e){
    var d = document.getElementById("title-drop");
    if(d && !d.contains(e.target)) closeTitleDrop();
  });

  // ITEM 1 / renamed from setFocus(): focuses a NODE (the original, still-
  // default behavior). See setFocusEdge() below for the new edge-focus mode.
  function setFocusNode(id){
    if(!getNode(id)) return;
    state.focusKind = "node";
    state.focusId = id;
    // §2.3: shortcuts re-hide on each new focus; surfacing them is a
    // per-focus/expand action, not something that sticks across a re-focus.
    state.showShortcuts = false;
    render();
  }
  // ITEM 3: focuses a ground EDGE -- makes it the centered item in detail
  // view (renderEdgeDetailView(), dispatched from render() by focusKind).
  function setFocusEdge(id){
    if(!findEdge(id)) return;
    state.focusKind = "edge";
    state.focusId = id;
    // §2.3: shortcuts re-hide on each new focus; surfacing them is a
    // per-focus/expand action, not something that sticks across a re-focus.
    state.showShortcuts = false;
    render();
  }

  /* =========================================================================
   * Slot layout (deterministic vertical stacking, NOT a force simulation)
   * ========================================================================= */
  function buildGroundSlots(edges){
    var groups = {}, singles = [];
    edges.forEach(function(e){
      if(e.group){ (groups[e.group] = groups[e.group] || []).push(e); }
      else singles.push(e);
    });
    var slots = [];
    Object.keys(groups).forEach(function(gid){
      var es = groups[gid];
      var rep = Math.max.apply(null, es.map(function(e){ return edgeVisualStrength(e); }));
      slots.push({type:"group", gid:gid, edges:es, rep:rep});
    });
    singles.forEach(function(e){ slots.push({type:"single", edge:e, rep:edgeVisualStrength(e)}); });
    slots.sort(function(a,b){ return b.rep - a.rep; });
    return slots;
  }

  /* =========================================================================
   * Vertical stacking for a column of slots (grounds or dependents).
   * Each slot gets one "row" of height `rowH`; a conjunction-group slot with
   * N members gets N rows (one per member) so members never overlap each
   * other or their neighbors — this replaced an earlier alternating fan that
   * under-allocated space for groups. Order is strongest-first (top), which
   * combined with distFor() also puts the strongest slot closest to the
   * focus horizontally.
   * ========================================================================= */
  function layoutSlots(slots, rowH){
    var totalUnits = slots.reduce(function(sum,s){
      return sum + (s.type === "group" ? s.edges.length : 1);
    }, 0);
    var totalHeight = Math.max(totalUnits, 1) * rowH;
    var cursor = -totalHeight/2;
    return slots.map(function(s){
      var units = s.type === "group" ? s.edges.length : 1;
      var span = units*rowH;
      var yOffset = cursor + span/2;
      cursor += span;
      return {slot:s, yOffset:yOffset, span:span, units:units};
    });
  }

  /* =========================================================================
   * NODE VIEW
   * ========================================================================= */
  function renderNodeView(){
    var focus = getNode(state.focusId);
    if(!focus) return;
    var W = stage.clientWidth, H = stage.clientHeight;
    var cx = W/2, cy = Math.max(300, H*0.58);
    var rowH = Math.max(96, Math.min(130, H*0.16));
    var maxHalf = Math.max(300, cx - 110);

    // --- Focus card --- (element kept: the antithesis column below stacks
    // against its real measured height)
    var focusCardEl = makeCard({node:focus, x:cx, y:cy, cls:"card--focus", focus:true, clickable:false});
    var focusH = focusCardEl.offsetHeight || 200;

    // --- Antithesis pre-pass (ITERATION, user request) ---
    // Member cards are created and MEASURED before any layout so the view
    // can reserve real headroom ABOVE the focus for the stronger rivals.
    // Previously a tall above-stack ran into the SAFE_TOP clamp and its
    // cards piled onto one spot; now cy shifts DOWN as needed (into
    // ordinary scrollable space), so top cards lay out exactly like the
    // bottom ones. Positions are assigned in the antitheses block below.
    var allSets = setsContaining(focus.id);
    var sets = allSets.filter(function(s){ return !isGhost(s); });
    var ghostSets = allSets.length - sets.length;
    var ANTI_GAP = 30;    // vertical gap between column cards
    // SAFE_TOP: stage-local floor so a card can never land at/above y=0
    // (under the fixed topbar, unreachable -- overflow:auto only scrolls
    // positive overflow). With the reserved headroom this is now a
    // belt-and-braces floor rather than a working clamp.
    var SAFE_TOP = 46;
    // Rank key: the member NODE's own community Agreement mean (that is the
    // "Agreement strength" being compared); unrated/sealed rivals rank last.
    function antiStrength(nodeId){
      var mn = getNode(nodeId);
      var a = mn && mn.agreement;
      return (a && a.n > 0 && a.state !== "sealed" && a.mean != null) ? a.mean : -1;
    }
    var antiSets = sets.map(function(set){
      // §2.5: in Rating mode the column orders by the structural belonging
      // count, not the community-Agreement consensus (that consensus is
      // exactly what blind mode withholds).
      var members = set.members.slice().sort(function(a,b){
        return blind() ? (b.belonging - a.belonging) : (antiStrength(b.node) - antiStrength(a.node));
      });
      var focusIdx = -1;
      members.forEach(function(m, i){ if(m.node === focus.id) focusIdx = i; });
      function mkCards(list){
        var out = [];
        list.forEach(function(m){
          var mn = getNode(m.node);
          if(!mn) return;
          var el = makeCard({node:mn, x:cx, y:-9999, cls:"card--anti",
            badge:"belonging " + m.belonging});
          out.push({el:el, h: el.offsetHeight || 60});
        });
        return out;
      }
      return {
        above: mkCards(focusIdx >= 0 ? members.slice(0, focusIdx) : members),
        below: mkCards(focusIdx >= 0 ? members.slice(focusIdx + 1) : [])
      };
    });
    var aboveNeed = 0;
    antiSets.forEach(function(s){
      s.above.forEach(function(c){ aboveNeed += c.h + ANTI_GAP; });
    });
    if(aboveNeed) aboveNeed += 26;  // headroom for the set label above the top card
    var cyShifted = false;
    if(cy - focusH/2 - aboveNeed < SAFE_TOP){
      cy = SAFE_TOP + aboveNeed + focusH/2;
      focusCardEl.style.top = cy + "px";
      cyShifted = true;
    }

    // --- Grounds (left) ---
    var groundEdgesAll = groundEdgesTo(focus.id);
    // §2.3: only UNGROUPED edges are ever hidden -- a conjunction-group member
    // is part of an AND bracket whose rendering must stay whole.
    var hiddenGrounds = state.showShortcuts ? [] : groundEdgesAll.filter(function(e){ return !e.group && isRedundantShortcut(e); });
    var groundSlots = buildGroundSlots(groundEdgesAll.filter(function(e){ return hiddenGrounds.indexOf(e) === -1; }));
    var groundRows = layoutSlots(groundSlots, rowH);
    var maxGroundSpan = 0;
    groundRows.forEach(function(row){
      var slot = row.slot;
      var dist = Math.min(maxHalf, distFor(slot.rep, GROUND_MIN, GROUND_RANGE));
      var slotX = cx - dist;
      var slotY = cy + row.yOffset;
      maxGroundSpan = Math.max(maxGroundSpan, Math.abs(row.yOffset) + row.span/2);
      if(slot.type === "single"){
        var n = getNode(slot.edge.from);
        if(!n) return;
        groundEdgeLine(slotX+NBR_HALF_W, slotY, cx-FOCUS_HALF_W, cy, slot.edge);
        edgeForumLabel(slotX+NBR_HALF_W, slotY, cx-FOCUS_HALF_W, cy, slot.edge);
        makeCard({node:n, x:slotX, y:slotY, cls:"card--nbr", badge:"strength " + slot.edge.strength + (isRedundantShortcut(slot.edge) ? " · shortcut" : "")});
      } else {
        // conjunction group: member cards converge on a junction, one line to focus
        var jx = slotX + 91, jy = slotY;
        var memberN = slot.edges.length;
        slot.edges.forEach(function(e, mi){
          var n = getNode(e.from);
          if(!n) return;
          var my = slotY - row.span/2 + rowH/2 + mi*rowH;
          groundEdgeLine(slotX+NBR_HALF_W, my, jx, jy, e);
          // The label sits on THIS member's own segment (from itself to the
          // junction) -- the shared junction->focus line just below is a
          // rendering artifact of the AND-bracket, not a real graph.json
          // edge, so it never gets its own typing/comment label.
          edgeForumLabel(slotX+NBR_HALF_W, my, jx, jy, e);
          makeCard({node:n, x:slotX, y:my, cls:"card--nbr", badge:"strength " + e.strength});
        });
        var maxVisualStrength = Math.max.apply(null, slot.edges.map(function(e){ return edgeVisualStrength(e); }));
        // PHASE2-SPEC.md §7: a conjunction group can carry its own rated
        // Agreement (the joint inference "if ALL members were so..."). When
        // it does (and isn't sealed), the bracket's stroke/junction dot pick
        // up the SAME dark->white Agreement ramp as every other edge (the
        // old gold-frame convention and its dashed-contested variant are
        // both retired) -- otherwise this is exactly the original fixed
        // --line/--accent bracket.
        var group = groupById(slot.gid);
        var groupAgr = group && group.agreement;
        var bracketColor = null;
        if(groupAgr && groupAgr.n > 0 && groupAgr.state !== "sealed" && groupAgr.mean != null){
          bracketColor = edgeRampColor(groupAgr.mean);
        }
        line(jx, jy, cx-FOCUS_HALF_W, cy, maxVisualStrength, null, bracketColor);
        junctionDot(jx, jy, bracketColor);
        bracketLabel(jx, jy-12, "AND");
        // The group Agreement label goes just above the WHOLE group's row
        // span (above the topmost member card) rather than beside the
        // junction: the junction sits only ~16px right of the member
        // column's own right edge, so a longer string like "Agree 3.0 ±1.3
        // (contested) (n=10)" -- centered there -- would run straight
        // through the tightly-packed member cards no matter its y. Above
        // the whole stack there's nothing else at that x to collide with.
        var groupTxt = groupAgreementText(groupAgr);
        if(groupTxt) bracketLabel(jx, slotY - row.span/2 - 8, groupTxt);
      }
    });
    if(!groundSlots.length) emptyNote(cx - GROUND_MIN - 40, cy, "no grounds yet");
    colLabel(Math.max(70, cx - maxHalf - 10), cy - maxGroundSpan - 24, "Grounds");
    // §2.3 declutter: a direct edge whose endpoints are also joined by a
    // STRONGER layered path is a shortcut; hiding it makes hub topologies
    // read as layered without editing the data. This pill is the only way
    // back to seeing it -- click to reveal, click again to re-hide.
    if(hiddenGrounds.length || (state.showShortcuts && groundEdgesAll.some(function(e){ return !e.group && isRedundantShortcut(e); }))){
      var groundShortcutNote = document.createElement("div");
      groundShortcutNote.className = "shortcut-note ui";
      groundShortcutNote.style.left = Math.max(90, cx - GROUND_MIN - 40) + "px";
      groundShortcutNote.style.top = (cy + maxGroundSpan + 48) + "px";
      groundShortcutNote.textContent = state.showShortcuts
        ? "showing weaker shortcuts — hide"
        : ("+" + hiddenGrounds.length + " weaker shortcut" + (hiddenGrounds.length === 1 ? "" : "s") + " hidden — show");
      groundShortcutNote.addEventListener("click", function(ev){
        ev.stopPropagation();
        state.showShortcuts = !state.showShortcuts;
        render();
      });
      cardsLayer.appendChild(groundShortcutNote);
    }

    // --- Dependents (right) ---
    // dependents never render as bracketed groups from the focus's own
    // perspective: a conjunction group brackets multiple GROUNDS of one
    // node, and here focus is the ground, not the "to" — see report.
    var depEdgesAll = groundEdgesFrom(focus.id);
    // §2.3: same ungrouped-only hiding rule as Grounds above.
    var hiddenDeps = state.showShortcuts ? [] : depEdgesAll.filter(function(e){ return !e.group && isRedundantShortcut(e); });
    var depSlots = buildGroundSlots(depEdgesAll.filter(function(e){ return hiddenDeps.indexOf(e) === -1; })).map(function(s){
      return {type:"single", edge:s.edge || s.edges[0], rep:s.rep};
    });
    var depRows = layoutSlots(depSlots, rowH);
    var maxDepSpan = 0;
    depRows.forEach(function(row){
      var slot = row.slot;
      var dist = Math.min(maxHalf, distFor(slot.rep, GROUND_MIN, GROUND_RANGE));
      var slotX = cx + dist;
      var slotY = cy + row.yOffset;
      maxDepSpan = Math.max(maxDepSpan, Math.abs(row.yOffset) + row.span/2);
      var n = getNode(slot.edge.to);
      if(!n) return;
      groundEdgeLine(cx+FOCUS_HALF_W, cy, slotX-NBR_HALF_W, slotY, slot.edge);
      edgeForumLabel(cx+FOCUS_HALF_W, cy, slotX-NBR_HALF_W, slotY, slot.edge);
      makeCard({node:n, x:slotX, y:slotY, cls:"card--nbr", badge:"strength " + slot.edge.strength + (isRedundantShortcut(slot.edge) ? " · shortcut" : "")});
    });
    if(!depSlots.length) emptyNote(cx + GROUND_MIN + 40, cy, "no dependents yet");
    colLabel(Math.min(W-70, cx + maxHalf + 10), cy - maxDepSpan - 24, "Dependents");
    // §2.3 declutter: a direct edge whose endpoints are also joined by a
    // STRONGER layered path is a shortcut; hiding it makes hub topologies
    // read as layered without editing the data.
    if(hiddenDeps.length || (state.showShortcuts && depEdgesAll.some(function(e){ return !e.group && isRedundantShortcut(e); }))){
      var depShortcutNote = document.createElement("div");
      depShortcutNote.className = "shortcut-note ui";
      depShortcutNote.style.left = Math.min(W-90, cx + GROUND_MIN + 40) + "px";
      depShortcutNote.style.top = (cy + maxDepSpan + 48) + "px";
      depShortcutNote.textContent = state.showShortcuts
        ? "showing weaker shortcuts — hide"
        : ("+" + hiddenDeps.length + " weaker shortcut" + (hiddenDeps.length === 1 ? "" : "s") + " hidden — show");
      depShortcutNote.addEventListener("click", function(ev){
        ev.stopPropagation();
        state.showShortcuts = !state.showShortcuts;
        render();
      });
      cardsLayer.appendChild(depShortcutNote);
    }

    // --- Antitheses (vertical column through the focus) ---
    // User notes: the set is PHYSICALLY ORDERED by relative Agreement
    // strength -- rivals stronger than the focus stack ABOVE it (strongest
    // at the top), weaker ones BELOW, so the focus card sits at its own
    // rank in the column and clicking any rival re-sorts the column around
    // that rival. Cards were pre-created and measured in the pre-pass at
    // the top of this function (which also reserved the above-stack's
    // headroom); this block only assigns their positions.
    // HANDOFF-TO-UI §2.2: a demoted (ghosted) antithesis set drops its ring
    // from the living layout entirely -- it never enters the column below,
    // just a one-line note that it exists (see Analytics for why).
    if(!sets.length){
      emptyNote(cx, Math.max(SAFE_TOP, cy - focusH/2 - 60), "not a member of any antithesis set");
    }
    if(ghostSets){
      emptyNote(cx, Math.max(SAFE_TOP, cy - focusH/2 - 84), ghostSets + " antithesis set" + (ghostSets === 1 ? "" : "s") + " ghosted (demoted) — see Analytics");
    }
    // Shared cursors across sets: a node in >1 set (none in the bundled
    // graphs) keeps stacking its later sets outward from the first's extent
    // rather than colliding in the same column.
    var antiCursorTop = cy - focusH/2 - ANTI_GAP;
    var antiCursorBot = cy + focusH/2 + ANTI_GAP;
    antiSets.forEach(function(setPre, setIdx){
      var setMinY = cy, setMaxY = cy;
      // above (stronger): place nearest-to-focus first (the weakest of the
      // stronger group), walking upward, so top-to-bottom reads
      // strongest -> ... -> focus. Real measured card heights, no guesses.
      for(var ai = setPre.above.length - 1; ai >= 0; ai--){
        var cA = setPre.above[ai];
        var yA = Math.max(SAFE_TOP + cA.h/2, antiCursorTop - cA.h/2);
        cA.el.style.top = yA + "px";
        setMinY = Math.min(setMinY, yA);
        antiCursorTop = yA - cA.h/2 - ANTI_GAP;
      }
      // below (weaker), walking downward: focus -> ... -> weakest.
      setPre.below.forEach(function(cB){
        var yB = antiCursorBot + cB.h/2;
        cB.el.style.top = yB + "px";
        setMaxY = Math.max(setMaxY, yB);
        antiCursorBot = yB + cB.h/2 + ANTI_GAP;
      });

      if(setMinY < cy || setMaxY > cy){
        // dashed vertical spine behind the column (SVG layer sits under the
        // cards layer, so cards paint over it) -- reads as "one ordered set".
        line(cx, setMinY, cx, setMaxY, 1, null, null, true);
        var lbl = document.createElement("div");
        lbl.className = "arc-label";
        lbl.style.left = cx + "px";
        lbl.style.top = Math.max(16, antiCursorTop + ANTI_GAP - 22) + "px";
        lbl.textContent = "Antithesis set" + (sets.length > 1 ? " " + (setIdx+1) : "")
          + " (strongest ↑ · weakest ↓)";
        cardsLayer.appendChild(lbl);
      }
    });

    // ITERATION (user notes 3): a little empty breathing room below the
    // lowest content (bottom antithesis card / the deepest G/D stack), so
    // "scrolled to the bottom" -- the state that arms the zoom-out gesture
    // -- lands with the last card fully clear of the viewport edge instead
    // of flush against it. The spacer is invisible and inert; it only
    // extends the stage's scrollHeight.
    var spacer = document.createElement("div");
    spacer.className = "scroll-spacer";
    spacer.style.left = cx + "px";
    spacer.style.top = (Math.max(antiCursorBot,
      cy + Math.max(maxGroundSpan, maxDepSpan) + 70) + 70) + "px";
    cardsLayer.appendChild(spacer);

    // When the above-stack shifted the layout down, land the viewport on
    // the focus card (at its usual on-screen height) instead of leaving
    // the user staring at the top of the rival stack.
    if(cyShifted) stage.scrollTop = Math.max(0, cy - H * 0.58);
  }

  var EDGE_FOCUS_HALF_W = 160;   // matches .card--edge-focus width:320px

  // Iteration notes: the strongest suggested inference phrasing (typing)
  // for an edge, by agrees (primary breaks ties). DATA GAP: typings carry
  // no graded rating aggregates in the bundled snapshots, so "strongest"
  // means highest structural agrees; typingRatingColor below lights the
  // edge card's body strip up automatically if/when typings gain `scores`.
  function strongestTyping(edge){
    var ts = typingsOf(edge).slice().sort(function(a, b){
      var d = (b.agrees || 0) - (a.agrees || 0);
      if(d) return d;
      return ((edge.primary_typing === b.id) ? 1 : 0) - ((edge.primary_typing === a.id) ? 1 : 0);
    });
    return ts.length ? ts[0] : null;
  }
  function typingDisplayText(t){
    if(!t) return null;
    if(t.node){
      var n = getNode(t.node);
      return n ? titleOf(n) : t.node;
    }
    return t.label;
  }
  function typingRatingColor(t){
    var cum = t && cumulativeRating(t.scores, ["A", "R", "C"]);
    return (cum != null) ? zoneColorFor(cum) : null;
  }

  // ITEM 3: the edge-focus card itself -- NOT a node card (makeCard() is
  // node-shaped), so it's built by hand here, but with the SAME three-zone
  // anatomy so the interaction grammar transfers. Iteration notes: the
  // title bar shows the STRONGEST INFERENCE PHRASING (typing) this edge
  // represents, coloured by the edge's (conditional) Agreement, and clicks
  // through to the alternate-phrasings panel; the body is an EMPTY slim bar
  // whose colour cue is the title phrasing's own ratings (dormant -- see
  // typingRatingColor); the bottom bar is the labelled spread glyph + the
  // comment icon, same as node cards.
  function makeEdgeFocusCard(edge, x, y){
    var el = document.createElement("div");
    // HANDOFF-TO-UI §2.2: a ghost EDGE's own focus card dims like ghost
    // node cards do (this was a gap -- only its lines drew faint before).
    el.className = "card card--focus card--edge-focus" + (isGhost(edge) ? " ghost" : "");
    if(isGhost(edge)) el.title = "ghost — " + ghostProvenanceText(edge);
    el.style.left = x + "px";
    el.style.top  = y + "px";
    var edgeAgr = edge.agreement;
    // §2.5: blind Rating mode keeps the title zone uncoloured.
    var rated = edgeAgr && edgeAgr.n > 0 && edgeAgr.state !== "sealed" && edgeAgr.mean != null && !blind();

    // --- zone 1: title bar (the inference, coloured by edge Agreement) ---
    var titleZone = document.createElement("div");
    titleZone.className = "zone-title";
    if(rated){
      var tc = zoneColorFor(edgeAgr.mean);
      titleZone.style.background = tc.bg;
      titleZone.style.color = tc.text;
    }
    var titleTxt = document.createElement("div");
    titleTxt.className = "txt";
    var st = strongestTyping(edge);
    titleTxt.textContent = typingDisplayText(st) || edge.id;
    // ASSESSMENT-SPEC.md v1.2: edge Agreement is CONDITIONAL -- surface that
    // right where the colour cue is, since it is the single most common
    // misreading (premise doubt leaking into the edge).
    titleTxt.title = "The inference this edge makes. Its Agreement rates ONLY that inference: "
      + "“IF the ground were so, how strongly would it support this dependent?” Whether the "
      + "ground itself is true is rated on the ground node, not here.";
    titleZone.appendChild(titleTxt);
    // HANDOFF-TO-UI §2.4: a redundant shortcut is IN COMPETITION with the
    // layered path that outcompetes it -- flag that right on the focus card
    // and click through to the side-by-side comparison in Analytics.
    if(isRedundantShortcut(edge)){
      var cb = document.createElement("div");
      cb.className = "poll-badge";       // reuse the pill styling
      cb.style.pointerEvents = "auto";
      cb.style.cursor = "pointer";
      cb.textContent = "in competition — weaker than a layered path";
      cb.title = "compare the routes in Analytics";
      cb.addEventListener("click", function(ev){ ev.stopPropagation(); openAssessmentPanel("edge", edge.id); });
      titleZone.appendChild(cb);
    }
    titleZone.title = "click for alternate inference phrasings & their ratings";
    titleZone.addEventListener("click", function(ev){
      ev.stopPropagation();
      openTypingsPanel(edge.id);
    });
    el.appendChild(titleZone);

    // --- zone 2: empty slim bar, coloured by the title phrasing's ratings ---
    var bodyZone = document.createElement("div");
    bodyZone.className = "zone-body zone-strip";
    var trc = typingRatingColor(st);
    if(trc) bodyZone.style.background = trc.bg;
    el.appendChild(bodyZone);

    // --- zone 3: bottom bar (consensus + analytics/forum) ---
    var bottomZone = document.createElement("div");
    bottomZone.className = "zone-bottom";
    // same sealed-target reachability rule as node cards (see makeCard)
    bottomZone.style.cursor = "pointer";
    bottomZone.title = "analytics";
    bottomZone.addEventListener("click", function(ev){
      ev.stopPropagation();
      openAssessmentPanel("edge", edge.id);
    });
    if(rated && edgeAgr.stdev != null){
      var bc = consensusColorFor(edgeAgr.stdev);
      bottomZone.style.background = bc.bg;
      bottomZone.style.color = bc.text;
    }
    var eStrip = distStripEl(edgeAgr, 150, 24);
    if(eStrip){
      var eDistRow = document.createElement("span");
      eDistRow.className = "dist-row dist-lozenge" + distConfidenceClass(edgeAgr);
      eDistRow.title = distStripTitle("Edge Agreement", edgeAgr);
      eDistRow.appendChild(eStrip);
      eDistRow.addEventListener("click", function(ev){
        ev.stopPropagation();
        openAssessmentPanel("edge", edge.id);
      });
      bottomZone.appendChild(eDistRow);
    }
    bottomZone.appendChild(commentChipEl("edge", edge.id, commentsOf(edge).length));
    el.appendChild(bottomZone);

    cardsLayer.appendChild(el);
    return el;
  }

  /* =========================================================================
   * Iteration notes: clicking the edge focus card's TITLE BAR lists the
   * edge's suggested inference phrasings (typings) with their ratings,
   * strongest first -- the edge-side sibling of openPhrasingsPanel, sharing
   * the same panel element and item styling. Node-referencing typings click
   * through to their trunk node (the wormhole). DATA GAP: typings carry no
   * graded rating aggregates yet, so ratings show the structural agrees
   * count until the engine exports more.
   * ========================================================================= */
  function openTypingsPanel(edgeId){
    var edge = findEdge(edgeId);
    if(!edge) return;
    var panel = document.getElementById("phrasings-panel");
    panel.innerHTML = "";
    rightPanelHeader(panel, "Inference phrasings");

    var fromN = getNode(edge.from), toN = getNode(edge.to);
    var sub = document.createElement("div");
    sub.className = "forum-subtitle";
    sub.textContent = edge.id + ": " + (fromN ? titleOf(fromN) : edge.from)
      + " → " + (toN ? titleOf(toN) : edge.to);
    panel.appendChild(sub);

    var subhead = document.createElement("div");
    subhead.className = "forum-subhead";
    subhead.textContent = "What inference is this edge making? — strongest first";
    panel.appendChild(subhead);

    var typings = typingsOf(edge).slice().sort(function(a, b){
      var ca = cumulativeRating(a.scores, ["A","R","C"]), cb = cumulativeRating(b.scores, ["A","R","C"]);
      if(ca != null || cb != null){
        return (cb == null ? -Infinity : cb) - (ca == null ? -Infinity : ca) || ((b.agrees||0) - (a.agrees||0));
      }
      return (b.agrees||0) - (a.agrees||0);
    });
    if(!typings.length){
      var none = document.createElement("div");
      none.className = "forum-empty";
      none.textContent = "No inference phrasings suggested yet.";
      panel.appendChild(none);
    }
    typings.forEach(function(t){
      var item = document.createElement("div");
      var isPrimary = edge.primary_typing === t.id;
      item.className = "phrasing-item" + (isPrimary ? " is-primary" : "");
      var text = document.createElement("div");
      if(isPrimary){
        var star = document.createElement("span");
        star.className = "ty-star"; star.textContent = "★ ";
        text.appendChild(star);
      }
      var tSpan = document.createElement("span");
      tSpan.textContent = typingDisplayText(t) || "(unnamed)";
      if(t.node){
        tSpan.className = "typing-text is-ref";
        tSpan.style.cursor = "pointer";
        tSpan.title = "go to trunk node";
        tSpan.addEventListener("click", function(ev){
          ev.stopPropagation();
          setFocusNode(t.node);
        });
      }
      text.appendChild(tSpan);
      item.appendChild(text);

      var scores = document.createElement("div");
      scores.className = "ph-scores";
      var summ = document.createElement("span");
      var summary = ratingSummaryText(t.scores, ["A","R","C"], ["A","R","C"]);
      summ.textContent = summary || "not yet rated";
      var agr = document.createElement("span");
      // §2.5: blind Rating mode withholds the agrees count.
      agr.textContent = blind() ? "withheld" : ("agrees " + (t.agrees || 0));
      scores.appendChild(summ);
      scores.appendChild(agr);
      item.appendChild(scores);
      panel.appendChild(item);
    });

    var note = document.createElement("div");
    note.className = "assess-note";
    note.textContent = "Ranked by cumulative rating, falling back to agrees — typings carry no "
      + "graded rating aggregates in this snapshot yet. The edge card's middle strip colours "
      + "by the top phrasing's ratings once they exist.";
    panel.appendChild(note);

    showRightPanel("phrasings-panel");
  }

  // ITEM 3: the edge-detail layout -- same grounds-left/dependents-right
  // convention as node-detail, except there's only one edge to show: its
  // "from" node docks on the LEFT (mirroring where a ground would sit) and
  // its "to" node leaves to the RIGHT (mirroring a dependent). Both side
  // cards click through to THEIR OWN node-detail view, same as any other
  // neighbor card. Wheel-out (handleNodeViewWheel) treats this exactly like
  // node-detail, landing on the midpoint of the two endpoints (see
  // renderNeighborhoodView's pendingCenter handling).
  function renderEdgeDetailView(){
    var edge = findEdge(state.focusId);
    if(!edge) return;
    var fromNode = getNode(edge.from), toNode = getNode(edge.to);
    var W = stage.clientWidth, H = stage.clientHeight;
    var cx = W/2, cy = Math.max(260, H*0.5);
    var maxHalf = Math.max(300, cx - 110);
    var dist = Math.min(maxHalf, distFor(edgeVisualStrength(edge), GROUND_MIN, GROUND_RANGE));

    makeEdgeFocusCard(edge, cx, cy);

    if(fromNode){
      var fx = cx - dist;
      groundEdgeLine(fx+NBR_HALF_W, cy, cx-EDGE_FOCUS_HALF_W, cy, edge);
      makeCard({node:fromNode, x:fx, y:cy, cls:"card--nbr", badge:"strength " + edge.strength});
      colLabel(Math.max(70, fx - NBR_HALF_W - 20), cy - 70, "From");
    }
    if(toNode){
      var tx = cx + dist;
      groundEdgeLine(cx+EDGE_FOCUS_HALF_W, cy, tx-NBR_HALF_W, cy, edge);
      makeCard({node:toNode, x:tx, y:cy, cls:"card--nbr", badge:"strength " + edge.strength});
      colLabel(Math.min(W-70, tx + NBR_HALF_W + 20), cy - 70, "To");
    }
    if(!fromNode) emptyNote(cx - GROUND_MIN - 40, cy, "from-node missing");
    if(!toNode) emptyNote(cx + GROUND_MIN + 40, cy, "to-node missing");
  }

  /* =========================================================================
   * NEIGHBORHOOD VIEW — the FULL graph at once: every node, every ground
   * edge (Grounds/Dependents), no antitheses, and no "focus node" concept
   * (that's node-view's job; here we lay out everything simultaneously).
   *
   * Layout: a lightweight, DETERMINISTIC force-directed simulation, replacing
   * an earlier strict rank-based column layout — the project wants organic
   * clustering (nodes settle near their strongest-connected neighbors)
   * instead of artificial columnar ordering. See forceLayout() below.
   *   - SPRINGS: every ground edge pulls its two endpoints toward a rest
   *     length that shrinks with strength (stronger agreement = the two
   *     nodes want to sit closer together), reusing the same distFor()
   *     falloff used for node-view's proximity rule so "closer = stronger"
   *     reads consistently across both views.
   *   - REPULSION: every pair of nodes pushes apart (inverse-square, like
   *     charged particles) so unrelated nodes don't pile on top of each
   *     other and the graph fans out into legible clusters.
   *   - FIXED ITERATIONS: the simulation runs a fixed number of steps once,
   *     at load, then FREEZES — no ongoing animation/per-frame simulation.
   *     Positions computed once are simply rendered statically afterward,
   *     same as the old column layout was.
   *   - DETERMINISTIC SEEDING: initial positions come from a seeded PRNG
   *     keyed off a hash of each node's own id (never Math.random), so the
   *     same graph produces byte-identical starting positions — and, since
   *     every later step is pure arithmetic on those positions, the same
   *     final layout — on every reload. Spatial stability across reloads is
   *     a project requirement.
   *   - OVERLAP RESOLUTION: springs+repulsion alone don't know each card's
   *     actual (measured, title-dependent) footprint, so a final deterministic
   *     separation pass runs after the simulation using each pair's real
   *     measured half-width/half-height, guaranteeing zero overlap at rest.
   * ========================================================================= */
  var NH_ITER        = 320;    // fixed simulation steps, then freeze (no per-frame sim)
  var NH_REPULSION   = 44000;  // base inverse-square repulsion between every node pair
  // Feature Discussions #36: DENSITY-ADAPTIVE spread. Cards are a fixed 126px
  // wide, so a graph with more nodes packs them tighter for the same repulsion
  // -- edges lose the gaps they need to route cleanly. Rather than one global
  // constant (too airy for a small graph, too cramped for a dense one), the
  // repulsion scales up with node count toward a ceiling, so a big dense graph
  // (Covid) gets the room it needs while a small one (Debate) stays compact.
  // The layout is still pure force self-assembly -- this only sets how hard
  // nodes push apart, read once from n; it never pins anything.
  var NH_DENSITY_SPREAD = 0.6; // extra repulsion at the density ceiling (+60%)
  var NH_DENSITY_LO = 40, NH_DENSITY_HI = 140; // node counts spanning 0 -> full spread
  var NH_SPRING_MIN  = 175, NH_SPRING_RANGE = 220;  // rest length falloff, mirrors distFor()
  var NH_SPRING_K    = 0.018;  // base spring stiffness
  var NH_DAMPING     = 0.82;   // velocity damping per step (keeps the sim from oscillating)
  var NH_CENTER_K    = 0.0025; // gentle pull-to-origin so the whole graph doesn't drift away
  var NH_CARD_GAP    = 30;     // minimum gap enforced between card edges in the overlap pass
  // Horizontal ordering bias (CHANGE B / port convention): a ground edge's
  // source ("from", the ground) attaches at its own RIGHT port and the
  // target ("to", the thing it grounds) at its LEFT port, so support reads
  // left->right at every node. That only looks right if grounds actually
  // tend to sit left of what they ground, so a gentle, ONE-SIDED per-edge
  // force nudges source.x a bit left of target.x whenever they're already
  // reversed or too close — it does nothing once the margin is satisfied,
  // so it never fights the organic spring/repulsion clustering, it just
  // reduces how often an edge has to wrap backward. Deterministic (pure
  // function of the same seeded positions), applied only during the fixed
  // NH_ITER loop below, frozen afterward like everything else.
  // ITEM 8: strengthened vs. the original 0.035/185 -- the graph was reading
  // vertically-condensed/tall, so the left->right ordering force is turned up
  // (bigger correction, and it now kicks in at a wider margin) to stretch
  // support chains out horizontally more assertively. Combined with the
  // post-simulation horizontal/vertical rescale below (NH_HORIZ_STRETCH /
  // NH_VERT_SQUEEZE), not as a replacement for it -- this pushes the ORDERING
  // (grounds-left-of-what-they-support) harder, the rescale widens the
  // overall aspect ratio.
  var NH_ORDER_K      = 0.065;
  // Feature Discussions #33: straightening-force gain (see the springs loop)
  var NH_STRAIGHT_K   = 0.015;
  // Feature Discussions #34: disconnected sub-graphs must not intertwine, and
  // antithesis rivals (never joined by a ground edge) should still sit near
  // each other -- "wormholes" with real force weight. Two rules do this:
  //  * component banding: each connected component seeds into its own
  //    horizontal band and is held there by a band-anchored y-pull, so every
  //    unconnected argument reads as its own blob instead of interleaving.
  //  * wormhole springs: an attractive spring across each antithesis set, so
  //    rivals settle a card's-width apart at the seam between bands (nearness
  //    of space = nearness of logical relation), weighted by belonging and
  //    released for ghosts exactly like ground springs.
  var NH_COMPONENT_BAND = 560;   // vertical spacing between components' seed bands
  var NH_BAND_K         = 0.010; // pull toward own component's band-centre y
  var NH_WORMHOLE_REST  = 215;   // rest length between antithesis rivals
  var NH_WORMHOLE_K     = 0.011; // wormhole spring stiffness (< ground springs)
  // Feature Discussions #35: node-off-edge clearing. An unrelated node sitting
  // ON an edge line reads as a false connection and forces the router into big
  // failed detours. Making "node overlapping a non-incident edge" a higher-
  // energy state pushes the node clear, so edges pass through gaps and stay
  // straight -- fixing confusing under-node passes at the layout level, and
  // shrinking the long swooping curves as a side effect.
  var NH_EDGE_CLEAR_BAND = 48;   // perpendicular reach: node centre this close to an edge gets pushed
  var NH_EDGE_CLEAR_K    = 0.06; // clearing stiffness (gentle -- an energy nudge, not a wall)
  var NH_ORDER_MARGIN = 230;
  // ITEM 8 continued: a deterministic, one-shot anisotropic rescale applied
  // to the frozen simulation output (before the overlap-resolution pass, so
  // any overlaps it introduces still get cleaned up using real card
  // footprints). Stretching x out and squeezing y in is a simple, low-risk
  // way to bias the whole layout's aspect ratio wider without re-tuning the
  // delicate spring/repulsion balance itself.
  var NH_HORIZ_STRETCH = 1.4;
  var NH_VERT_SQUEEZE  = 0.78;
  var NH_ZOOM_MIN = 0.15, NH_ZOOM_MAX = 3;   // shared clamp for neighborhood scale (fit, wheel-zoom, transition landing)
  // ITERATION (user request, replacing the fixed 2.4x-fit landing): a
  // node->neighborhood landing zooms to show roughly this many nearest
  // nodes around the point you pulled back from.
  var NH_LANDING_NEIGHBORS = 10;

  // mulberry32: small deterministic PRNG (NOT Math.random) — same seed always
  // produces the same sequence, which is what gives the layout its stability.
  function seededRandom(seed){
    return function(){
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  // FNV-1a string hash — a stable function of a node's id, used only to seed
  // that node's PRNG (so initial placement is a deterministic function of id).
  function hashId(id){
    var h = 2166136261, s = String(id);
    for(var i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }

  /* =========================================================================
   * Feature Discussions #33 (correcting a brief columnar regression): the
   * neighborhood REMAINS force-directed and self-assembling -- clustering,
   * proximity-by-strength, and the real messiness of paths are the point,
   * and a continually growing graph must keep settling into its lowest-
   * energy state on its own. The craft is the ENERGY FUNCTION: rendering
   * rules that make the lowest-energy state the logically clear one.
   * longestPathDepth feeds exactly one such rule -- depth-SEEDED starting
   * positions (never depth-pinned columns). Prefers the data layer's
   * per-node `layer` export when every node carries one (Graphs comms
   * #37); Kahn longest-path otherwise; null on cycles (radial seeding).
   * ========================================================================= */
  function longestPathDepth(nodes, edges){
    var all = {}, i;
    for(i = 0; i < nodes.length; i++) all[nodes[i].id] = true;
    var exported = nodes.length > 0;
    for(i = 0; i < nodes.length; i++){
      if(typeof nodes[i].layer !== "number"){ exported = false; break; }
    }
    if(exported){
      var out = {};
      for(i = 0; i < nodes.length; i++) out[nodes[i].id] = nodes[i].layer;
      return out;
    }
    var indeg = {}, adj = {};
    for(i = 0; i < nodes.length; i++) indeg[nodes[i].id] = 0;
    edges.forEach(function(e){
      if(!all[e.from] || !all[e.to] || e.from === e.to) return;
      (adj[e.from] = adj[e.from] || []).push(e.to);
      indeg[e.to]++;
    });
    var depth = {}, queue = [], qi = 0, seen = 0;
    for(i = 0; i < nodes.length; i++){
      depth[nodes[i].id] = 0;
      if(!indeg[nodes[i].id]) queue.push(nodes[i].id);
    }
    while(qi < queue.length){
      var id = queue[qi++]; seen++;
      (adj[id] || []).forEach(function(t){
        if(depth[id] + 1 > depth[t]) depth[t] = depth[id] + 1;
        if(--indeg[t] === 0) queue.push(t);
      });
    }
    return (seen === nodes.length) ? depth : null;
  }

  function forceLayout(nodes, edges, cardW, cardH){
    var n = nodes.length;
    var idxOf = {};
    nodes.forEach(function(nd, i){ idxOf[nd.id] = i; });
    // HANDOFF-TO-UI §2.2: ghosts get near-zero spring pull below (repulsion
    // is untouched, so they still keep their distance and never overlap).
    var ghostIdx = nodes.map(function(nd){ return isGhost(nd); });

    // Feature Discussions #34: connected components over ground edges. Each
    // one seeds into (and is held in) its own horizontal band so unconnected
    // sub-graphs don't intertwine. Deterministic band order -- larger first,
    // ties by smallest node id -- so the layout is stable across reloads.
    var compOf = new Array(n), bandCenterY = new Array(n), compCount = 1;
    (function assignComponents(){
      var parent = new Array(n), i;
      for(i=0;i<n;i++) parent[i] = i;
      function find(x){ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; }
      edges.forEach(function(e){
        var a = idxOf[e.from], b = idxOf[e.to];
        if(a===undefined || b===undefined || a===b) return;
        var ra = find(a), rb = find(b);
        if(ra !== rb) parent[ra] = rb;
      });
      var groups = {};
      for(i=0;i<n;i++){ var r = find(i); (groups[r] = groups[r] || []).push(i); }
      var roots = [];
      for(var k in groups) if(groups.hasOwnProperty(k)) roots.push(k);
      function minId(g){
        var m = nodes[g[0]].id;
        for(var j=1;j<g.length;j++){ if(String(nodes[g[j]].id) < String(m)) m = nodes[g[j]].id; }
        return String(m);
      }
      roots.sort(function(a,b){
        var ga = groups[a], gb = groups[b];
        if(gb.length !== ga.length) return gb.length - ga.length;
        var ma = minId(ga), mb = minId(gb);
        return ma < mb ? -1 : (ma > mb ? 1 : 0);
      });
      compCount = roots.length;
      roots.forEach(function(r, rank){
        var cy = (compCount > 1) ? (rank - (compCount-1)/2) * NH_COMPONENT_BAND : 0;
        groups[r].forEach(function(i){ compOf[i] = rank; bandCenterY[i] = cy; });
      });
    })();
    var multiComp = compCount > 1;

    var px = new Array(n), py = new Array(n);
    var vx = new Array(n), vy = new Array(n);
    // Feature Discussions #33: depth-SEEDED start, not depth-pinned columns.
    // When the graph is a DAG, initial x is proportional to longest-path
    // depth (plus per-id jitter), so the settling basin already flows
    // support left -> right -- but every force still acts on every node, so
    // clusters, strength-proximity, and the genuine messiness of paths stay
    // organic. Cyclic input keeps the original radial seeding.
    var seedDepth = longestPathDepth(nodes, edges);
    nodes.forEach(function(nd, i){
      var rnd = seededRandom((hashId(nd.id) ^ Math.imul(i + 1, 0x9e3779b9)) >>> 0);
      if(seedDepth){
        px[i] = seedDepth[nd.id] * 240 + (rnd() - 0.5) * 90;
        // Feature Discussions #34: seed inside the node's band so components
        // start separated; a single-component graph (bandCenterY 0) keeps its
        // original full-height spread.
        py[i] = (rnd() - 0.5) * (multiComp ? 260 : 620) + bandCenterY[i];
      } else {
        var angle = rnd() * Math.PI * 2;
        var radius = 40 + rnd() * 320;
        px[i] = Math.cos(angle) * radius;
        py[i] = Math.sin(angle) * radius + bandCenterY[i];
      }
      vx[i] = 0; vy[i] = 0;
    });

    // Deliberately structural `e.strength` here, NOT edgeVisualStrength() --
    // this is the organic-clustering rest length (where nodes settle), not
    // a "detail view distance" in the Amendments' sense, so graded Agreement
    // ratings never move where the map clusters, only (via drawNhEdge,
    // elsewhere) how thick/prominent a rated edge's line reads once drawn.
    var springs = [];
    edges.forEach(function(e){
      var a = idxOf[e.from], b = idxOf[e.to];
      if(a === undefined || b === undefined || a === b) return;
      // HANDOFF §2.2, ghosts keep repulsion (no overlap) but lose spring
      // pull, so they drift to the margins instead of shaping the living
      // clusters.
      // §2.3: a redundant shortcut stops pulling its endpoints together, so
      // the layered path that actually out-scores it (on geometric-mean,
      // length-normalized strength -- layering is rewarded, not flatness)
      // is what shapes the cluster instead.
      var release = ((isGhost(e) || ghostIdx[a] || ghostIdx[b]) ? 0.05 : 1)
        * (isRedundantShortcut(e) ? 0.15 : 1);
      springs.push({
        a:a, b:b,
        rest: distFor(e.strength, NH_SPRING_MIN, NH_SPRING_RANGE),
        k: NH_SPRING_K * (1 + Math.max(e.strength,1)*0.12) * release,
        // Feature Discussions #33: straightening weight -- the edge's
        // NORMALIZED strength (graded when rated, §3.4), with the same
        // ghost/shortcut releases as its spring.
        sw: (Math.min(edgeVisualStrength(e), 5) / 5) * release,
        // Feature Discussions #35: release factor kept raw, so the node-off-
        // edge clearing force below can skip faint (ghost/shortcut) edges.
        rel: release
      });
    });

    // Feature Discussions #34: WORMHOLE springs. Antithesis rivals share no
    // ground edge, but they're the same idea contested -- physical nearness
    // should show that logical nearness. One attractive spring per pair in a
    // set, weighted by each member's `belonging`, released for ghosts just
    // like ground springs. They pull rivals together ACROSS component bands,
    // so the two sides of a debate settle facing each other at the seam
    // rather than drifting to opposite ends.
    var wormholes = [];
    setsOf(state.graph).forEach(function(set){
      var mem = (set.members || []).filter(function(m){ return idxOf[m.node] !== undefined; });
      for(var a=0; a<mem.length; a++){
        for(var b=a+1; b<mem.length; b++){
          var ia = idxOf[mem[a].node], ib = idxOf[mem[b].node];
          var belA = (mem[a].belonging != null) ? mem[a].belonging : 1;
          var belB = (mem[b].belonging != null) ? mem[b].belonging : 1;
          var rel = (ghostIdx[ia] || ghostIdx[ib]) ? 0.05 : 1;
          wormholes.push({ a:ia, b:ib, k: NH_WORMHOLE_K * belA * belB * rel });
        }
      }
    });

    // ITEM 9: deterministic annealing. A private seeded PRNG per node (a
    // DIFFERENT constant mix than the initial-placement PRNG above, so its
    // stream doesn't just replay the same numbers) drives a small random-
    // direction kick each iteration, with its magnitude (the "temperature")
    // decaying linearly from NH_JITTER_MAX at iter 0 to exactly 0 at the
    // final iter. Early on, while the temperature is high, a node that's
    // gotten boxed in by repulsion/spring equilibrium can still get knocked
    // sideways past whatever's blocking it; by the last iterations the
    // jitter has fully died out, so the simulation ends in the same kind of
    // pure, noise-free relaxation it always did, and the final overlap-
    // resolution pass below is untouched. Seeded from hashId(id)/index only
    // (never Math.random), so the exact same sequence of kicks -- and thus
    // the exact same final layout -- reproduces on every reload.
    var NH_JITTER_MAX = 16;
    var jitterRnd = nodes.map(function(nd, i){
      return seededRandom((hashId(nd.id) ^ Math.imul(i + 1, 0xbf58476d) ^ 0x2545f491) >>> 0);
    });

    // Feature Discussions #36: density-adaptive repulsion, read once from the
    // node count. A denser graph pushes apart harder so its cards keep the gaps
    // edges need; a small graph stays compact. Clamped to [0, NH_DENSITY_SPREAD].
    var densityT = Math.max(0, Math.min(1, (n - NH_DENSITY_LO) / (NH_DENSITY_HI - NH_DENSITY_LO)));
    var repulsion = NH_REPULSION * (1 + NH_DENSITY_SPREAD * densityT);

    var fx = new Array(n), fy = new Array(n);
    for(var iter=0; iter<NH_ITER; iter++){
      var i, j;
      for(i=0;i<n;i++){ fx[i]=0; fy[i]=0; }

      // repulsion: every pair pushes apart so unrelated nodes fan out
      for(i=0;i<n;i++){
        for(j=i+1;j<n;j++){
          var dx = px[i]-px[j], dy = py[i]-py[j];
          var d2 = dx*dx + dy*dy;
          if(d2 < 1){ dx = (i - j) || 1; dy = (j - i) || 1; d2 = dx*dx+dy*dy; }
          var d = Math.sqrt(d2);
          var f = repulsion / d2;
          var ux = dx/d, uy = dy/d;
          fx[i]+=ux*f; fy[i]+=uy*f;
          fx[j]-=ux*f; fy[j]-=uy*f;
        }
      }
      // springs: ground edges pull connected nodes toward a strength-scaled rest length
      springs.forEach(function(s){
        var dx = px[s.b]-px[s.a], dy = py[s.b]-py[s.a];
        var d = Math.sqrt(dx*dx+dy*dy) || 0.001;
        var diff = d - s.rest;
        var f = diff * s.k;
        var ux = dx/d, uy = dy/d;
        fx[s.a]+=ux*f; fy[s.a]+=uy*f;
        fx[s.b]-=ux*f; fy[s.b]-=uy*f;
      });
      // Feature Discussions #34: wormhole springs -- rivals attract toward a
      // fixed rest length (no ordering/straightening; direction is meaningless
      // between antitheses).
      wormholes.forEach(function(w){
        var dx = px[w.b]-px[w.a], dy = py[w.b]-py[w.a];
        var d = Math.sqrt(dx*dx+dy*dy) || 0.001;
        var f = (d - NH_WORMHOLE_REST) * w.k;
        var ux = dx/d, uy = dy/d;
        fx[w.a]+=ux*f; fy[w.a]+=uy*f;
        fx[w.b]-=ux*f; fy[w.b]-=uy*f;
      });
      // horizontal ordering bias: nudge each ground (spring.a = edge.from)
      // toward sitting left of what it grounds (spring.b = edge.to). Only
      // active while the margin is violated (diff < 0) — a corrective bias,
      // not a rigid constraint, so it stays "gentle" per spec.
      springs.forEach(function(s){
        var diff = (px[s.b] - px[s.a]) - NH_ORDER_MARGIN;
        if(diff < 0){
          var of = -diff * NH_ORDER_K;
          fx[s.a] -= of;
          fx[s.b] += of;
        }
      });
      // Feature Discussions #33: strength-proportional STRAIGHTENING -- a
      // weak per-edge pull toward equal y, scaled by normalized strength,
      // so strong support chains settle straight and readable while weak
      // links stay free to bend. An energy rule, not a constraint:
      // crossings the topology doesn't need become higher-energy states
      // and melt away in the settle.
      springs.forEach(function(s){
        var dyS = py[s.b] - py[s.a];
        var fS = dyS * NH_STRAIGHT_K * s.sw;
        fy[s.a] += fS;
        fy[s.b] -= fS;
      });
      // Feature Discussions #35: node-off-edge CLEARING. For each visible edge,
      // any non-incident node whose centre falls within a perpendicular band of
      // the edge segment (and between its endpoints, not near the ports) is
      // pushed perpendicularly off the line. One-sided (only the intruding node
      // moves; the edge holds), so it's a stable nudge like the centre pull.
      // Faint ghost/shortcut edges (rel < 0.5) don't clear -- they're already
      // decluttered, so they shouldn't shove living nodes around.
      springs.forEach(function(s){
        if(s.rel < 0.5) return;
        var ax = px[s.a], ay = py[s.a], bx = px[s.b], by = py[s.b];
        var ex = bx-ax, ey = by-ay;
        var L2 = ex*ex + ey*ey;
        if(L2 < 1) return;
        for(var k=0;k<n;k++){
          if(k===s.a || k===s.b) continue;
          var tproj = ((px[k]-ax)*ex + (py[k]-ay)*ey) / L2;
          if(tproj < 0.12 || tproj > 0.88) continue;   // skip near the ports
          var projx = ax + ex*tproj, projy = ay + ey*tproj;
          var ddx = px[k]-projx, ddy = py[k]-projy;
          var dist = Math.sqrt(ddx*ddx + ddy*ddy) || 0.001;
          if(dist < NH_EDGE_CLEAR_BAND){
            var push = (NH_EDGE_CLEAR_BAND - dist) * NH_EDGE_CLEAR_K;
            fx[k] += (ddx/dist)*push;
            fy[k] += (ddy/dist)*push;
          }
        }
      });
      // gentle pull toward the origin so the whole cluster stays put instead of
