<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reasonable — Viewer</title>
<style>
  :root{
    --bg:#0f1216; --panel:#161b22; --panel-2:#1c232c;
    --ink:#e8e6e1; --ink-soft:#b8b4ab; --ink-dim:#8a8780;
    --line:#2a323c; --accent:#c9a227; --accent-dim:rgba(201,162,39,.35);
    --topbar-h:22px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  .ui{font-family:"Inter","Helvetica Neue",Arial,sans-serif;}

  /* ---------- topbar ---------- */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:30;
    display:flex;align-items:center;gap:8px;padding:0 10px;
    background:var(--panel);border-bottom:1px solid var(--line);
  }
  #topbar .brand-line{
    font-size:11px;letter-spacing:.01em;color:var(--ink-soft);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0;line-height:var(--topbar-h);
  }
  #topbar .brand-line b{color:var(--accent);font-weight:600;}
  .btn{
    appearance:none;cursor:pointer;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink-soft);font-size:12.5px;padding:8px 13px;border-radius:8px;
    letter-spacing:.02em;transition:.15s;flex:0 0 auto;white-space:nowrap;
  }
  .btn:hover{color:var(--ink);border-color:var(--accent-dim);}
  #menu-btn{
    padding:1px 9px;font-size:14px;line-height:1;height:16px;
    display:flex;align-items:center;justify-content:center;border-radius:6px;
  }
  /* HANDOFF-TO-UI §2.5: blind-mode reminder pill, topbar-resident so it's
     visible from every view without opening the menu. */
  #rating-pill{font-size:9.5px;letter-spacing:.07em;color:var(--accent);border:1px solid var(--accent-dim);border-radius:999px;padding:1px 8px;flex:0 0 auto;}
  #rating-pill[hidden]{display:none;}

  /* ---------- stage ---------- */
  #stage{
    position:absolute;top:var(--topbar-h);left:0;right:0;bottom:0;
    overflow:auto;
  }
  /* Neighborhood view pans/zooms its two layers via CSS transform instead of
     native scrolling, so native scroll is switched off while that view is
     active (see #3 in the viewer report) to avoid two competing pan
     mechanisms fighting each other. Node view is untouched (still overflow:auto). */
  #stage.stage--pan{overflow:hidden;cursor:grab;user-select:none;}
  #stage.stage--pan.dragging{cursor:grabbing;}
  /* No viewBox is set on #edges-svg, so its coordinate space is plain CSS
     pixels matching #cards-layer's left/top positions. Per the SVG spec an
     <svg> root clips any content outside its own width/height box by
     default — since the laid-out graph (esp. neighborhood view, panned/
     zoomed far from center) routinely extends beyond the current stage
     viewport, that default clip was cutting off edge lines whose endpoints
     fell outside the initial rectangle. overflow:visible disables that
     clip so lines draw fully regardless of how far the content extends or
     how the view has been panned/zoomed (see CHANGE 1 in viewer report). */
  #edges-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
  /* pointer-events:none is LOAD-BEARING here: #cards-layer paints above
     #edges-svg and spans the whole stage, so without it this (visually
     empty) div swallowed every click meant for an .edge-hit line underneath
     -- the "click a ground edge's line to focus it" affordance only ever
     worked where a typing label happened to cover the line. Interactive
     children (.card, .typing-label, .title-drop) re-enable their own
     pointer-events below; the pure-text labels (.col-label, .arc-label,
     .empty-note) keep their explicit pointer-events:none. */
  #cards-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  #edges-svg,#cards-layer{transform-origin:0 0;}

  /* ---------- cards ----------
     CARD REDESIGN (user notes, 2026-07): every assessment cue shares ONE
     dark-gray(bad) -> bright-white(good) spectrum, and the different traits
     are told apart by WHICH ZONE of the card carries them -- spatially
     co-located with the thing they rate:
       .zone-title  (top bar)  = Agreement with the claim (the brief
                                 statement users agree/disagree with)
       .zone-body   (middle)   = combined R&C of the leading phrasing
                                 (the text that is reasonable & clear, or not)
       .zone-bottom (bottom)   = rating consensus (Agreement stdev:
                                 bright = tight, dark = contentious/split) --
                                 the analytics zone in detail view
     One spectrum keeps "what colour means what" trivial, and adjacent zones
     give relative comparison for free. The old encircling gold->gray
     Agreement frame is GONE; frames are a thin neutral hairline now, which
     frees bright gold to mark OUGHT nodes (see .card.ought). The old dashed
     "contested" frame is gone too -- contentiousness is exactly what the
     bottom bar's colour encodes (and fmtAgg still says "(contested)" in
     text), so a separate dash cue would be redundant. */
  .card{
    position:absolute;transform:translate(-50%,-50%);
    background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:0;overflow:hidden;text-align:center;color:var(--ink-soft);
    box-shadow:0 6px 18px rgba(0,0,0,.35);
    transition:left .35s ease,top .35s ease,opacity .3s ease,
      background-color .2s ease,border-color .2s ease,color .2s ease;
    cursor:pointer;user-select:none;pointer-events:auto;
    z-index:1;
  }
  .card:hover{border-color:var(--accent-dim);color:var(--ink);}
  /* Ought nodes: a distinct node type carrying much of the graph's pragmatic
     takeaways and a natural orientation/end point -- so they get the bright
     gold the Agreement frame used to occupy. DORMANT until a snapshot
     carries kind:"ought" nodes (none of the bundled eggs graphs do yet). */
  /* Type outlines (user notes 3/4): thickened again to match the slim
     body/bottom strips (12px/9px -> 10px, splitting the pair) so ought/
     evidence nodes register even at neighborhood-view zoom levels. */
  .card.ought{
    border:10px solid var(--accent);
    box-shadow:0 6px 18px rgba(0,0,0,.35);
  }
  /* Evidence nodes (== the grammar's external_anchor, confirmed in user
     notes 3 -- one concept, two spellings until the grammar settles on one;
     kind:"evidence" is also honored for forward-compat): content pointing
     at concrete data OUTSIDE the graph gets a medium-blue outline, same
     treatment family as ought-gold, and it replaces the removed "EXTERNAL
     ANCHOR" kind label as the anchor's visual marker. */
  .card.evidence{
    border:10px solid #4a7fc1;
    box-shadow:0 6px 18px rgba(0,0,0,.35);
  }
  /* HANDOFF-TO-UI §2.2: a ghost (demoted marker -- never deleted) is greyed
     and sunk to a layer BELOW the living graph (z-index under .card's
     baseline 1) -- present but clearly retired. Still hoverable/clickable
     (opacity lifts a little on hover) so its record stays reachable. */
  .card.ghost{opacity:.38;filter:grayscale(.75);box-shadow:none;z-index:0;}
  .card.ghost:hover{opacity:.62;}
  .card .txt{font-size:13px;line-height:1.38;}

  /* The three zones. Zone bg/text colours are set inline by makeCard() from
     the ramps; these rules are the uncoloured (unrated) defaults. The thin
     black rules between zones (ITERATION, user notes 2) keep adjacent
     same-spectrum zones from blending when their scores land close. */
  .zone-title{padding:7px 11px 6px;background:var(--panel-2);}
  .zone-body{padding:8px 11px;border-top:1px solid rgba(0,0,0,.6);}
  .zone-bottom{padding:5px 10px;background:var(--panel-2);border-top:1px solid rgba(0,0,0,.6);}
  /* Non-focus cards: the title text carries the card; body & bottom collapse
     to slim colour-only strips so the R&C and consensus cues stay readable
     side by side without text. (1.5x their original thickness for
     visibility, per iteration notes.) */
  .zone-body.zone-strip{height:12px;padding:0;}
  .zone-bottom.zone-strip{height:9px;padding:0;}

  .card--focus{
    width:340px;border-radius:14px;cursor:default;
    box-shadow:0 14px 40px rgba(0,0,0,.5);
  }
  .card--focus:hover{color:var(--ink-soft);border-color:var(--line);}
  .card--focus.ought:hover{border-color:var(--accent);}
  .card--focus.evidence:hover{border-color:#4a7fc1;}
  .card--focus .zone-title{padding:12px 18px 10px;cursor:pointer;}
  .card--focus .zone-title .txt{
    font-family:"Inter",sans-serif;font-size:12px;letter-spacing:.05em;
    text-transform:uppercase;line-height:1.4;font-weight:600;
  }
  .card--focus .zone-body{padding:14px 20px 12px;cursor:pointer;}
  .card--focus .zone-body .txt{font-size:17px;line-height:1.5;}
  /* Bottom bar layout (user notes 4): the glyph's lozenge sits dead-center
     on the card; the comment icon is anchored off to the right. */
  .card--focus .zone-bottom{
    position:relative;display:flex;align-items:center;justify-content:center;
    padding:7px 40px;min-height:38px;
  }
  .card--focus .zone-bottom .comment-chip{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
  }
  /* Edge focus card's body: an empty slim bar (its colour cue is the title
     phrasing's ratings -- dormant until typings carry graded scores). */
  .card--edge-focus .zone-body.zone-strip{height:12px;cursor:default;}
  .card--focus .src{
    margin-top:10px;font-size:11.5px;font-style:italic;color:inherit;opacity:.75;
    border-top:1px solid rgba(128,128,128,.35);padding-top:8px;line-height:1.45;
  }
  .card--focus .src a{color:inherit;text-decoration:underline;text-underline-offset:2px;}
  .card--focus .src a:hover{opacity:1;}

  /* Title popdown (user notes): clicking the focus card's title bar drops
     down the node's alternate titles with their ratings on the right,
     best-rated first. Rendered as a cardsLayer sibling (not inside the
     card -- .card{overflow:hidden} would clip it). */
  .title-drop{
    position:absolute;z-index:9;text-align:left;pointer-events:auto;
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    box-shadow:0 12px 30px rgba(0,0,0,.55);padding:4px 0;
  }
  .title-drop-item{
    display:flex;justify-content:space-between;gap:10px;align-items:baseline;
    padding:6px 11px;font-family:"Inter",sans-serif;font-size:11.5px;color:var(--ink-soft);
  }
  .title-drop-item.is-primary{color:var(--ink);}
  .title-drop-item .ty-star{color:var(--accent);margin-right:4px;}
  .title-drop-item .td-rating{
    font-size:10px;color:var(--ink-dim);white-space:nowrap;flex:0 0 auto;
  }
  .title-drop .title-drop-note{
    padding:5px 11px 6px;font-family:"Inter",sans-serif;font-size:9.5px;
    color:var(--ink-dim);font-style:italic;border-top:1px solid var(--line);
  }
  /* PHASE2-SPEC.md §4: prior-era history, one quiet line per entry, under
     the score line on a focused (node or edge) card. */
  .history-lines{margin-top:4px;color:var(--ink-dim);}
  .history-line{
    font-family:"Inter",sans-serif;font-size:10px;color:inherit;
    letter-spacing:.02em;line-height:1.4;font-style:italic;
  }
  .card--edge-focus{width:320px;}
  /* Invisible wide hit-area drawn atop every ground-edge line/path (node view
     and neighborhood view alike) so a click anywhere near the thin visible
     stroke focuses that edge (CHANGE: edges are focusable, see item 3) --
     pointer-events:stroke means only the (transparent) stroke area itself is
     hit-tested, never the shape's bounding box, so it never steals clicks
     meant for cards or empty background. */
  .edge-hit{cursor:pointer;pointer-events:stroke;}

  .card--nbr{width:150px;border-radius:9px;}
  .card--nbr .txt{font-size:12.5px;}
  .card--anti{width:142px;border-radius:9px;}
  .card--anti .txt{font-size:12px;}
  .card--nh{width:126px;border-radius:8px;}
  .card--nh .txt{font-size:11.5px;}

  .strength-badge{
    display:inline-block;margin-top:4px;font-family:"Inter",sans-serif;font-size:9.5px;
    color:inherit;opacity:.65;letter-spacing:.03em;
  }
  /* HANDOFF-TO-UI §2.6 -- a type-under-vote / pending-flip pill on the title
     bar; inert on small cards (the card's own click wins), clickable through
     to Analytics on the focus card. */
  .poll-badge{
    display:inline-block;margin-top:4px;padding:1px 7px;border-radius:999px;
    border:1px solid currentColor;font-family:"Inter",sans-serif;font-size:8.5px;
    letter-spacing:.06em;text-transform:uppercase;opacity:.8;pointer-events:none;
  }
  .card--focus .poll-badge{cursor:pointer;pointer-events:auto;}

  .junction{fill:var(--accent);opacity:.85;}
  .bracket-label{
    font-family:"Inter",sans-serif;font-size:10px;fill:var(--ink-dim);
  }
  .arc-label{
    position:absolute;font-family:"Inter",sans-serif;font-size:10.5px;color:var(--ink-dim);
    letter-spacing:.05em;text-transform:uppercase;transform:translate(-50%,-50%);
    pointer-events:none;
  }
  .col-label{
    position:absolute;font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);
    letter-spacing:.08em;text-transform:uppercase;transform:translate(-50%,-50%);
    pointer-events:none;
  }
  .empty-note{
    position:absolute;transform:translate(-50%,-50%);
    font-family:"Inter",sans-serif;font-size:11px;color:var(--ink-dim);font-style:italic;
    pointer-events:none;
  }
  /* HANDOFF-TO-UI §2.3: the click-to-show pill that un-hides redundant
     shortcut edges in a focus card's Grounds/Dependents column. */
  .shortcut-note{
    position:absolute;transform:translate(-50%,-50%);pointer-events:auto;
    font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);
    border:1px solid var(--line);border-radius:999px;padding:2px 9px;
    cursor:pointer;background:var(--panel);white-space:nowrap;
  }
  .shortcut-note:hover{color:var(--ink);border-color:var(--accent-dim);}
  /* invisible 1px marker that pads the stage's scrollable extent below the
     lowest card (see renderNodeView's scroll-spacer comment) */
  .scroll-spacer{position:absolute;width:1px;height:1px;pointer-events:none;}

  /* ---------- dot menu (ITEM 5: all persistent chrome collapsed into one
     "..." menu -- color key + swatch grid, cue blurb, frictions, Load JSON.
     Comment chips on cards/edges are NOT chrome (contextual) and stay put. */
  #menu-panel{
    position:fixed;top:calc(var(--topbar-h) + 8px);right:10px;z-index:32;
    width:340px;max-width:92vw;max-height:82vh;overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 18px 44px rgba(0,0,0,.5);padding:14px;
  }
  #menu-panel[hidden]{display:none;}
  .menu-section{margin-bottom:16px;}
  .menu-section:last-child{margin-bottom:0;}
  .menu-section h4{
    margin:0 0 6px;font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .menu-note{
    font-family:"Inter",sans-serif;font-size:10.5px;color:var(--ink-dim);
    line-height:1.55;
  }
  #swatch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .swatch-chip{
    border-radius:8px;padding:10px 8px;text-align:center;
    font-family:"Inter",sans-serif;font-size:10.5px;line-height:1.4;
    border:1px solid var(--line);
  }

  .friction-item{padding:9px 10px;border-top:1px solid var(--line);}
  .friction-item:first-of-type{border-top:none;}
  .friction-item .fmeta{
    font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);margin-bottom:4px;
    display:flex;justify-content:space-between;gap:8px;
  }
  .friction-item .ftext{font-size:12.5px;line-height:1.5;color:var(--ink-soft);}
  .refchip{
    display:inline-block;font-family:"Inter",sans-serif;font-size:10px;color:var(--accent);
    background:rgba(201,162,39,.08);border:1px solid var(--accent-dim);border-radius:5px;
    padding:1px 6px;margin:5px 4px 0 0;cursor:pointer;
  }
  .refchip:hover{background:rgba(201,162,39,.18);}

  /* ---------- persistent legend (VIEWER-SPEC.md §4 item 3) ----------
     The frame/body encoding is powerful but not self-evident, and the color
     key living only inside the dot menu meant a first-time reader had no
     always-visible explanation at all. This is a compact, COLLAPSIBLE key
     pinned bottom-left (where the old pre-ITEM-5 legend used to live) that
     stays on screen in BOTH views. It complements -- doesn't replace -- the
     menu's fuller swatch-test section. */
  #legend{
    position:fixed;left:10px;bottom:10px;z-index:20;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:7px 10px 9px;max-width:250px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #legend .legend-head{display:flex;align-items:center;gap:6px;}
  #legend-toggle{
    appearance:none;cursor:pointer;background:transparent;border:none;padding:0;
    font-family:"Inter",sans-serif;font-size:10.5px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  #legend-toggle:hover{color:var(--ink);}
  #legend[data-collapsed] .legend-body{display:none;}
  .legend-row{
    display:flex;align-items:center;gap:8px;margin-top:6px;
    font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);line-height:1.35;
  }
  .legend-bar{
    flex:0 0 auto;width:62px;height:9px;border-radius:3px;
    border:1px solid var(--line);
  }
  .legend-minicard{
    flex:0 0 auto;width:62px;border:1px solid var(--line);border-radius:5px;
    overflow:hidden;
  }
  .legend-minicard div{
    font-family:"Inter",sans-serif;font-size:7.5px;letter-spacing:.05em;
    text-transform:uppercase;padding:2px 0 1px;text-align:center;line-height:1.3;
  }
  .legend-swatch--ought{
    flex:0 0 auto;width:56px;height:18px;border-radius:5px;
    border:4px solid var(--accent);background:var(--panel-2);
  }
  .legend-swatch--evidence{
    flex:0 0 auto;width:56px;height:18px;border-radius:5px;
    border:4px solid #4a7fc1;background:var(--panel-2);
  }
  .legend-swatch--ghost{flex:0 0 auto;width:56px;height:18px;border-radius:5px;border:1px solid var(--line);background:var(--panel-2);opacity:.38;filter:grayscale(.75);}
  .legend-note{
    margin-top:7px;font-family:"Inter",sans-serif;font-size:9.5px;
    color:var(--ink-dim);line-height:1.45;font-style:italic;
  }

  /* ---------- rating spread strip (VIEWER-SPEC.md §4 item 1) ----------
     A tiny 0-5 axis under the focus card's score line: shaded band =
     mean ±1 stdev, dots = per-bloc means (dot size grows with that bloc's
     n), vertical tick = overall mean. Drawn entirely in currentColor at
     varying opacities so it stays legible on any body fill the quality
     ramp produces. Grayed (never hidden) below DIST_MIN_N raters. */
  .dist-row{cursor:pointer;line-height:0;}
  .dist-strip{display:inline-block;vertical-align:middle;}
  /* Confidence LOZENGE (user notes 4, replacing notes 3's whole-glyph tint,
     which was hard to read against some bottom-bar shades): the glyph
     always draws in the standard zone ink, and sits on a pill just large
     enough to enclose it, edged with the same thin black rule as the zone
     separators. The pill's BODY carries the confidence signal -- red =
     below quorum, amber = marginal (provisional / below confirm; these
     replace the "(provisional)" text) -- and stays the bottom bar's own
     colour (transparent) once n is high enough for confidence, leaving
     just the quiet border. */
  .dist-lozenge{
    display:inline-block;padding:2px 8px;border-radius:999px;
    border:1px solid rgba(0,0,0,.6);
  }
  .dist-lozenge--insufficient{background:#d05a50;color:#1b1508;}
  .dist-lozenge--marginal{background:#c9982d;color:#1b1508;}
  .dist-row:hover .dist-strip{opacity:.95;}

  /* ---------- assessment detail panel (VIEWER-SPEC.md §4 item 1) ----------
     The spread strip's click-through target: same right-side panel family
     as #forum-panel (and it reuses the forum-header/subtitle/subhead
     classes); only one of the two right-edge panels shows at a time. */
  #assessment-panel{
    position:fixed;top:var(--topbar-h);right:0;bottom:0;z-index:28;
    width:360px;max-width:92vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-18px 0 40px rgba(0,0,0,.4);
    overflow-y:auto;padding:16px 16px 30px;
  }
  #assessment-panel[hidden]{display:none;}

  /* ---------- phrasings panel (user notes: click the focus card's body) ----
     Alternate phrasings with their ratings, best cumulative first. Same
     right-edge family; only one right panel shows at a time. */
  #phrasings-panel{
    position:fixed;top:var(--topbar-h);right:0;bottom:0;z-index:28;
    width:360px;max-width:92vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-18px 0 40px rgba(0,0,0,.4);
    overflow-y:auto;padding:16px 16px 30px;
  }
  #phrasings-panel[hidden]{display:none;}
  #frictions-panel{
    position:fixed;top:var(--topbar-h);right:0;bottom:0;z-index:28;
    width:360px;max-width:92vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-18px 0 40px rgba(0,0,0,.4);
    overflow-y:auto;padding:16px 16px 30px;
  }
  #frictions-panel[hidden]{display:none;}
  .phrasing-item{
    padding:9px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;
    font-size:13px;line-height:1.5;color:var(--ink-soft);text-align:left;
  }
  .phrasing-item.is-primary{border-color:var(--accent-dim);background:rgba(201,162,39,.06);}
  .phrasing-item .ph-scores{
    margin-top:6px;font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);
    display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;
  }
  .assess-dim{margin-bottom:6px;}
  .assess-value{font-family:"Inter",sans-serif;font-size:12.5px;color:var(--ink);}
  .assess-axis-labels{
    position:relative;width:280px;height:11px;
    font-family:"Inter",sans-serif;font-size:9px;color:var(--ink-dim);
  }
  .assess-axis-labels span{position:absolute;transform:translateX(-50%);}
  .assess-bloc{
    display:flex;justify-content:space-between;gap:8px;
    font-family:"Inter",sans-serif;font-size:11px;color:var(--ink-soft);
    padding:3px 0;border-top:1px solid var(--line);
  }
  .assess-bloc:first-of-type{border-top:none;}
  .assess-note{
    font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);
    font-style:italic;line-height:1.5;margin-top:5px;
  }

  /* ---------- forums (FORUMS-SPEC.md §4) ----------
     Node-view-only affordances: a small clickable "typing label" at each
     Ground/Dependent edge's midpoint (the primary typing's resolved text --
     never a line to the label, it's data not geometry) and comment-count
     chips (on the focus card and on edge labels) that open a read-only
     right-side forum panel. Neighborhood view never creates any of these. */
  .typing-label{
    position:absolute;transform:translate(-50%,-50%);pointer-events:auto;
    display:flex;align-items:center;gap:6px;max-width:190px;
    font-family:"Inter",sans-serif;font-size:10px;letter-spacing:.01em;
    background:var(--panel);border:1px solid var(--line);border-radius:7px;
    padding:2px 8px;color:var(--ink-dim);white-space:nowrap;z-index:6;
  }
  .typing-label .typing-text{
    overflow:hidden;text-overflow:ellipsis;cursor:pointer;
  }
  .typing-label .typing-text:hover{color:var(--ink);}
  .typing-label .typing-text.is-ref{color:var(--accent);}
  .comment-chip{
    display:inline-block;font-family:"Inter",sans-serif;font-size:10px;
    color:var(--ink-dim);background:rgba(201,162,39,.08);
    border:1px solid var(--accent-dim);border-radius:11px;padding:1px 8px;
    cursor:pointer;flex:0 0 auto;
  }
  .comment-chip:hover{color:var(--ink);border-color:var(--accent);}
  /* Inside a (possibly light-coloured) bottom zone the chip inherits the
     zone's own legible ink instead of the dark-theme dim default. No count
     number any more (iteration notes) -- an empty forum just grays the icon. */
  .zone-bottom .comment-chip{margin:0;color:inherit;background:transparent;border-color:currentColor;opacity:.85;}
  .zone-bottom .comment-chip:hover{opacity:1;}
  .zone-bottom .comment-chip--empty{opacity:.3;}
  .zone-bottom .comment-chip--empty:hover{opacity:.55;}

  #forum-panel{
    position:fixed;top:var(--topbar-h);right:0;bottom:0;z-index:28;
    width:360px;max-width:92vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-18px 0 40px rgba(0,0,0,.4);
    overflow-y:auto;padding:16px 16px 30px;
  }
  #forum-panel[hidden]{display:none;}
  .forum-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;}
  .forum-header h4{
    margin:0;font-family:"Inter",sans-serif;font-size:12px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .forum-close{
    appearance:none;cursor:pointer;background:transparent;border:none;
    color:var(--ink-dim);font-size:15px;line-height:1;padding:2px 4px;
  }
  .forum-close:hover{color:var(--ink);}
  .forum-subtitle{font-family:"Inter",sans-serif;font-size:11px;color:var(--ink-dim);margin:2px 0 14px;font-style:italic;}
  .forum-subhead{
    font-family:"Inter",sans-serif;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-dim);margin:16px 0 8px;
  }
  .forum-typing-item{
    display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    padding:7px 9px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;
    font-size:12.5px;color:var(--ink-soft);
  }
  .forum-typing-item.is-primary{border-color:var(--accent-dim);background:rgba(201,162,39,.06);}
  .forum-typing-item .ty-star{color:var(--accent);margin-right:5px;}
  .forum-typing-item .ty-agrees{
    font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);white-space:nowrap;
  }
  .forum-empty{font-family:"Inter",sans-serif;font-size:11.5px;color:var(--ink-dim);font-style:italic;}
  .forum-comment{border-top:1px solid var(--line);padding:9px 0 9px 12px;}
  .forum-comment:first-of-type{border-top:none;}
  .fc-meta{
    font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);
    display:flex;justify-content:space-between;gap:8px;margin-bottom:3px;
  }
  .fc-text{font-size:12.5px;line-height:1.5;color:var(--ink-soft);}

  /* ---------- load-json modal ---------- */
  /* Premier-graph picker (user request): the Load Graph modal leads with
     one tile per flagship graph; paste/file loading stays below as the
     advanced path. */
  #graph-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .graph-choice{
    appearance:none;cursor:pointer;text-align:left;
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;color:var(--ink-soft);transition:.15s;
  }
  .graph-choice:hover{color:var(--ink);border-color:var(--accent-dim);}
  .graph-choice b{
    display:block;font-family:"Inter",sans-serif;font-size:12.5px;color:var(--ink);
    margin-bottom:2px;
  }
  .graph-choice span{font-family:"Inter",sans-serif;font-size:10px;color:var(--ink-dim);line-height:1.4;}

  #modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;
    display:flex;align-items:center;justify-content:center;
  }
  #modal-backdrop[hidden]{display:none;}
  #modal{
    width:min(640px,92vw);max-height:80vh;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.55);
    display:flex;flex-direction:column;gap:12px;
  }
  #modal h3{margin:0;font-family:"Inter",sans-serif;font-size:14px;color:var(--ink);font-weight:600;}
  #modal p{margin:0;font-family:"Inter",sans-serif;font-size:11.5px;color:var(--ink-dim);line-height:1.6;}
  #modal textarea{
    width:100%;height:220px;background:var(--bg);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;
    resize:vertical;
  }
  #modal .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  #modal .err{color:#e0745a;font-family:"Inter",sans-serif;font-size:11.5px;min-height:14px;}
  #modal .spacer{flex:1 1 auto;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}

  /* =======================================================================
     Introduction — a guided, spotlight-based walkthrough (VIEWER-SPEC §4.8).
     Onboards a first-time reader through the card grammar on a live graph.
     The overlay dims the whole viewer; a single transparent "spotlight" box
     (a huge box-shadow is what actually darkens everything around it) lifts
     the element under discussion out of the dim; a callout explains it.
     ======================================================================= */
  #intro-btn{color:var(--accent);border-color:var(--accent);}
  #intro-overlay{position:fixed;inset:0;z-index:60;}
  #intro-overlay[hidden]{display:none;}
  /* click-catcher: blocks stray interaction with the viewer during the tour */
  #intro-catch{position:absolute;inset:0;background:transparent;}
  #intro-spot{
    position:absolute;border-radius:12px;pointer-events:none;
    box-shadow:0 0 0 9999px rgba(6,8,12,.74), 0 0 0 2px var(--accent) inset,
      0 0 22px 5px var(--accent-dim);
    transition:top .38s cubic-bezier(.4,0,.2,1), left .38s cubic-bezier(.4,0,.2,1),
      width .38s cubic-bezier(.4,0,.2,1), height .38s cubic-bezier(.4,0,.2,1);
  }
  /* centered (no target) step: the spot collapses to nothing, backdrop only */
  #intro-spot.intro-spot--none{
    box-shadow:0 0 0 9999px rgba(6,8,12,.82);
    border:0;width:0;height:0;
  }
  #intro-callout{
    position:absolute;width:330px;max-width:calc(100vw - 32px);
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 18px 48px rgba(0,0,0,.5);padding:17px 18px 14px;
    transition:top .38s cubic-bezier(.4,0,.2,1), left .38s cubic-bezier(.4,0,.2,1);
  }
  #intro-callout.intro-callout--center{
    top:50%;left:50%;transform:translate(-50%,-50%);width:410px;text-align:left;
  }
  #intro-callout h4{
    margin:0 0 7px;font-size:15px;color:var(--ink);font-weight:600;letter-spacing:.01em;
  }
  #intro-callout .intro-body{font-size:13px;line-height:1.55;color:var(--ink-soft);}
  #intro-callout .intro-body b{color:var(--ink);font-weight:600;}
  #intro-foot{display:flex;align-items:center;gap:8px;margin-top:14px;}
  #intro-progress{font-size:11px;color:var(--ink-mute);letter-spacing:.04em;flex:0 0 auto;}
  #intro-dots{display:flex;gap:4px;flex:1 1 auto;align-items:center;}
  #intro-dots i{width:5px;height:5px;border-radius:50%;background:var(--line);display:block;}
  #intro-dots i.on{background:var(--accent);}
  #intro-foot .spacer{flex:1 1 auto;}
  .intro-b{
    appearance:none;cursor:pointer;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink-soft);font-size:12px;padding:6px 12px;border-radius:7px;transition:.15s;white-space:nowrap;
  }
  .intro-b:hover{border-color:var(--ink-mute);color:var(--ink);}
  .intro-b--primary{background:var(--accent);border-color:var(--accent);color:#0b0f16;font-weight:600;}
  .intro-b--skip{background:transparent;border-color:transparent;color:var(--ink-mute);padding:6px 6px;}
  .intro-b--skip:hover{color:var(--ink-soft);}
  /* During the tour, cards must SNAP to their laid-out spot instead of sliding
     in over .35s (.card's left/top transition) -- otherwise the spotlight is
     measured mid-slide and lands off in the scroll gutter. */
  body.intro-running .card{transition:background-color .2s ease,border-color .2s ease,color .2s ease;}
</style>
</head>

<header id="topbar" class="ui">
  <div class="brand-line"><b>Reasonable:</b> <span id="question-line" title="">Are eggs good for you?</span></div>
  <!-- HANDOFF-TO-UI §2.5: blind Rating mode's always-visible reminder -- lit
       whenever consensus cues are withheld, whether toggled by hand or
       opened blind by a rating_mode_only dataset (see boot()). -->
  <span id="rating-pill" class="ui" hidden>RATING MODE — blind</span>
  <!-- VIEWER-SPEC §4.8: guided onboarding walkthrough, launched here. Left of
       the dot menu per the title-bar layout. -->
  <button class="btn" id="intro-btn" title="A 2-minute guided walkthrough">Introduction</button>
  <button class="btn" id="menu-btn" aria-label="Menu" title="Menu">&#8942;</button>
</header>

<main id="stage">
  <svg id="edges-svg"></svg>
  <div id="cards-layer"></div>
</main>

<!-- ITEM 5: every persistent chrome bit that used to live as its own
     always-on-screen widget (legend text, colour-key pill, frictions pill,

     Comment chips ON cards/edges are unaffected -- those are contextual,
     not chrome, and keep rendering inline as before. -->
<div id="menu-panel" class="ui" hidden>
  <!-- Iteration (user request): actions first -- Load Graph and the

       and the colour key / cue blurb reference material sits below. -->
  <div class="menu-section" id="menu-load">

  <div class="menu-section" id="menu-colorkey"></div>
  <div class="menu-section" id="menu-blurb"></div>
</div>

<!-- FORUMS-SPEC.md §4: read-only right-side forum panel (node view only).

<div id="forum-panel" class="ui" hidden></div>

<!-- VIEWER-SPEC.md §4 item 1: analytics panel, the bottom bar's spread-glyph

     right panel shows at a time. Populated by openAssessmentPanel(). -->
<div id="assessment-panel" class="ui" hidden></div>

<!-- User notes: alternate-phrasings panel, opened by clicking the focus
     card's body zone. Populated by openPhrasingsPanel(). -->
<div id="phrasings-panel" class="ui" hidden></div>

<!-- Iteration (user request): frictions popup, opened from the dot menu's
     Frictions button. Populated by openFrictionsPanel(). -->
<div id="frictions-panel" class="ui" hidden></div>

<!-- VIEWER-SPEC.md §4 item 3: persistent (collapsible) legend, pinned
     bottom-left in both views. Populated once by buildLegend() -- its
     spectrum bar and mini-card are computed from the same zoneColorFor()/
     consensusColorFor() ramps the cards themselves use, so it can never
     drift out of sync. -->
<div id="legend" class="ui"></div>

<!-- VIEWER-SPEC §4.8: Introduction walkthrough overlay. Structure is static;
     startIntro() populates and positions the spotlight + callout per step. -->
<div id="intro-overlay" hidden>
  <div id="intro-catch"></div>
  <div id="intro-spot"></div>
  <div id="intro-callout">
    <h4 id="intro-title"></h4>
    <div class="intro-body" id="intro-text"></div>
    <div id="intro-foot">
      <span id="intro-progress"></span>
      <div id="intro-dots"></div>
      <button class="intro-b intro-b--skip" id="intro-skip">Skip</button>
      <button class="intro-b" id="intro-back">Back</button>
      <button class="intro-b intro-b--primary" id="intro-next">Next</button>
    </div>
  </div>
</div>

<div id="modal-backdrop" hidden>
  <div id="modal">
    <h3>Load a graph</h3>
    <div id="graph-picker"></div>
    <p>Or paste a snapshot conforming to BUILD-SPEC.md §1b / choose a file. Nothing persists — reload the page to return to the default. Served over http(s) you can also open <code>viewer.html?data=path/to/graph.json</code>.</p>
    <textarea id="paste-area" placeholder="{ &quot;meta&quot;: ..., &quot;nodes&quot;: [...], ... }"></textarea>
    <div class="row">
      <input type="file" id="file-input" accept="application/json,.json">
      <div class="spacer"></div>
      <button class="btn" id="modal-sample">Use bundled sample</button>
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-apply" style="border-color:var(--accent);color:var(--accent);">Load</button>
    </div>
    <div class="err" id="modal-err"></div>
  </div>
</div>

      "text": "Two grounds in the diabetic causal-vs-confounded fork (n013 'association replicates across studies' and n017 'RCT/MR evidence outweighs observational data') are Hill-criteria/meta-evidential considerations, not object-level facts about diabetic physiology. 'Replicates' really only supports 'this is a real, non-artifactual association' (which BOTH the causal and confounded readings accept) rather than uniquely supporting the causal side; 'RCT/MR should outweigh observational correlation' is a rule about how to weigh evidence types, not a reason confounding is actually present. The Ground/antithesis grammar forced me to pick one specific rival member as the sole Dependent for each, which overstates how one-sidedly they cut. A relation for 'bears on the credibility of the whole fork without favoring either specific rival' would fit better than routing them into one antithesis member.",
      "ts": "2026-07-08T01:41:54.166387+00:00"
    },
    {
      "agent": "agent-b",
      "id": "f2",
      "refs": [
        "n004",
        "n007",
        "n006"
      ],
      "text": "The eggs-001 pack entry (Hu et al. 1999) is VERIFY_BEFORE_USE and its claim_summary gives only study scope/topic (a cohort examining egg consumption vs. CHD/stroke risk), with no diabetes-subgroup finding stated -- and eggs-004 (the actual source for a diabetes-specific finding) is held back entirely. So the external_anchor node (n004) can only honestly assert 'this study examined X,' never 'this study found X about diabetics.' That leaves the whole diabetic-subgroup fork resting on a bridging claim (n007, 'diabetes findings arise from subgroup analyses within cohorts of this kind') rather than on a direct anchored finding -- the external_anchor kind's implicit promise of 'source says/found X' degrades to 'a source like this exists' when the pack is this general, and the grammar has no way to mark an anchor as scope-only vs. finding-bearing.",
      "ts": "2026-07-08T01:41:58.508343+00:00"
    },
    {
      "agent": "agent-lane-a",
      "id": "f3",
      "refs": [
        "n004",
        "n001",
        "n003"
      ],
      "text": "Ground edges attach to a node as a whole, not to a specific phrasing, but a node's phrasings can differ sharply in specificity/direction. n004 (Hu et al. 1999 anchor) originally had only phrasing p0, which states merely that the study 'examined the association' between egg consumption and CHD/stroke -- no direction of finding. I added phrasing p1 stating the actual (well-established) qualitative finding: no meaningful association in the general population, higher risk in diabetics. I then drew Ground edges e025 (n004->n001, neutral claim) and e026 (n004->n003, depends-on-individual claim) that are only justified by p1's content, not p0's. A reader who lands on p0 as the 'primary' phrasing would see those Ground edges as unsupported overclaims from the node's stated content. The grammar has no way to pin a Ground edge to the phrasing-version it actually relies on -- support is asserted at node granularity while the evidential content that licenses it lives at phrasing granularity.",
      "ts": "2026-07-08T01:42:14.288892+00:00"
    },
    {
      "agent": "agent-lane-a",
      "id": "f4",
      "refs": [
        "n020",
        "n005",
        "n021",
        "n001"
      ],
      "text": "Ground/Dependent conflates two structurally different relations I needed for the LDL causal chain: (1) genuine evidential support -- e.g. n021 (hepatic homeostatic downregulation) -> n001 (neutral claim), where n021 is a reason to believe n001 is true; versus (2) scope-qualification -- e.g. n020 (a hyper-responder subgroup exists) -> n005 ('dietary cholesterol raises serum LDL on average, though it varies considerably between individuals'). n020 doesn't give a reason to believe the average-effect claim in n005 is true; it explains why n005's own hedge clause ('varies considerably') is warranted, i.e. it bounds n005's scope rather than supporting n005's content. I drew both as plain Grounds because that's the only support-flavored verb available, but a reader can't tell from the edge alone which flavor is meant -- 'X grounds Y' reads identically whether X argues for Y or X merely qualifies how far Y reaches.",
      "ts": "2026-07-08T01:42:22.733960+00:00"
    },
    {
      "agent": "agent-03",
      "id": "f5",
      "refs": [
        "n029",
        "n030",
        "n031",
        "n002",
        "n005",
        "n022"
      ],
      "text": "The Ground/Dependent grammar does not distinguish a VALUE premise that enables an is-to-ought inference from an ordinary evidential premise. n030 ('avoiding cheap low-cost precautions under genuine uncertainty is worthwhile' -- a value claim) and n029 ('evidence on dietary cholesterol's cardiovascular effect is mixed/unsettled' -- an empirical claim) jointly ground n031 ('it is reasonable for most people to moderate egg/dietary-cholesterol intake') via the same conjunction-group mechanism (--group) used elsewhere in this graph for two purely empirical grounds (e.g. n005 + n022 jointly grounding n002). Structurally the two conjunctions look identical, but epistemically they are not: n030 is not truth-apt in the same sense a factual claim is -- rating it asks 'is this value worth holding,' not 'is this so' -- and the combination logic of a practical syllogism (fact + value -> ought) differs from evidential corroboration (independent facts -> stronger belief in a further fact). A reader cannot tell, from graph structure alone, that n031 rests on a value premise rather than purely empirical grounds; both render as plain Ground edges into a plain conjunction group.",
      "ts": "2026-07-08T01:45:47.703416+00:00"
    },
    {
      "agent": "agent-03",
      "id": "f6",
      "refs": [
        "n005",
        "n033"
      ],
      "text": "Antithesis sets are defined as rival POSITIVE claims, but I had to choose arbitrarily whether n005 ('dietary cholesterol intake raises serum LDL cholesterol on average') and n033 ('dietary saturated fat, not dietary cholesterol intake itself, is the primary dietary driver of serum LDL cholesterol for most people') are genuine rivals for set s4. They are not strictly mutually exclusive as propositions -- both could be true at once (cholesterol raises LDL somewhat AND saturated fat raises it more, making saturated fat 'primary' without n005 being false) -- yet they are real, opposing positions in the actual nutrition-science debate (the classic dietary-cholesterol-focused view vs. the saturated-fat-revisionist view that partly motivated the guideline cap's removal). The grammar has only one antithesis relation and cannot distinguish 'strictly exclusive rivals' from 'rivals in emphasis/primary-cause framing that are logically compatible in the weak-form reading' -- both get the same set membership (s4 here), with no way to flag which kind of rivalry is meant.",
      "ts": "2026-07-08T01:45:55.213853+00:00"
    },
    {
      "agent": "frontier-2",
      "id": "f7",
      "refs": [
        "n042",
        "n044",
        "n043",
        "n001"
      ],
      "text": "n042 ('the good-for-you verdict should weigh net nutrition, not just CVD risk against cardiovascular risk') is a framing/scope claim about HOW the overall question should be adjudicated, not evidence that eggs' nutritional properties are good. I routed it as an ordinary Ground into n044 (net-nutrition-positive) for lack of a better relation, but that understates what it's doing: it doesn't make n044 more likely to be true, it governs how much n044's truth should weigh against n001/the CVD-risk claims when reaching an overall verdict. The grammar has no way to mark 'this claim sets the weighing criterion between two rival considerations' as distinct from ordinary evidential support, so a reader following the Ground edge would wrongly read n042 as reason to believe n044 rather than as a claim about the adjudication standard itself.",
      "ts": "2026-07-08T01:56:18.743196+00:00"
    },
    {
      "agent": "frontier-1",
      "id": "f8",
      "refs": [
        "n048",
        "n050"
      ],
      "text": "Antithesis set s6 pairs n048 ('guidance should be population-specific, because athletes/children/FH patients respond differently') against n050 ('one general guideline is preferable because subgroup-specific advice is hard to communicate and most people don't know their own subtype'). These are genuine rivals at the level of 'what should the guidance look like,' but they disagree on different DIMENSIONS: n048 contests the underlying premise (heterogeneity is real and decision-relevant), while n050 concedes that premise and instead makes a practicality/communication-cost argument for ignoring it. The antithesis-set grammar records only that the two are rivals, with no way to mark that one rival is a first-order factual/mechanistic claim and the other is a second-order cost-benefit-of-precision claim that doesn't actually dispute the first one's facts. A reader scanning s6 can't tell these are arguing past each other on different grounds rather than contesting the same fact.",

          "text": "Rated A=4.0, higher than the current consensus. Unlike several other grounds in this graph, n074 isn't just gesturing at a topic -- it names a specific, well-characterized mechanism (CKD/nephropathy impairs renal TMAO clearance) and applies it to the exact comparison n006 makes (diabetics vs. general population). Diabetic nephropathy prevalence is substantially elevated in T2D cohorts, TMAO clearance is renally dependent, and TMAO is a plausible CVD-risk mediator for choline-rich foods -- so granting n074, the predicted direction and rough magnitude of a diabetes-specific amplification in n006 follows fairly directly. This is a case where mechanistic plausibility is doing real inferential work, not decorating a foregone conclusion; I'd flag it as one of the stronger mechanism-to-epidemiology edges in the graph.",

          "text": "Rated 4.2 for Agreement on this edge. Granting that eggs provide ~6g of quality protein at low calorie cost strongly supports that they contribute to satiety and reduce subsequent intake. The protein-satiety link is well-established, and eggs' efficiency makes this inference quite solid. Perhaps the lower mean reflects skepticism of satiety effects generally, but this edge presents a reasonable mechanism.",

          "text": "Rated A=2.0. The inference from 'large buoyant LDL particles' (n076) to 'eggs are nutritionally neutral for healthy adults' (n001) is weak. Even if eggs shift LDL particle size favorably, this doesn't license the conclusion of neutrality without knowing the effect on total ApoB—which the lipidologist rightly emphasized as the better predictor of CVD risk. The ground state (n076) is narrower than what the dependent conclusion requires.",

          "text": "Rated A=2.0. n076 (large-buoyant-LDL shift) sits in an antithesis pair with n078 (ApoB > LDL particle size as the CVD-risk predictor) -- and current lipidology consensus favors n078's framing. Even granting n076 in full, a favorable shift in LDL particle size doesn't establish n001's 'neutral, no meaningful CVD risk increase' unless total ApoB/particle number is also shown not to rise; several trials show egg intake can raise ApoB alongside the size shift. So this ground is real but insufficient on its own -- it answers a secondary question (size) while leaving the primary risk-determining question (particle number) open. Agree with h06-plant-leaning's earlier A=2.0.",
          "ts": "2026-07-09T01:26:22.438819+00:00"

        {

              "n": 0,
              "state": "sealed",
              "stdev": null
            }
          },
          "text": "Rated this edge low (2.0), and here's the diabetic-specific reason to be even more skeptical than the general-population critique already given (h06, s03-ebm-meta): the particle-size argument in n076 is weakest exactly where it's often invoked. Diabetic/insulin-resistant dyslipidemia is characterized by a shift toward small, dense LDL and elevated triglycerides and ApoB even when LDL-C looks 'normal' -- so an egg-driven shift toward larger, more buoyant particles (n076) is the one favorable-sounding finding LEAST likely to rescue the risk picture for this subgroup if total ApoB still rises, which is the scenario s01-lipidologist and n078 flag. Using n076 to support 'eggs neutral for healthy adults' (n001) already elides the ApoB caveat per the antithesis pair; extending that reasoning to diabetics specifically would compound the error. Scope this one carefully if it's ever generalized beyond healthy adults.",

        }

          "text": "Rating A=4.5, above the current crowd mean (~3.4). This is exactly the correct epistemic standard for observational nutrition epidemiology: adjustment for known confounders (age, BMI, smoking, baseline glycemia, etc.) that doesn't erase an association is real evidence for a causal link, but it can never fully rule out residual/unmeasured confounding (e.g., unmeasured dietary pattern, health-conscious behavior clustering). The claim doesn't overclaim causation and doesn't dismiss the finding either -- it states the correct partial-evidence conclusion. I suspect this reads as weaker than it is because hedged language ('some evidence,' 'not conclusive') sounds non-committal to non-specialists; from a causal-inference standpoint, that hedge is the substance, not a weakness. This is the kind of well-scoped claim the graph should rate high, not average toward the middle.",

          "text": "Rating A=2.0. Prior comments (rex-3, s03-ebm-meta, s05-biochemist, h09, h30) all flagged the phrasing as backwards on C/R -- I want to be explicit that this also sinks the A (truth) rating, not just clarity. As literally written, 'worth avoiding cheap, low-cost precautions... even without definitive proof of harm' asserts the opposite of the standard precautionary principle, and it is used as a ground for moderation (via g3/n031) where only the intended reading (take cheap precautions under uncertainty) does any work. On the merits I can't rate the sentence as stated above a 2 -- it's not just unclear, taken at face value it's false. If this gets a wording fix before the graph seals, I'd rate the corrected precautionary-principle version around 3.5 (defensible but generic, doesn't establish eggs specifically clear that low bar).",

          "text": "R=2.2, diverging from the ~3.8 consensus. This bundles three subgroups with unrelated mechanisms as if one line of reasoning covers all: FH is a monogenic LDL-receptor defect unrelated to dietary cholesterol responsiveness per se, children raise a growth-vs-early-plaque tradeoff (n045), and athletes' relevant nutritional concerns are typically about protein/energy needs, not documented differential cholesterol response. Only the children case has real supporting ground in this graph (n045, per s02-nutri-epi's c082 on e051). Treating 'these three groups differ, therefore guidance should be subgroup-tailored' as one inference overgeneralizes from one well-argued case to two others that aren't established here -- a composition/hasty-generalization problem, not a well-scoped claim.",

            }
          },
          "text": "Diverging on where this claim's evidence actually points. s07-guidelines-pubh and s08-synthesizer already flagged the composition problem (FH/children/athletes bundled under one 'tailor by subgroup' conclusion when only some legs have real grounding here). I'd go further: the single subgroup this graph has actually built the deepest evidence chain for -- diabetes/insulin resistance (n004, n006-n012's causal-vs-confounded analysis, n020's hyper-responder mechanism, n012's diabetic-dyslipidemia pathway) -- is entirely absent from n048's own enumeration. A 'guidance should be population-specific' claim that omits the best-evidenced subgroup case in the graph while including two weaker ones (athletes, FH) is mis-scoped in the direction that matters clinically. I rated n048's grounding edges accordingly (e050 at 4.0: FH is a real, if partial, leg) but the node's phrasing itself should name diabetes/insulin resistance explicitly, not just FH -- that's the subgroup with the largest and most clinically actionable effect size in the source material.",

          "text": "Rated A=4.5, above the current mean (~3.84) -- this deserves to be rated as one of the stronger methodological points in the graph, not a minor caveat. Egg consumption is almost always assessed via food-frequency questionnaires that ask about 'eggs' as an item, frequently without capturing preparation method or accompanying fats (butter, oil type, bacon grease). Any cohort estimate of 'egg consumption and CVD risk' is therefore a mixture of the egg's own effect and its typical preparation/co-consumption pattern in that population -- a real, well-recognized source of exposure misclassification and confounding in nutritional epidemiology, not merely a hypothetical concern.",

          },
          "text": "On the p0 phrasing, R=2.5, diverging from the ~4.0 consensus. The BV-97%/complete-EAA-profile claims are reasonable food-science facts, but the causal tail -- 'supporting skeletal and muscle development during childhood growth' -- is an unsupported leap from a protein-quality metric to an actual growth outcome. Biological value describes amino acid utilization efficiency in short-term nitrogen-balance studies; it is not evidence that egg protein specifically drives child growth/development outcomes versus other complete-protein sources providing equivalent EAAs at adequate total protein intake. The phrasing reads two different claims (protein quality metric; growth outcome) as one seamless inference.",
          "ts": "2026-07-08T22:57:22.452299+00:00"

          },
          "text": "Diverging on A (2.8) and R (2.2), agreeing with s02-nutri-epi's c083. BV=97% and complete-EAA-profile are solid food-science facts, but 'supporting skeletal and muscle development during childhood growth' is an unsupported causal leap: biological value is a nitrogen-balance/protein-utilization metric, not a demonstrated growth-outcome effect specific to egg protein versus other complete-protein sources at adequate intake. As stated, this is two claims fused into one -- a true premise plus an unearned conclusion -- so it can't rate as high as a well-scoped nutrient-quality claim would.",

          "text": "R=3.2, C=3.5. The 'minimal glycemic impact from low carbohydrate content' half is solid endocrinology. But 'can support stable blood glucose in people with diabetes' quietly upgrades 'won't spike glucose much' into an active stabilizing benefit -- eggs still provoke an insulin/glucagon response and are rarely eaten in isolation (bacon, toast, hash browns), and postprandial glucose in T2D is driven by more than carb content alone (protein-stimulated gluconoegenesis, gastric emptying). The claim isn't false, but it overreaches slightly beyond what 'low carb' actually establishes, and should be scoped to acute glycemic impact rather than general glucose stability.",

          "text": "This is true as far as LDL particle size goes, but particle size is not what predicts risk best -- particle NUMBER (ApoB) is. A shift toward larger, more buoyant LDL does not lower cardiovascular risk if ApoB (total atherogenic particle count) rises at the same time, which is a plausible outcome of higher dietary cholesterol intake in many people. Added n078 as a rival claim (antithesis set s8) so the graph doesn't let 'less atherogenic particle type' stand in for 'lower risk' unchallenged.",

          "text": "Rated reasonableness of this claim's phrasing at 3.3: while the shift toward larger LDL particles is mechanistically plausible, the lipidologist (s01) correctly points out that particle SIZE alone doesn't determine risk if total PARTICLE NUMBER (ApoB) rises. The claim presents a partial truth without acknowledging this critical limitation. A more careful phrasing would qualify: favorable particle type shift, BUT total ApoB impact remains important.",

          "text": "Rated lower (3.2) because, as s01-lipidologist and others have noted, particle size alone is incomplete -- ApoB (total particle count) is the better CVD risk predictor, and egg-derived dietary cholesterol can raise ApoB even while shifting the particle distribution toward larger particles. For someone with family heart disease history like me, the claim needs to account for this nuance.",

          "text": "Glad this converged -- h06/h16/h29 all correctly picked up the ApoB caveat from my earlier comment. For the record: n076's particle-size claim is accurate and I don't think it should be rated as unreasonable/false, just incomplete on its own; n078 (ApoB as the better predictor) is the necessary complement, which is why I set them as a rival pair (s8) rather than editing n076 itself.",

          },
          "text": "Rating A=2.75, C=4.5 (phrasing is clear and technically accurate on particle size). Agree with s01-lipidologist's resolution: this is a true but incomplete premise, and the antithesis pairing with n078 is the right structure. From a causal-inference standpoint the risk here is a subtle equivocation many readers will make: 'shifts LDL toward the less-atherogenic subtype' silently gets read as 'therefore lowers CVD risk,' but ApoB (n078) is the outcome that actually predicts events, and egg-driven cholesterol intake can raise ApoB even while shifting subtype distribution. n076 alone shouldn't be used as a ground for 'eggs don't raise cardiovascular risk' -- only for the narrower, true claim about particle subtype. Rating n078 A=4.5: it reflects the current apoB-primacy consensus (Sniderman et al., Mendelian randomization evidence) and is the more decision-relevant of the pair.",

   * ========================================================================= */

  function ghostProvenanceText(x){

        + (x.demoted.seq != null ? " (seq " + x.demoted.seq + ")" : "")
        + ": " + (x.demoted.reason || "superseded");

  // §2.5: true while the viewer is in blind Rating mode -- structural facts
  // (topology, strength counts, texts, kinds, typings, ghosts, type polls)
  // stay visible; every consensus cue (colours, glyphs, scores, threads,
  // aggregate panels) is gated behind this at each choke point below.
  function blind(){ return !!state.ratingMode; }

  // (absent on most graphs) -- a node appearing there has its TYPE under
  // contest, distinct from Agreement-contested. Defensive against absence,
  // same style as the other *Of() helpers above.
  function pollsOf(g){ return (g && g.polls) || []; }
  function pollForNode(id){

  }

  /* =========================================================================
   * CARD COLOUR SYSTEM (user notes, 2026-07 -- supersedes the earlier
   * ASSESSMENT-SPEC.md §6 FRAME/BODY gold-vs-white split): ONE spectrum,
   * dark gray (bad) -> bright white (good), for every cue; the trait is
   * told by WHICH ZONE of the card carries it (see the cards CSS comment):
   *   zone-title  bg = Agreement mean          (zoneColorFor)
   *   zone-body   bg = leading phrasing's R&C  (zoneColorFor)
   *   zone-bottom bg = Agreement consensus     (consensusColorFor: stdev,
   *                    bright = tight, dark = contentious/split)
   * Edge lines share the same ramp (edgeRampColor) for their graded
   * Agreement. Any zone with no data keeps its uncoloured default -- per
   * zone, so a partially-rated node shows exactly the cues it has data for.
   * The old gold ramp is gone from assessment entirely; gold now marks
   * ought nodes and focus/interaction chrome only.
   * ========================================================================= */
  var ZONE_WHITE_RGB  = [244, 242, 237]; // near-white (good / high / tight)
  var ZONE_DARK_RGB   = [40, 44, 51];    // dark gray (bad / low / split)
  // HANDOFF-TO-UI §2.1: an OUGHT is rated on democratic endorsement, not
  // truth, so its Agreement must not use the truth-coded gray ramp. Same
  // brightness semantics (dark = low), but the high end runs to a bright
  // gold -- the ought signature colour -- so "how golden the title bar" is
  // endorsement strength, visibly a different question from truth.
  var OUGHT_GOLD_RGB  = [227, 196, 99];  // bright gold (high endorsement)
  var QUALITY_NEUTRAL = 2.5;             // midpoint fallback for a rated-but-missing R or C dim
  var ZONE_TEXT_LUMINANCE_THRESHOLD = 0.4; // above this, a zone fill is light enough for dark ink
  // Consensus ramp input is the Agreement STDEV, not a 0-5 score: 0 = perfect
  // consensus (bright) and CONTENTION_STDEV_MAX+ = maximally split (dark),
  // linear in between (emphasisT is score-shaped and doesn't apply; the
  // interesting stdev band in real graphs is ~0.2-1.3, and phase-2's
  // contested threshold sits at 1.0).
  var CONTENTION_STDEV_MAX = 2.0;

  // Both colour ramps are deliberately NONLINEAR in the score: everything
  // below EMPHASIS_KNEE_SCORE shares the bottom EMPHASIS_KNEE_T of the ramp
  // ("it's bad" is one fact, not a spectrum worth colour budget), and the
  // band above the knee -- where real graphs actually live and where a 3.9
  // vs a 4.2 is a distinction a reader cares about -- gets everything else.
  // A linear ramp spent most of its colour range on scores that never occur,
  // so neighbouring cards in a healthy graph all landed within a few
  // near-identical shades of each other.
  // ITERATION (user notes 2/3): knee-T squeezed 0.25 -> 0.15 to push even
  // more of the colour range into the meaningful band, and the knee itself
  // moved 3.5 -> 3 so the ramp starts differentiating a little earlier.
  var EMPHASIS_KNEE_SCORE = 3;   // raw 0-5 score where the ramp changes slope
  var EMPHASIS_KNEE_T     = 0.15; // ramp position [0,1] the knee maps to
  function emphasisT(score){
    var s = Math.max(0, Math.min(5, score));
    if(s <= EMPHASIS_KNEE_SCORE){
      return (s / EMPHASIS_KNEE_SCORE) * EMPHASIS_KNEE_T;
    }
    return EMPHASIS_KNEE_T
      + ((s - EMPHASIS_KNEE_SCORE) / (5 - EMPHASIS_KNEE_SCORE)) * (1 - EMPHASIS_KNEE_T);
  }

  function clamp01(x){ return Math.max(0, Math.min(1, x)); }
  function lerpRGB(a, b, t){
    return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t, a[2] + (b[2]-a[2])*t];
  }
  function rgbToCss(rgb){
    return "rgb(" + Math.round(rgb[0]) + "," + Math.round(rgb[1]) + "," + Math.round(rgb[2]) + ")";
  }
  // WCAG relative luminance (0 = black, 1 = white) -- used only to pick a
  // legible text colour FROM THE BODY FILL's lightness (never from the
  // frame, and never to drive the colour ramps themselves, which are plain
  // linear RGB interpolation).
  function relLuminance(rgb){
    function chan(c){ c = c/255; return c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); }
    return 0.2126*chan(rgb[0]) + 0.7152*chan(rgb[1]) + 0.0722*chan(rgb[2]);
  }

  // 0-5 score (ASSESSMENT-SPEC.md scale_max) -> {bg, text} on the single
  // dark->white spectrum (emphasisT-shaped), with a legible ink colour
  // derived from the fill's lightness via a WCAG-luminance threshold.
  // Always returns -- callers decide "unrated" (n > 0, not sealed).
  function zoneColorFor(score){
    var rgb = lerpRGB(ZONE_DARK_RGB, ZONE_WHITE_RGB, emphasisT(score));
    var text = relLuminance(rgb) > ZONE_TEXT_LUMINANCE_THRESHOLD ? "#1b1508" : "var(--ink)";
    return {bg: rgbToCss(rgb), text: text};
  }

  // Endorsement mean (0-5) -> {bg, text} on the dark->gold ought ramp
  // (HANDOFF-TO-UI §2.1 -- see OUGHT_GOLD_RGB above). Same emphasisT
  // nonlinearity and luminance-aware ink as zoneColorFor.
  function endorsementColorFor(mean){
    var rgb = lerpRGB(ZONE_DARK_RGB, OUGHT_GOLD_RGB, emphasisT(mean));
    var text = relLuminance(rgb) > ZONE_TEXT_LUMINANCE_THRESHOLD ? "#1b1508" : "var(--ink)";
    return {bg: rgbToCss(rgb), text: text};
  }

  // Agreement stdev -> {bg, text} for the bottom (consensus) zone: 0 stdev =
  // bright (tight consensus), CONTENTION_STDEV_MAX+ = dark (split). This is
  // where the CONTESTED state now lives visually -- a contested node is by
  // definition wide-spread, so its bottom bar runs dark (the old dashed-
  // frame cue is retired as redundant with this).
  function consensusColorFor(stdev){
    var t = clamp01(1 - stdev / CONTENTION_STDEV_MAX);
    var rgb = lerpRGB(ZONE_DARK_RGB, ZONE_WHITE_RGB, t);
    var text = relLuminance(rgb) > ZONE_TEXT_LUMINANCE_THRESHOLD ? "#1b1508" : "var(--ink)";
    return {bg: rgbToCss(rgb), text: text};
  }

  // Same spectrum for EDGE strokes (user notes: edges carry colour cues for
  // their Agreement too): a plain CSS colour, bright = strongly agreed
  // inference, dark = weak. Callers fall back to the neutral --line stroke
  // for unrated/sealed edges (edgeStrokeColor below).
  function edgeRampColor(mean){
    return rgbToCss(lerpRGB(ZONE_DARK_RGB, ZONE_WHITE_RGB, emphasisT(mean)));
  }
  function edgeStrokeColor(edge){
    // §2.5: blind Rating mode withholds edge colour too.
    if(blind()) return null;
    var agr = edge && edge.agreement;
    if(agr && agr.n > 0 && agr.state !== "sealed" && agr.mean != null){
      return edgeRampColor(agr.mean);
    }
    return null; // caller keeps the default --line stroke
  }

  // HANDOFF-TO-UI §2.2: an edge reads as ghost-faint when it's demoted
  // itself, OR either endpoint node is -- a live edge hanging off a ghosted
  // node should still fade, not look like a normal live connection.
  function edgeGhostOpacity(edge){
    var from = getNode(edge.from), to = getNode(edge.to);
    return (isGhost(edge) || isGhost(from) || isGhost(to)) ? 0.22 : null;
  }

  // HANDOFF-TO-UI §2.3 (the flatness trap): the raw chain-rule product of
  // strengths along a path always favors flat/direct edges -- every extra
  // hop multiplies in another factor <1, so a two-hop path can never
  // out-score its direct edge on the raw product no matter how strong its
  // links are. Declutter must NOT key on that product; it keys on the
  // LENGTH-NORMALIZED (geometric-mean) strength instead, which rewards
  // layering rather than penalizing it. A direct edge a->b is a REDUNDANT
  // SHORTCUT when some layered path a->...->b (2+ hops, not reusing that
  // edge) has geometric-mean edgeVisualStrength() strictly greater than the
  // direct edge's own strength -- the layered story is the stronger one, so
  // the flat edge is decluttered rather than the reverse.
  function computeRedundantShortcuts(){
    var out = {};
    var edges = edgesOf(state.graph);
    var adj = {};
    // Excluded from the whole computation (candidates AND path hops), exactly
    // like ghosts: a conjunction-group MEMBER isn't a standalone inference --
    // the group's JOINT inference is -- so a single member neither competes as
    // a shortcut nor counts as a standalone hop in an alternate path, and an
    // AND-bracket must never be part-decluttered. Matches the pinned contract
    // in HANDOFF-TO-UI (shortcut-redundancy: ghost + conjunction-group members
    // excluded); node view already guarded !e.group, this closes the map-fade
    // and spring-release paths too (blackholes e067 was wrongly faded).
    function skipEdge(e){ return isGhost(e) || !!e.group; }
    edges.forEach(function(e){
      if(skipEdge(e)) return;
      (adj[e.from] = adj[e.from] || []).push(e);
    });
    edges.forEach(function(direct){
      if(skipEdge(direct)) return;
      var target = direct.to, best = null;
      // bounded DFS (<=4 hops) for the strongest alternate path by geometric
      // mean; path threaded explicitly (an array, in traversal order) since
      // the visited OBJECT below is only for O(1) cycle checks, not display.
      function dfs(node, depth, logSum, count, visited, path){
        if(depth > 4) return;
        var outs = adj[node] || [];
        for(var i=0;i<outs.length;i++){
          var e = outs[i];
          if(e.id === direct.id || visited[e.to]) continue;
          var ls = logSum + Math.log(Math.max(edgeVisualStrength(e), 0.1));
          var c = count + 1;
          if(e.to === target){
            if(c >= 2){
              var gm = Math.exp(ls / c);
              if(!best || gm > best.geomean){
                best = {geomean: gm, path: path.concat([e.to])};
              }
            }
          } else {
            visited[e.to] = true;
            dfs(e.to, depth + 1, ls, c, visited, path.concat([e.to]));
            delete visited[e.to];

      }
      var seedVisited = {}; seedVisited[direct.from] = true;
      dfs(direct.from, 0, 0, 0, seedVisited, [direct.from]);
      if(best && best.geomean > edgeVisualStrength(direct) + 1e-9){
        out[direct.id] = best;
      }
    });
    return out;
  }
  function isRedundantShortcut(e){
    return !!(e && state.shortcutRedundant && state.shortcutRedundant[e.id]);
  }
  // HANDOFF-TO-UI §2.4: the strongest ground edge directly joining a -> b,
  // if any -- used to look up each hop of a shortcut's layered path so the
  // competition comparison (openAssessmentPanel) can show and link to the
  // actual edge carrying that hop, not just the node id pair.
  function bestEdgeBetween(a, b){
    var es = edgesOf(state.graph), best = null;
    for(var i=0;i<es.length;i++){
      if(es[i].from === a && es[i].to === b && (!best || edgeVisualStrength(es[i]) > edgeVisualStrength(best))) best = es[i];
    }
    return best;
  }

  // Pulls a node's three zone colours out of its graph.json record. Returns
  // {title, body, bottom}, each either {bg, text} or null ("leave that
  // zone's default, uncoloured styling alone") -- per zone, so a partially-
  // rated node renders exactly the cues it has data for.
  // PHASE2-SPEC.md §1/§2: "sealed" withholds the mean entirely, so a sealed
  // dimension renders uncoloured, same as "no ratings yet". Old graph.json
  // records with no "state" field behave as before (every `!== "sealed"`
  // check is true when state is undefined).
  function cardColorsFor(node){
    // §2.5: blind Rating mode withholds every zone colour cue.
    if(blind()) return {title:null, body:null, bottom:null};
    var a = node.agreement || {mean:null, n:0};
    var q = node.quality || {};
    var qr = q.R || {mean:null, n:0}, qc = q.C || {mean:null, n:0};
    var aRated = a.n > 0 && a.state !== "sealed";

    // HANDOFF-TO-UI §2.1: ought title bars colour by ENDORSEMENT (dark->gold),
    // never by the truth-coded gray ramp.
    var title = (aRated && a.mean != null)
      ? (node.kind === "ought" ? endorsementColorFor(a.mean) : zoneColorFor(a.mean))
      : null;

    var qrRated = qr.n > 0 && qr.state !== "sealed";
    var qcRated = qc.n > 0 && qc.state !== "sealed";
    var body = null;
    if(qrRated || qcRated){
      var rMean = (qrRated && qr.mean != null) ? qr.mean : QUALITY_NEUTRAL;
      var cMean = (qcRated && qc.mean != null) ? qc.mean : QUALITY_NEUTRAL;
      body = zoneColorFor((rMean + cMean) / 2);
    }

    var bottom = (aRated && a.stdev != null) ? consensusColorFor(a.stdev) : null;
    return {title: title, body: body, bottom: bottom};
  }

  function findEdge(id){
    var es = edgesOf(state.graph);
    for(var i=0;i<es.length;i++) if(es[i].id === id) return es[i];
    return null;
  }

  // Resolve an edge's primary_typing id to its display text: the trunk
  // node's title (falling back to phrasing, same as titleOf()) when the
  // typing references a node, else the typing's free-text label.
  // FORUMS-SPEC.md §4: "the primary typing's text (trunk-node title or label)".
  function primaryTyping(edge){
    var tyid = edge && edge.primary_typing;
    if(!tyid) return null;
    var t = typingsOf(edge).find(function(t){ return t.id === tyid; });
    return t || null;
  }
  function primaryTypingText(edge){
    var t = primaryTyping(edge);
    if(!t) return null;
    if(t.node){
      var n = getNode(t.node);
      return n ? titleOf(n) : null;
    }
    return t.label;
  }

  function getNode(id){
    var g = state.graph;
    for(var i=0;i<g.nodes.length;i++) if(g.nodes[i].id === id) return g.nodes[i];
    return null;
  }
  function groundEdgesTo(id){ return edgesOf(state.graph).filter(function(e){ return e.to === id; }); }
  function groundEdgesFrom(id){ return edgesOf(state.graph).filter(function(e){ return e.from === id; }); }
  function groupById(gid){
    var gs = groupsOf(state.graph);
    for(var i=0;i<gs.length;i++) if(gs[i].id === gid) return gs[i];
    return null;
  }
  function setsContaining(nodeId){
    return setsOf(state.graph).filter(function(s){
      return s.members.some(function(m){ return m.node === nodeId; });
    });
  }

  function truncate(s, n){
    if(!s) return "";
    s = String(s);
    return s.length > n ? s.slice(0, n-1).replace(/\s+\S*$/, "") + "…" : s;
  }

  // Node-level Title (§4b: "Node text falls back to title when a card isn't
  // the focus"). If the node has no primary_title yet, fall back to its
  // primary phrasing (truncated), then finally to its bare id.
  function titleOf(node){
    if(node.primary_title){
      var t = (node.titles || []).find(function(t){ return t.id === node.primary_title; });
      if(t) return t.text;
    }
    var p = phrasingOf(node);
    if(p) return truncate(p, 60);
    return node.id;
  }
  function phrasingOf(node){
    var p = (node.phrasings || []).find(function(p){ return p.id === node.primary_phrasing; });
    return p ? p.text : null;
  }

  /* =========================================================================
   * ITEM 2: numeric score lines for the focus card (node) and the edge-focus
   * card (edge). Node scores are the assessment layer's Agreement mean plus
   * its two INHERITED quality means (Reasonableness, Clarity); any missing/
   * null mean renders as "—" rather than crashing or showing 0 (a 0 mean is
   * a real, different answer from "not rated yet"). Edge cards have no mean
   * object of their own per the schema -- just plain agrees/strength counts.
   * ========================================================================= */
  // PHASE2-SPEC.md §1/§2/§4: formats ONE aggregate block ({mean, n, stdev,
  // state, era} — any field, including the whole object, may be missing on
  // an old graph.json) into just its "value" text -- e.g. "4.3", "4.3 ±0.4",
  // "4.3 ±0.4 (contested)", or "pending quorum (n=3)" for a sealed target.
  // Sealed is the only state that embeds its own n (there is no mean to
  // pair a count with); every other state leaves n out, so callers append
  // their own "(n=N)" exactly where the pre-phase-2 code already did --
  // this is what keeps old graphs (no "state"/"stdev"/"era" fields at all)
  // rendering byte-identical to before.
  function fmtAgg(agg){
    if(!agg || (agg.mean == null && agg.state !== "sealed")) return "—";
    if(agg.state === "sealed") return "pending quorum (n=" + (agg.n || 0) + ")";
    var s = agg.mean.toFixed(1);
    if(agg.stdev != null) s += " ±" + agg.stdev.toFixed(1);
    // ITERATION (user notes 3): no "(provisional)" text anywhere any more --
    // that state is encoded as the amber confidence tint on card glyphs
    // (see distStripEl). Contested keeps its word in the panels.
    if(agg.state === "contested") s += " (contested)";
    return s;
  }
  // CARD REDESIGN + iteration notes: cards carry NO score text at all any
  // more -- the bottom bar's glyph is labelled with the Agreement mean, and
  // everything else (state, n, era, R&C means, author, created, kind) lives
  // in the pop-up panels (fmtAgg below formats those panel value lines).

  /* =========================================================================
   * User notes: alternate titles & phrasings, ranked "best cumulative rating
   * first". DATA GAP: none of the bundled snapshots carry A/R/C aggregates
   * on titles (VIEWER-SPEC §4 item 2's title grid is blocked on the same),
   * and phrasings carry R/C but no per-phrasing Agreement aggregate -- so
   * "cumulative" means: the mean of whatever dimension means exist, falling
   * back to the structural `agrees` count when none do. When the rating
   * engine starts exporting fuller aggregates these rankings light up
   * automatically (same dormant pattern as distStripEl's histogram).
   * ========================================================================= */
  function aggMeanIfShown(s){
    return (s && s.mean != null && s.n > 0 && s.state !== "sealed") ? s.mean : null;
  }
  function cumulativeRating(scores, dims){
    var vals = [];
    (dims || []).forEach(function(k){
      var m = aggMeanIfShown(scores && scores[k]);
      if(m != null) vals.push(m);
    });
    if(!vals.length) return null;
    return vals.reduce(function(x,y){ return x+y; }, 0) / vals.length;
  }
  // Shared comparator: rated items first (cumulative desc), then by agrees.
  function byCumulativeThenAgrees(dims){
    return function(a, b){
      var ra = cumulativeRating(a.scores, dims), rb = cumulativeRating(b.scores, dims);
      if(ra != null || rb != null){
        return (rb == null ? -Infinity : rb) - (ra == null ? -Infinity : ra) || ((b.agrees||0) - (a.agrees||0));
      }
      return (b.agrees||0) - (a.agrees||0);
    };
  }
  function ratingSummaryText(scores, dims, labels){
    var parts = [];
    (dims || []).forEach(function(k, i){
      var m = aggMeanIfShown(scores && scores[k]);
      if(m != null) parts.push(labels[i] + " " + m.toFixed(1));
    });
    return parts.join(" · ");
  }
  // (The old single-line edgeScoreLineFor is gone with the card redesign:
  // the edge focus card's structural "agrees/strength" numbers now live in
  // its body zone's meta line and the graded "Agree ..." figure in its
  // bottom bar -- see makeEdgeFocusCard. Both signals stay visible.)
  // PHASE2-SPEC.md §7: the same "Agree X.X ±S (n=N)" convention, applied to a
  // conjunction group's own Agreement aggregate (rates the group's joint
  // inference, not any one member edge). Returns null when the group has no
  // agreement block at all (nothing to show, old graphs included).
  function groupAgreementText(agr){
    if(!agr || !(agr.n > 0 || agr.state)) return null;
    var s = "Agree " + fmtAgg(agr);
    if(agr.state !== "sealed") s += " (n=" + agr.n + ")";
    if(agr.era && agr.era > 1) s += " · era " + agr.era;
    return s;
  }
  // PHASE2-SPEC.md §4 (eras): renders one muted line per prior-era history
  // entry (`history: [{era, mean, n, stdev}]`), e.g. "era 1 settled at 3.9
  // (n=16)". Only used on focused cards (node/edge detail); returns an empty,
  // childless wrapper when there's no history to show.
  function historyLinesEl(history){
    var wrap = document.createElement("div");
    wrap.className = "history-lines";
    (history || []).slice().sort(function(a,b){ return a.era - b.era; }).forEach(function(h){
      var row = document.createElement("div");
      row.className = "history-line";
      var meanTxt = (h.mean != null) ? h.mean.toFixed(1) : "—";
      if(h.stdev != null) meanTxt += " ±" + h.stdev.toFixed(1);
      row.textContent = "era " + h.era + " settled at " + meanTxt + " (n=" + (h.n || 0) + ")";
      wrap.appendChild(row);
    });
    return wrap;
  }

  /* =========================================================================
   * VIEWER-SPEC.md §4 item 1: distribution, not just the mean. "mean ±stdev"
   * hides the difference between a TIGHT consensus, a WIDE-uncertain spread,
   * and a BIMODAL/contested split -- three different epistemic states. The
   * spread strip makes them visually distinct: a 0-5 axis with a shaded
   * ±1-stdev band, a per-bloc mean dot (sized by that bloc's n) and an
   * overall-mean tick. Two well-separated dots = bimodal; a wide band with
   * merged dots = uncertain; a narrow band = settled -- honest to what the
